<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Markdown A4 Studio</title>
<style>
@page {
  size: A4 landscape;
  margin: 3mm;
}

:root {
  --page-width: 291mm;
  --page-height: 204mm;
  --columns: 5;
  --font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  --font-size: 5.5px;
  --math-size: 0.8em;
  --column-gap: 1.5mm;
  --ui-scale: 1;

  --ui-bg: rgba(255, 255, 255, 0.92);
  --ui-bg-strong: #ffffff;
  --ui-bg-soft: #f6f7fb;
  --ui-line: rgba(17, 24, 39, 0.12);
  --ui-line-strong: rgba(17, 24, 39, 0.2);
  --ui-text: #111827;
  --ui-muted: #6b7280;
  --ui-primary: #2563eb;
  --ui-primary-hover: #1d4ed8;
  --ui-primary-soft: #eff6ff;
  --ui-danger: #dc2626;
  --ui-shadow: 0 24px 70px rgba(15, 23, 42, 0.22);
  --ui-radius: 18px;
}

html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 34rem),
    linear-gradient(135deg, #e5e7eb, #d1d5db);
  color: #000;
  font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.toolbar {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 10;
  width: min(348px, calc(100vw - 28px));
  overflow: visible;
  transform: scale(var(--ui-scale));
  transform-origin: top left;
  color: var(--ui-text);
  transition:
    width 220ms ease,
    height 220ms ease,
    border-color 180ms ease,
    box-shadow 180ms ease,
    background 180ms ease;
}

.toolbar-panel {
  width: 100%;
  overflow: hidden;
  opacity: 1;
  transform: scale(1);
  transform-origin: top left;
  visibility: visible;
  background: var(--ui-bg);
  border: 1px solid var(--ui-line);
  border-radius: var(--ui-radius);
  box-shadow: var(--ui-shadow);
  backdrop-filter: blur(18px) saturate(1.2);
  transition:
    opacity 180ms ease,
    transform 220ms ease,
    visibility 0s linear 0s;
}

.toolbar.collapsed {
  width: 56px;
  height: 56px;
  pointer-events: none;
}

.toolbar.collapsed .toolbar-panel {
  opacity: 0;
  transform: scale(0.94);
  visibility: hidden;
  transition:
    opacity 150ms ease,
    transform 180ms ease,
    visibility 0s linear 180ms;
}

.toolbar.collapsed .collapse-tab {
  pointer-events: auto;
}

.toolbar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 48px;
  padding: 10px 12px 10px 16px;
  border-bottom: 1px solid var(--ui-line);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.9));
  cursor: move;
  user-select: none;
}

.toolbar-title-wrap {
  display: grid;
  gap: 2px;
  min-width: 0;
}

.toolbar-title {
  font-size: 14px;
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.01em;
  white-space: nowrap;
}

.toolbar-subtitle {
  color: var(--ui-muted);
  font-size: 11px;
  line-height: 1.1;
  white-space: nowrap;
}

.header-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex: 0 0 auto;
}

.icon-button {
  display: inline-grid;
  place-items: center;
  width: 32px;
  height: 30px;
  padding: 0;
  border: 1px solid var(--ui-line);
  border-radius: 10px;
  background: var(--ui-bg-strong);
  color: var(--ui-text);
  font-size: 14px;
  line-height: 1;
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
}

.icon-button:hover {
  border-color: var(--ui-line-strong);
  background: #f8fafc;
}

.collapse-tab {
  position: absolute;
  top: 0;
  left: 0;
  display: inline-grid;
  place-items: center;
  grid-template-columns: 1fr;
  align-items: center;
  justify-content: center;
  gap: 0;
  width: 54px;
  height: 54px;
  padding: 0;
  border: 1px solid var(--ui-line);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.92);
  color: var(--ui-text);
  box-shadow: 14px 18px 42px rgba(15, 23, 42, 0.18);
  backdrop-filter: blur(16px) saturate(1.2);
  font-size: 22px;
  font-weight: 800;
  opacity: 0;
  transform: scale(0.82);
  visibility: hidden;
  transition:
    opacity 150ms ease,
    transform 180ms ease,
    visibility 0s linear 150ms;
}

.collapse-tab::before {
  content: none;
}

.toolbar:not(.collapsed) .collapse-tab {
  pointer-events: none;
}

.toolbar.collapsed .collapse-tab {
  opacity: 1;
  transform: scale(1);
  visibility: visible;
  transition:
    opacity 180ms ease 90ms,
    transform 220ms ease 70ms,
    visibility 0s linear 0s;
}

.toolbar-body {
  display: grid;
  gap: 8px;
  overflow: visible;
  padding: 8px;
}

.card {
  min-width: 0;
  border: 1px solid var(--ui-line);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.78);
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
}

.card-section {
  min-width: 0;
  padding: 8px;
}

.card-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  min-width: 0;
  margin: 0 0 8px;
  color: var(--ui-text);
  font-size: 12px;
  font-weight: 800;
  line-height: 1;
}

.card-title span {
  min-width: 0;
  overflow: hidden;
  color: var(--ui-muted);
  font-size: 11px;
  font-weight: 600;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.controls {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 9px;
  min-width: 0;
}

.field {
  display: grid;
  gap: 5px;
  min-width: 0;
}

.field-wide {
  grid-column: 1 / -1;
}

label {
  color: #374151;
  font-size: 11px;
  font-weight: 750;
}

input,
select,
textarea,
button {
  box-sizing: border-box;
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--ui-line);
  border-radius: 11px;
  background: var(--ui-bg-strong);
  color: var(--ui-text);
  outline: none;
  transition:
    border-color 140ms ease,
    box-shadow 140ms ease,
    background 140ms ease;
}

input,
select {
  height: 32px;
  padding: 0 10px;
  font-size: 12px;
}

input:focus,
select:focus,
textarea:focus {
  border-color: rgba(37, 99, 235, 0.72);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
}

.select-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
}

.select-row select {
  grid-column: 1 / -1;
}

.custom-font-field {
  display: none;
}

.custom-font-field.is-visible {
  display: grid;
}

.upload-editor {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--ui-line);
  border-radius: 14px;
  background: var(--ui-bg-strong);
  transition:
    border-color 140ms ease,
    box-shadow 140ms ease,
    background 140ms ease;
}

.upload-editor.dragging {
  border-color: rgba(37, 99, 235, 0.8);
  box-shadow:
    0 0 0 4px rgba(37, 99, 235, 0.12),
    0 18px 44px rgba(37, 99, 235, 0.12);
  background: var(--ui-primary-soft);
}

.editor-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  min-width: 0;
  padding: 6px 8px;
  border-bottom: 1px solid var(--ui-line);
  background: linear-gradient(180deg, #ffffff, #f8fafc);
}

.editor-hint {
  min-width: 0;
  color: var(--ui-muted);
  font-size: 11px;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.editor-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 0 0 auto;
}

.small-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: auto;
  min-width: max-content;
  height: 28px;
  padding: 0 9px;
  border: 1px solid var(--ui-line);
  border-radius: 999px;
  background: #fff;
  color: var(--ui-text);
  font-size: 11px;
  font-weight: 750;
  line-height: 1;
}

.small-button:hover {
  border-color: var(--ui-line-strong);
  background: #f8fafc;
}

textarea {
  display: block;
  min-height: 118px;
  max-height: 38vh;
  padding: 8px;
  resize: vertical;
  border: 0;
  border-radius: 0;
  background: transparent;
  font-family: "Menlo", "SFMono-Regular", "Cascadia Code", Consolas, monospace;
  font-size: 12px;
  line-height: 1.5;
  box-shadow: none !important;
}

.upload-editor-empty textarea {
  min-height: 118px;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.action-button {
  width: 100%;
  height: 34px;
  border: 1px solid var(--ui-line);
  border-radius: 12px;
  background: var(--ui-bg-strong);
  color: var(--ui-text);
  font-size: 12px;
  font-weight: 800;
}

.action-button:hover {
  border-color: var(--ui-line-strong);
  background: #f8fafc;
}

.primary {
  border-color: var(--ui-primary);
  background: var(--ui-primary);
  color: #fff;
  box-shadow: 0 10px 24px rgba(37, 99, 235, 0.25);
}

.primary:hover {
  border-color: var(--ui-primary-hover);
  background: var(--ui-primary-hover);
}

.danger {
  color: var(--ui-danger);
}

.page-wrap {
  box-sizing: border-box;
  width: max-content;
  min-width: 100%;
  padding: 18px;
}

.page {
  box-sizing: border-box;
  width: var(--page-width);
  height: var(--page-height);
  margin: 0 auto;
  padding: 0;
  overflow: visible;
  background: #fff;
  box-shadow:
    0 0 0 1px rgba(15, 23, 42, 0.16),
    0 18px 60px rgba(15, 23, 42, 0.22);
}

.preview {
  height: 100%;
  color: #000;
  font-family: var(--font-family);
  font-size: var(--font-size);
  line-height: 1.18;
  text-align: left;
  column-count: var(--columns);
  column-gap: var(--column-gap);
  column-fill: auto;
}

.preview p,
.preview ol,
.preview ul,
.preview blockquote,
.preview pre {
  margin: 0 0 0.22em;
}

.preview h1,
.preview h2,
.preview h3,
.preview h4,
.preview h5,
.preview h6 {
  margin: 0 0 0.18em;
  font-size: 1em;
  line-height: 1.08;
}

.preview table {
  border-collapse: collapse;
}

.preview td,
.preview th {
  padding: 0 0.2em;
}

.preview img {
  max-width: 100%;
}

.preview code {
  font-family: "Menlo", "SFMono-Regular", monospace;
  font-size: 0.92em;
}

.preview .math {
  break-inside: avoid;
}

.preview mjx-container {
  font-size: var(--math-size) !important;
  line-height: 0 !important;
}

.preview mjx-container[display="true"] {
  margin: 0.08em 0 !important;
  overflow-x: hidden;
  overflow-y: visible;
  max-width: 100%;
}

@media (max-width: 760px) {
  .toolbar {
    width: min(348px, calc(100vw - 28px));
  }

  .controls {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .field-wide {
    grid-column: 1 / -1;
  }

  .actions {
    grid-template-columns: 1fr 1fr;
  }
}

@media print {
  html,
  body {
    width: auto;
    height: auto;
    background: #fff;
  }

  .toolbar {
    display: none !important;
  }

  .page-wrap {
    padding: 0;
  }

  .page {
    width: var(--page-width);
    height: var(--page-height);
    margin: 0;
    padding: 0;
    box-shadow: none;
  }

  .preview {
    width: 100%;
    height: 100%;
  }
}

<script>
const markdownInput = document.getElementById('markdownInput');
const preview = document.getElementById('preview');
const uploadEditor = document.getElementById('uploadEditor');
const editorHint = document.getElementById('editorHint');
const fileStatus = document.getElementById('fileStatus');
const fileInput = document.getElementById('fileInput');
const chooseButton = document.getElementById('chooseButton');
const printButton = document.getElementById('printButton');
const clearButton = document.getElementById('clearButton');
const collapseButton = document.getElementById('collapseButton');
const expandButton = document.getElementById('expandButton');
const sampleButton = document.getElementById('sampleButton');
const toolbar = document.getElementById('toolbar');
const toolbarHandle = document.getElementById('toolbarHandle');
const applyFontButton = document.getElementById('applyFontButton');
const customFontField = document.getElementById('customFontField');

const controls = {
  columns: document.getElementById('columnsInput'),
  columnGap: document.getElementById('columnGapInput'),
  fontSize: document.getElementById('fontSizeInput'),
  mathSize: document.getElementById('mathSizeInput'),
  fontPreset: document.getElementById('fontPresetInput'),
  fontFamily: document.getElementById('fontFamilyInput')
};

let renderTimer = 0;

function setRootVar(name, value) {
  document.documentElement.style.setProperty(name, value);
}

function getFontFamilyValue() {
  if (controls.fontPreset.value === 'custom') {
    return controls.fontFamily.value || '"PingFang SC", "Helvetica Neue", Arial, sans-serif';
  }
  return controls.fontPreset.value;
}

function updateSettings() {
  const fontFamily = getFontFamilyValue();
  customFontField.classList.toggle('is-visible', controls.fontPreset.value === 'custom');

  setRootVar('--columns', controls.columns.value || '5');
  setRootVar('--column-gap', controls.columnGap.value || '1.5mm');
  setRootVar('--font-size', controls.fontSize.value || '5.5px');
  setRootVar('--math-size', controls.mathSize.value || '0.8em');
  setRootVar('--font-family', fontFamily);

  if (controls.fontPreset.value !== 'custom') {
    controls.fontFamily.value = fontFamily;
  }
}

function updateEditorEmptyState() {
  const isEmpty = markdownInput.value.trim().length === 0;
  uploadEditor.classList.toggle('upload-editor-empty', isEmpty);
}

function updateUiScale() {
  const scale = window.visualViewport?.scale || 1;
  document.documentElement.style.setProperty('--ui-scale', String(1 / scale));
  clampToolbarPosition();
}

function setToolbarCollapsed(collapsed) {
  toolbar.classList.toggle('collapsed', collapsed);
  clampToolbarPosition();
}

function clampToolbarPosition() {
  const viewport = window.visualViewport;
  const viewportWidth = viewport?.width || window.innerWidth;
  const viewportHeight = viewport?.height || window.innerHeight;
  const scale = 1 / (viewport?.scale || 1);
  const rect = toolbar.getBoundingClientRect();
  const margin = 8;
  const width = rect.width || toolbar.offsetWidth * scale;
  const height = rect.height || toolbar.offsetHeight * scale;
  const maxX = Math.max(margin, viewportWidth - width - margin);
  const maxY = Math.max(margin, viewportHeight - height - margin);
  const currentX = parseFloat(toolbar.style.left || toolbar.getBoundingClientRect().left || 16);
  const currentY = parseFloat(toolbar.style.top || toolbar.getBoundingClientRect().top || 16);
  const nextX = Math.min(Math.max(margin, currentX), maxX);
  const nextY = Math.min(Math.max(margin, currentY), maxY);

  toolbar.style.left = `${nextX}px`;
  toolbar.style.top = `${nextY}px`;
}

function escapeScriptText(text) {
  return text
    .replace(/\\/g, '\\\\')
    .replace(/`/g, '\\`')
    .replace(/\$\{/g, '\\${')
    .replace(/<\/script/gi, '<\\/script');
}

function getPrintSettings() {
  updateSettings();
  return {
    columns: controls.columns.value || '5',
    columnGap: controls.columnGap.value || '1.5mm',
    fontSize: controls.fontSize.value || '5.5px',
    mathSize: controls.mathSize.value || '0.8em',
    fontFamily: getFontFamilyValue()
  };
}

function setEditorStatus(text) {
  editorHint.textContent = text;
  fileStatus.textContent = text;
}

async function readFiles(files) {
  const allFiles = [...files];
  const markdownFiles = allFiles.filter(file => /\.(md|markdown|txt)$/i.test(file.name));

  if (markdownFiles.length === 0) {
    setEditorStatus('未识别到 .md / .markdown / .txt 文件');
    return;
  }

  const texts = await Promise.all(
    markdownFiles.map(async file => {
      const text = await file.text();
      return `<!-- ${file.name} -->\n${text}`;
    })
  );

  markdownInput.value = texts.join('\n\n');
  setEditorStatus(`已导入 ${markdownFiles.length} 个文件`);
  updateEditorEmptyState();
  renderMarkdown();

  fileInput.value = '';
}

function handleDragEnter(event) {
  event.preventDefault();
  uploadEditor.classList.add('dragging');
}

function handleDragOver(event) {
  event.preventDefault();
  uploadEditor.classList.add('dragging');
}

function handleDragLeave(event) {
  if (!uploadEditor.contains(event.relatedTarget)) {
    uploadEditor.classList.remove('dragging');
  }
}

function handleDrop(event) {
  event.preventDefault();
  uploadEditor.classList.remove('dragging');
  readFiles(event.dataTransfer.files);
}

function insertSample() {
  markdownInput.value = String.raw`**1. 非均匀杆的静力平衡**

背景：水平杆长 $L$、质量 $M$，左、右绳张力分别为 $T_L,T_R$，左绳与竖直方向夹角为 $\alpha$，右绳与竖直方向夹角为 $\beta$，质心距左端为 $x$。

(a) **求：杆的质心位置 $x$**。解：杆静止，满足力和力矩平衡。水平方向有 $T_L\sin\alpha=T_R\sin\beta$，绕左端取力矩有 $Mgx=T_RL\cos\beta$。由两式消去张力，并结合竖直方向平衡 $T_L\cos\alpha+T_R\cos\beta=Mg$，得 $x=\frac{\sin\alpha\cos\beta}{\sin(\alpha+\beta)}L$。

(b) **求：左、右绳张力 $T_L$ 与 $T_R$**。解：由 $Mgx=T_RL\cos\beta$ 得 $T_R=\frac{Mgx}{L\cos\beta}$，代入上问结果得 $T_R=\frac{Mg\sin\alpha}{\sin(\alpha+\beta)}$；再由 $T_L\sin\alpha=T_R\sin\beta$ 得 $T_L=\frac{Mg\sin\beta}{\sin(\alpha+\beta)}$。

**2. 均匀细杆与质点的引力势能和引力**

背景：细杆长 $L$、质量 $M$，质点质量 $m$，质点位于杆中垂线上，距杆中心为 $a$，取杆中心为坐标原点，杆元位置为 $x$，$dM=\frac{M}{L}dx$，距离 $r=\sqrt{x^2+a^2}$。

(a) **求：杆与质点间总引力势能 $U$**。解：杆元势能为 $dU=-\frac{Gm,dM}{r}=-\frac{GMm}{L}\frac{dx}{\sqrt{x^2+a^2}}$，积分区间为 $x\in[-L/2,L/2]$，故 $U=-\frac{GMm}{L}\int_{-L/2}^{L/2}\frac{dx}{\sqrt{x^2+a^2}}$。利用积分公式得 $U=-\frac{GMm}{L}\ln\frac{\sqrt{L^2/4+a^2}+L/2}{\sqrt{L^2/4+a^2}-L/2}$。

(b) **求：杆与质点间引力大小 $F$**。解：由对称性，水平方向分量相互抵消，只保留沿中垂线方向的分量，杆元贡献为 $dF_y=\frac{Gm,dM}{r^2}\frac{a}{r}=\frac{GMm}{L}\frac{a,dx}{(x^2+a^2)^{3/2}}$，故 $F=2\frac{GMm}{L}a\int_0^{L/2}\frac{dx}{(x^2+a^2)^{3/2}}=\frac{GMm}{a\sqrt{L^2/4+a^2}}$。

**3. 分流管中的连续性方程**

背景：入口直径为 $d_1$，两出口直径为 $d_2,d_3$，对应流速为 $v_1,v_2,v_3$，流体不可压缩。

(a) **求：通过管道的体积流率**。解：入口体积流率为 $Q=A_1v_1=\frac{\pi d_1^2}{4}v_1$。

(b) **求：出口 3 的流速 $v_3$**。解：连续性方程为 $A_1v_1=A_2v_2+A_3v_3$，即 $\frac{\pi d_1^2}{4}v_1=\frac{\pi d_2^2}{4}v_2+\frac{\pi d_3^2}{4}v_3$，解得 $v_3=\frac{d_1^2v_1-d_2^2v_2}{d_3^2}$。

**4. 四弹簧并联的简谐振子**

背景：质量块质量为 $m$，四个弹簧劲度系数为 $k_1,k_2,k_3,k_4$，小位移为 $x$，等效劲度系数为 $k_{\rm eff}=k_1+k_2+k_3+k_4$。

(a) **求：系统的运动方程**。解：四个并联弹簧的回复力同向叠加，合力为 $F=-k_{\rm eff}x$，由牛顿第二定律得 $m\ddot{x}=-(k_1+k_2+k_3+k_4)x$。

(b) **求：振子的角频率 $\omega$**。解：将运动方程写成 $\ddot{x}+\frac{k_{\rm eff}}{m}x=0$，与简谐运动标准形式比较，得 $\omega=\sqrt{\frac{k_{\rm eff}}{m}}=\sqrt{\frac{k_1+k_2+k_3+k_4}{m}}$；若四个弹簧均为 $k$，则 $\omega=\sqrt{\frac{4k}{m}}$。

(c) **求：振子的频率 $f$ 与周期 $T$**。解：由角频率关系得 $f=\frac{\omega}{2\pi}$，$T=\frac{2\pi}{\omega}$，因此 $f=\frac{1}{2\pi}\sqrt{\frac{k_{\rm eff}}{m}}$，$T=2\pi\sqrt{\frac{m}{k_{\rm eff}}}$。

**5. 线性阻尼振子**

背景：运动方程为 $m\ddot{x}=-b\dot{x}-kx$，设 $x(t)=A_0e^{-bt/(2m)}\cos(\omega t)$，相位常数取零。

(a) **求：证明给定形式满足阻尼振子方程并确定 $\omega$ 的条件**。解：令 $\gamma=\frac{b}{2m}$，则 $x=A_0e^{-\gamma t}\cos\omega t$。代入 $m\ddot{x}+b\dot{x}+kx=0$ 后，$\sin\omega t$ 项相互抵消，$\cos\omega t$ 项要求 $m(\gamma^2-\omega^2)-b\gamma+k=0$。由 $\gamma=\frac{b}{2m}$ 得 $\omega^2=\frac{k}{m}-\frac{b^2}{4m^2}$，即 $\omega=\sqrt{\frac{k}{m}-\frac{b^2}{4m^2}}$。

(b) **求：阻尼振子的角频率 $\omega$**。解：由上问直接得 $\omega=\sqrt{\frac{k}{m}-\frac{b^2}{4m^2}}$。

(c) **求：初速度 $v_0=\dot{x}(0)$**。解：对 $x(t)=A_0e^{-bt/(2m)}\cos\omega t$ 求导，得 $\dot{x}=-\frac{b}{2m}A_0e^{-bt/(2m)}\cos\omega t-\omega A_0e^{-bt/(2m)}\sin\omega t$，令 $t=0$，得 $v_0=-\frac{b}{2m}A_0$。

(d) **求：时刻 $t$ 的振幅 $A(t)$，特别是题给时刻的振幅**。解：阻尼振幅为指数包络 $A(t)=A_0e^{-bt/(2m)}$；若题给时刻记为 $t_0$，则 $A(t_0)=A_0e^{-bt_0/(2m)}$。

**6. 横波波函数**

背景：波函数写成 $y(x,t)=A\cos(kx-\omega t)$，其中 $A$ 为振幅，$k$ 为波数，$\omega$ 为角频率。

(a) **求：波的振幅 $A$**。解：振幅是余弦函数前的系数，故 $A$ 等于题给波函数中 $\cos(kx-\omega t)$ 前的常数因子。

(b) **求：波的传播方向**。解：相位为 $kx-\omega t$，保持相位不变有 $kx-\omega t=\text{常数}$，因此 $x$ 随 $t$ 增大而增大，波沿 $+x$ 方向传播。

(c) **求：波速 $v$**。解：对 $y=A\cos(kx-\omega t)$，波速为 $v=\frac{\omega}{k}$。

(d) **求：波长 $\lambda$、频率 $f$ 与周期 $T$**。解：波数与波长关系为 $k=\frac{2\pi}{\lambda}$，故 $\lambda=\frac{2\pi}{k}$；角频率与频率关系为 $\omega=2\pi f$，故 $f=\frac{\omega}{2\pi}$；周期为 $T=\frac{1}{f}=\frac{2\pi}{\omega}$。

(e) **求：绳上任一点的最大振动速度**。解：横向速度为 $v_y=\frac{\partial y}{\partial t}=\omega A\sin(kx-\omega t)$，其最大值为 $v_{y,\max}=\omega A$。

(f) **求：产生该正弦波所需的平均功率 $P_{\rm av}$**。解：题给平均功率公式为 $P_{\rm av}=\frac{1}{2}\mu v\omega^2A^2$，其中 $v=\frac{\omega}{k}$，故 $P_{\rm av}=\frac{1}{2}\mu\frac{\omega}{k}\omega^2A^2$，也可写成 $P_{\rm av}=\frac{1}{2}\mu v(v_{y,\max})^2$。

**7. 绳上的脉冲波**

背景：绳长为 $L$，张力为 $\mathcal{T}$，扰动传播时间为 $\Delta t$，线密度为 $\mu$。

(a) **求：绳上的波是横波还是纵波，并说明原因**。解：这是横波，因为绳元的位移方向垂直于波的传播方向。

(b) **求：波速 $v$**。解：扰动用时间 $\Delta t$ 传播距离 $L$，故 $v=\frac{L}{\Delta t}$。

(c) **求：绳的线密度 $\mu$**。解：绳波速度满足 $v=\sqrt{\frac{\mathcal{T}}{\mu}}$，因此 $\mu=\frac{\mathcal{T}}{v^2}=\frac{\mathcal{T}\Delta t^2}{L^2}$。

(d) **求：绳的总质量 $M$**。解：总质量为 $M=\mu L=\frac{\mathcal{T}\Delta t^2}{L}$。

**8. 一端封闭一端开口的瓶中声波**

背景：瓶内空气柱等效为一端封闭、一端开口的管，空气柱长度为 $\ell=H-h$，声速为 $v$，目标基频为 $f$。

(a) **求：该声波是横波还是纵波，并说明原因**。解：声波是纵波，因为空气分子的振动方向与声波传播方向平行。

(b) **求：一端封闭一端开口管的共振波长**。解：封闭端为位移节点，开口端为位移腹，满足 $\ell=\frac{2n+1}{4}\lambda_n$，其中 $n=0,1,2,\cdots$，故 $\lambda_n=\frac{4\ell}{2n+1}$。

(c) **求：为产生基频，水应装到多高 $h$**。解：基频对应 $n=0$，有 $f=\frac{v}{4\ell}$，故 $\ell=\frac{v}{4f}$。由于 $\ell=H-h$，所以 $h=H-\frac{v}{4f}$。

(d) **求：下一谐波频率**。解：一端封闭一端开口管只允许奇次谐波，频率为 $f_n=(2n+1)\frac{v}{4\ell}$。基频为 $f$，下一谐波对应 $n=1$，故 $f_{\rm next}=3f$。

**9. 火车鸣笛与悬崖反射的多普勒效应**

背景：声速为 $c$，火车速度为 $u$，静止时汽笛频率为 $f$，火车向隧道入口和悬崖靠近。

(a) **求：隧道口静止观察者直接听到的频率 $f'$**。解：声源向静止观察者靠近，探测者速度为零，声源速度为 $u$，多普勒公式给出 $f'=\frac{c}{c-u}f$。

(b) **求：悬崖反射声波的频率**。解：悬崖静止，反射只改变声波传播方向，不改变悬崖接收到并重新发出的频率，因此反射声频率仍为 $f'=\frac{c}{c-u}f$。

(c) **求：火车工程师听到的反射声频率 $f''$**。解：反射声可看作由静止悬崖发出、向运动工程师传播的声波，工程师向声源方向运动，故 $f''=\frac{c+u}{c}f'=\frac{c+u}{c-u}f$。

**10. 水箱小孔出流**

背景：水面到孔的深度为 $h$，水箱水高为 $H$，孔离地高度为 $H-h$，忽略水面下降速度和空气阻力。

(a) **求：水离开小孔时的速度 $v$**。解：在自由液面与小孔处用伯努利方程，二者压强均为大气压，且液面速度可忽略，得 $\rho gh=\frac{1}{2}\rho v^2$，所以 $v=\sqrt{2gh}$。

(b) **求：水流落地点到孔的水平距离 $x$**。解：水流以水平速度 $v$ 射出，竖直下落距离为 $H-h$，故 $H-h=\frac{1}{2}gt^2$，得 $t=\sqrt{\frac{2(H-h)}{g}}$。水平距离为 $x=vt=\sqrt{2gh}\sqrt{\frac{2(H-h)}{g}}=2\sqrt{h(H-h)}$。

(c) **求：使水平距离 $x$ 最大的小孔深度 $h$**。解：最大化 $x$ 等价于最大化 $x^2=4h(H-h)$，令 $\frac{d}{dh}[h(H-h)]=H-2h=0$，得 $h=\frac{H}{2}$。

**11. 质点与均匀细杆端点的弹性碰撞**

背景：质点质量为 $m$、初速为 $v$，均匀细杆质量为 $M$、长度为 $L$，碰后质点静止，杆质心速度为 $V_{\rm cm}$，角速度为 $\omega$，杆绕质心转动惯量为 $I_{\rm cm}=\frac{1}{12}ML^2$。

(a) **求：使质点碰后静止的质量比 $M/m$**。解：线动量守恒给出 $mv=MV_{\rm cm}$。绕杆质心取角动量守恒，碰撞前质点角动量为 $mv\frac{L}{2}$，碰后为 $I_{\rm cm}\omega$，故 $mv\frac{L}{2}=I_{\rm cm}\omega$。弹性碰撞满足机械能守恒，$\frac{1}{2}mv^2=\frac{1}{2}MV_{\rm cm}^2+\frac{1}{2}I_{\rm cm}\omega^2$。代入 $V_{\rm cm}=\frac{m}{M}v$ 与 $\omega=\frac{mvL}{2I_{\rm cm}}$，并用 $I_{\rm cm}=\frac{1}{12}ML^2$，化简得 $M=4m$，因此 $\frac{M}{m}=4$。

(b) **求：碰后杆的质心速度 $V_{\rm cm}$ 与角速度 $\omega$**。解：由 $mv=MV_{\rm cm}$ 且 $M=4m$，得 $V_{\rm cm}=\frac{v}{4}$。由 $mv\frac{L}{2}=I_{\rm cm}\omega$ 与 $I_{\rm cm}=\frac{1}{12}ML^2$，再代入 $M=4m$，得 $\omega=\frac{3v}{2L}$。

**12. 拉普拉斯-龙格-楞次矢量**

背景：行星质量为 $m$，恒星质量为 $M$ 且近似静止在焦点 $O$，轨道半长轴为 $a$，偏心率为 $e$，角动量为 $\vec{L}=\vec{r}\times\vec{p}$，LRL 矢量定义为 $\vec{A}=\vec{v}\times\vec{L}-GMm\hat{r}$。轨道逆时针运动，$\hat{x},\hat{y}$ 在轨道平面内，$\hat{z}$ 垂直纸面向外。

(a) **求：角动量 $\vec{L}$ 的方向，并判断是否守恒**。解：轨道逆时针，按右手定则 $\vec{L}$ 沿 $+\hat{z}$ 方向。引力为中心力，力矩 $\vec{\tau}=\vec{r}\times\vec{F}=0$，故 $\vec{L}$ 守恒。

(b) **求：说明 LRL 矢量 $\vec{A}$ 位于 $x$-$y$ 平面内**。解：速度 $\vec{v}$ 位于轨道平面内，角动量 $\vec{L}$ 沿 $\hat{z}$ 方向，因此 $\vec{v}\times\vec{L}$ 位于 $x$-$y$ 平面内；同时 $\hat{r}$ 也位于 $x$-$y$ 平面内，所以 $\vec{A}=\vec{v}\times\vec{L}-GMm\hat{r}$ 位于 $x$-$y$ 平面内。

(c) **求：近日点 $P_1$ 与远日点 $P_2$ 的速率**。解：椭圆轨道的 vis-viva 关系为 $v^2=GM\left(\frac{2}{r}-\frac{1}{a}\right)$。近日点距离为 $r_p=a(1-e)$，故 $v_p=\sqrt{\frac{GM}{a}\frac{1+e}{1-e}}$；远日点距离为 $r_a=a(1+e)$，故 $v_a=\sqrt{\frac{GM}{a}\frac{1-e}{1+e}}$。

(d) **求：在 $P_1$ 或 $P_2$ 处的 LRL 矢量大小和方向**。解：在近日点 $P_1$，$\hat{r}=-\hat{x}$，速度沿 $-\hat{y}$，且 $\vec{L}$ 沿 $+\hat{z}$，所以 $\vec{v}\times\vec{L}$ 沿 $-\hat{x}$。由 $r_p=a(1-e)$ 与 $v_p^2=\frac{GM}{a}\frac{1+e}{1-e}$ 得 $|\vec{v}\times\vec{L}|=m r_p v_p^2=GMm(1+e)$，因此 $\vec{A}=-GMm(1+e)\hat{x}+GMm\hat{x}=-GMme\hat{x}$。故 $|\vec{A}|=GMme$，方向为 $-\hat{x}$。

(e) **求：在 $P_3$ 或 $P_4$ 处的 LRL 矢量**。解：以 $P_3$ 为例，几何关系为 $\vec{r}_3=ea\hat{x}-b\hat{y}$，其中 $b=a\sqrt{1-e^2}$，且该处速率满足 $v_3=\sqrt{\frac{GM}{a}}$。由 $\vec{L}=m\vec{r}_3\times\vec{v}_3$ 可得 $|\vec{L}|=m b v_3$，代入 $\vec{A}=\vec{v}\times\vec{L}-GMm\hat{r}$ 后，$\hat{y}$ 分量相互抵消，剩余 $\vec{A}=-GMme\hat{x}$；在 $P_4$ 处同理也得到 $\vec{A}=-GMme\hat{x}$。

(f) **求：证明 LRL 矢量在轨道任意点守恒**。解：对 $\vec{A}=\vec{v}\times\vec{L}-GMm\hat{r}$ 求导，得 $\frac{d\vec{A}}{dt}=\vec{a}\times\vec{L}+\vec{v}\times\frac{d\vec{L}}{dt}-GMm\frac{d\hat{r}}{dt}$。中心力使 $\frac{d\vec{L}}{dt}=0$，且 $\vec{a}=-\frac{GM}{r^2}\hat{r}$。在极坐标中 $\vec{L}=mr^2\dot{\theta}\hat{z}$，并有 $\frac{d\hat{r}}{dt}=\dot{\theta}\hat{\theta}$，所以 $\vec{a}\times\vec{L}=-\frac{GM}{r^2}\hat{r}\times mr^2\dot{\theta}\hat{z}=GMm\dot{\theta}\hat{\theta}$。因此 $\frac{d\vec{A}}{dt}=GMm\dot{\theta}\hat{\theta}-GMm\dot{\theta}\hat{\theta}=0$，故 $\vec{A}$ 守恒。**1. 初始自旋实心球的滑动与滚动**

背景：均匀实心球质量 $M$、半径 $R$，初始角速度为顺时针 $\omega_0$，初始质心速度为 $0$，水平面动摩擦系数为 $\mu_k$，取向右为正。

(a) **求：球开始向左还是向右运动**。解：球底部接触点因顺时针转动相对地面向左滑动，因此动摩擦力方向向右，球的质心开始向右运动。

(b) **求：球刚放到地面瞬间的加速度**。解：水平方向只有动摩擦力 $f_k=\mu_k N=\mu_k Mg$，故质心加速度为 $a=\frac{f_k}{M}=\mu_k g$，方向向右。

(c) **求：证明对应角加速度为 $\alpha=\frac{5\mu_k g}{2R}$**。解：以质心为转轴，动摩擦力产生逆时针力矩 $\tau=f_kR$，实心球转动惯量为 $I=\frac{2}{5}MR^2$，故 $\alpha=\frac{\tau}{I}=\frac{\mu_kMgR}{(2/5)MR^2}=\frac{5\mu_k g}{2R}$，方向为逆时针。

(d) **求：球达到纯滚动所需时间**。解：设顺时针为负，则 $\omega=-\omega_0+\alpha t$，质心速度 $v=at$。纯滚动条件为 $\omega R+v=0$，代入得 $(-\omega_0+\alpha t)R+at=0$，所以 $t=\frac{\omega_0R}{\alpha R+a}=\frac{2\omega_0R}{7\mu_k g}$。

**2. 斜面上由绕线牵引的静止圆柱**

背景：均匀实心圆柱质量 $M$，斜面倾角为 $\theta$，细线沿斜面方向拉圆柱，静摩擦系数为 $\mu_s$，圆柱处于静力平衡。

(a) **求：说明为什么必须有摩擦力才能平衡**。解：若无摩擦力，细线张力 $T$ 对圆柱质心产生力矩，而重力和支持力均过质心不产生关于质心的力矩，因此无法满足转动平衡，所以接触面必须提供摩擦力。

(b) **求：由力矩方程证明摩擦力 $f$ 等于张力 $T$**。解：以圆柱质心为转轴，张力和摩擦力的力臂均为 $R$，平衡时净力矩为零，即 $fR-TR=0$，故 $f=T$。

(c) **求：保持圆柱静止所需摩擦力**。解：沿斜面方向受力平衡给出 $f+T-Mg\sin\theta=0$，又 $f=T$，所以 $f=T=\frac{1}{2}Mg\sin\theta$，摩擦力沿斜面向上。

(d) **求：斜面对圆柱的支持力 $N$**。解：垂直斜面方向受力平衡为 $N-Mg\cos\theta=0$，故 $N=Mg\cos\theta$。

(e) **求：圆柱能保持静止的最大倾角**。解：静摩擦条件为 $f\leq \mu_sN$，代入 $f=\frac{1}{2}Mg\sin\theta$ 和 $N=Mg\cos\theta$ 得 $\tan\theta\leq 2\mu_s$，所以 $\theta_{\max}=\arctan(2\mu_s)$；当 $\mu_s=\frac{1}{2}$ 时，$\theta_{\max}=\frac{\pi}{4}$。

**3. 质点与均匀细杆间的引力**

背景：质点质量为 $m_1$，位于均匀细杆一端外侧距离 $d$ 处；细杆长度 $L$、质量 $M$，线密度为 $\lambda=\frac{M}{L}$。

(a) **求：细杆对质点的万有引力大小**。解：取杆上一小段质量 $dm=\lambda dr=\frac{M}{L}dr$，距质点距离为 $r$，微元引力为 $dF=\frac{Gm_1dm}{r^2}$。积分范围为 $r=d$ 到 $r=d+L$，故 $F=\frac{Gm_1M}{L}\int_d^{d+L}\frac{dr}{r^2}=\frac{Gm_1M}{d(d+L)}$，方向指向细杆。

(b) **求：质点与细杆之间的引力势能 $U$**。解：取无穷远处势能为零，微元势能为 $dU=-\frac{Gm_1dm}{r}$，故 $U=-\frac{Gm_1M}{L}\int_d^{d+L}\frac{dr}{r}=-\frac{Gm_1M}{L}\ln\frac{d+L}{d}$。

**4. 浸没岩石的浮力问题**

背景：岩石在空气中悬挂时绳张力为 $T_1$，完全浸没在水中时张力为 $T_2$，水密度为 $\rho_w$，完全浸没在未知液体中时张力为 $T_3$，忽略空气浮力。

(a) **求：岩石体积**。解：空气中 $T_1=W$，水中 $T_2=W-\rho_w gV$，相减得 $T_1-T_2=\rho_w gV$，所以 $V=\frac{T_1-T_2}{\rho_w g}$。

(b) **求：岩石平均密度**。解：岩石质量满足 $W=T_1=\rho_R gV$，故 $\rho_R=\frac{T_1}{gV}=\frac{\rho_wT_1}{T_1-T_2}$。

(c) **求：未知液体密度**。解：未知液体中 $T_3=W-\rho_u gV$，故 $\rho_u=\frac{T_1-T_3}{gV}=\rho_w\frac{T_1-T_3}{T_1-T_2}$。

**5. 水坝管道与塞子**

背景：水面到管道深度为 $d$，管道内外截面积分别为 $S_1$ 和 $S_2$，水密度为 $\rho$，大气压为 $P_{\rm atm}$，管道直径远小于水深尺度。

(a) **求：水平管中的表压**。解：静水压强随深度增加，管道处绝对压强为 $P=P_{\rm atm}+\rho gd$，故表压为 $\Delta P=P-P_{\rm atm}=\rho gd$。

(b) **求：塞子与管壁之间摩擦力大小**。解：塞子静止时，水对塞子的压力由管口截面积 $S_2$ 给出，摩擦力平衡该压力，因此 $f=\Delta P,S_2=\rho gdS_2$。

(c) **求：拔掉塞子后单位时间内流出的水量，并求给定时间 $\Delta t$ 内流出体积**。解：由伯努利方程，水面和出口均受大气压，出口在水面下深度 $d$，故出口速度 $v_2=\sqrt{2gd}$。体积流量为 $Q=S_2v_2=S_2\sqrt{2gd}$，时间 $\Delta t$ 内流出体积为 $V_{\rm out}=Q\Delta t=S_2\sqrt{2gd},\Delta t$。

(d) **求：流过截面 $S_1$ 的水速**。解：由连续性方程 $S_1v_1=S_2v_2$，得 $v_1=\frac{S_2}{S_1}\sqrt{2gd}$。

**6. 双星绕质心运动**

背景：两颗恒星质量为 $M_1$ 和 $M_2$，分别距质心 $R_1$ 和 $R_2$，以相同角速度 $\omega$ 做圆周运动，双星距离为 $R_1+R_2$。

(a) **求：一颗恒星对另一颗恒星的万有引力大小和方向**。解：两星间距为 $R_1+R_2$，引力大小为 $F=\frac{GM_1M_2}{(R_1+R_2)^2}$，方向沿两星连线，指向另一颗恒星，即为相互吸引力。

(b) **求：证明 $M_1R_1=M_2R_2$**。解：两星受同样大小的万有引力并以同角速度绕质心圆周运动，故 $M_1\omega^2R_1=M_2\omega^2R_2$，于是 $M_1R_1=M_2R_2$。

(c) **求：证明 $(R_1+R_2)^3\omega^2=G(M_1+M_2)$**。解：对 $M_1$ 有 $\frac{GM_1M_2}{(R_1+R_2)^2}=M_1\omega^2R_1$，对 $M_2$ 有 $\frac{GM_1M_2}{(R_1+R_2)^2}=M_2\omega^2R_2$。两式化为 $\omega^2R_1=\frac{GM_2}{(R_1+R_2)^2}$ 与 $\omega^2R_2=\frac{GM_1}{(R_1+R_2)^2}$，相加得 $\omega^2(R_1+R_2)=\frac{G(M_1+M_2)}{(R_1+R_2)^2}$，即 $(R_1+R_2)^3\omega^2=G(M_1+M_2)$。

(d) **求：恒星 $M_1$ 关于质心的角动量大小和方向**。解：$M_1$ 的速率为 $v_1=\omega R_1$，其角动量大小为 $L_1=M_1R_1v_1=M_1\omega R_1^2$。按图示运动方向用右手定则判断，角动量方向指向纸内；若轨道方向相反，则指向纸外。

(e) **求：将两颗恒星分离到无穷远所需能量**。解：两星系统总机械能为 $E=K+U$，圆周运动满足 $K=\frac{1}{2}\frac{GM_1M_2}{R_1+R_2}$，势能为 $U=-\frac{GM_1M_2}{R_1+R_2}$，故 $E=-\frac{GM_1M_2}{2(R_1+R_2)}$。分离到无穷远且最终静止时能量为零，所需能量为 $\Delta E=\frac{GM_1M_2}{2(R_1+R_2)}$。

**7. 开普勒第二定律的证明**

背景：行星质量为 $m$，太阳质量为 $M_s$，行星相对太阳的位置矢量为 $\vec r$。

(a) **求：太阳对行星的万有引力 $\vec F_g$**。解：万有引力为中心力，矢量形式可写为 $\vec F_g=-\frac{GM_sm}{r^2}\hat r=-\frac{GM_sm}{r^3}\vec r$。

(b) **求：证明行星角动量守恒**。解：行星关于太阳的力矩为 $\vec\tau=\vec r\times\vec F_g$。由于 $\vec F_g$ 与 $\vec r$ 反向共线，故 $\vec\tau=0$，于是 $\frac{d\vec L}{dt}=\vec\tau=0$，所以 $\vec L$ 守恒。

(c) **求：证明单位时间扫过面积 $\frac{dA}{dt}=\frac{L}{2m}$**。解：短时间 $dt$ 内扫过的面积为 $dA=\frac{1}{2}|\vec r\times d\vec r|=\frac{1}{2}|\vec r\times\vec v|dt$，又 $\vec L=\vec r\times m\vec v$，故 $\frac{dA}{dt}=\frac{|\vec r\times\vec v|}{2}=\frac{L}{2m}$。

(d) **求：证明开普勒第二定律成立**。解：由 (b) 知 $L$ 为常量，而 $m$ 也为常量，因此 $\frac{dA}{dt}=\frac{L}{2m}$ 为常量，所以行星在相等时间内扫过相等面积。

**8. 两个弹簧的振动**

背景：两弹簧原长相同，劲度系数分别为 $k_1$ 和 $k_2$，物块质量为 $m$，水平面光滑，位移均记为 $x$。

(a) **求：图 (a) 情形的运动方程和角频率**。解：图 (a) 中物块连接两弹簧，位移 $x$ 时两个弹簧均提供回复力，总回复力为 $F=-(k_1+k_2)x$，故运动方程为 $m\frac{d^2x}{dt^2}=-(k_1+k_2)x$，角频率为 $\omega_a=\sqrt{\frac{k_1+k_2}{m}}$。

(b) **求：图 (b) 情形的运动方程和角频率**。解：图 (b) 中两弹簧同样并联地对物块提供回复力，总回复力仍为 $F=-(k_1+k_2)x$，故 $m\frac{d^2x}{dt^2}=-(k_1+k_2)x$，角频率为 $\omega_b=\sqrt{\frac{k_1+k_2}{m}}$。

(c) **求：图 (c) 情形的运动方程和角频率**。解：图 (c) 中两弹簧串联，设总伸长为 $x=x_1+x_2$，串联弹簧受力相同，故 $k_1x_1=k_2x_2$，等效劲度系数满足 $k_{\rm eq}=\frac{k_1k_2}{k_1+k_2}$。运动方程为 $m\frac{d^2x}{dt^2}=-k_{\rm eq}x=-\frac{k_1k_2}{k_1+k_2}x$，角频率为 $\omega_c=\sqrt{\frac{k_1k_2}{m(k_1+k_2)}}$。

**9. 绳上的行波、反射与驻波**

背景：入射波为 $y_1(x,t)=A\cos 2\pi(\frac{x}{\lambda}-\frac{t}{T})$，其中 $A$ 为振幅，$\lambda$ 为波长，$T$ 为周期；绳的线密度为 $\mu$。反射波为 $y_2(x,t)=-A\cos 2\pi(\frac{x}{\lambda}+\frac{t}{T})$。

(a) **求：波的传播方向**。解：$y_1=A\cos(kx-\omega t)$ 表示沿 $+x$ 方向传播，因此该波向 $+x$ 方向传播。

(b) **求：波的振幅**。解：与标准形式比较，振幅为 $A$。

(c) **求：波长**。解：与 $y_1=A\cos 2\pi(\frac{x}{\lambda}-\frac{t}{T})$ 比较，波长为 $\lambda$。

(d) **求：周期**。解：与标准形式比较，周期为 $T$。

(e) **求：波速**。解：行波速度为 $v=\frac{\lambda}{T}$。

(f) **求：绳中张力 $F_T$**。解：绳波速度满足 $v=\sqrt{\frac{F_T}{\mu}}$，因此 $F_T=\mu v^2=\mu\frac{\lambda^2}{T^2}$。

(g) **求：该波的平均功率 $P_{\rm av}$**。解：角频率为 $\omega=\frac{2\pi}{T}$，平均功率为 $P_{\rm av}=\frac{1}{2}\mu v\omega^2A^2=\frac{1}{2}\mu\frac{\lambda}{T}(\frac{2\pi}{T})^2A^2$。

(h) **求：叠加形成的驻波表达式和波节位置**。解：设 $k=\frac{2\pi}{\lambda}$、$\omega=\frac{2\pi}{T}$，则 $y=y_1+y_2=A\cos(kx-\omega t)-A\cos(kx+\omega t)=2A\sin(kx)\sin(\omega t)$。波节满足 $\sin(kx)=0$，故 $kx=n\pi$，即 $x=\frac{n\lambda}{2}$，其中 $n=0,1,2,\cdots$。

**10. 多普勒效应**

背景：声速为 $v$，声源频率为 $f$。观察者速度记为 $v_d$，声源速度记为 $v_s$，多普勒公式按接近时频率升高、远离时频率降低选取符号。

(a) **求：消防车静止时声波波长**。解：静止声源满足 $v=f\lambda$，故 $\lambda=\frac{v}{f}$。

(b) **求：声源以速度 $v_s$ 向静止听者运动时听到的频率**。解：声源靠近、观察者静止，故 $f'=\frac{v}{v-v_s}f$。

(c) **求：声源以速度 $v_s$ 远离静止听者时听到的频率**。解：声源远离、观察者静止，故 $f'=\frac{v}{v+v_s}f$。

(d) **求：消防车静止、听者以速度 $v_d$ 向声源运动时听到的频率**。解：观察者靠近静止声源，故 $f'=\frac{v+v_d}{v}f$。

(e) **求：消防车静止、听者以速度 $v_d$ 远离声源时听到的频率**。解：观察者远离静止声源，故 $f'=\frac{v-v_d}{v}f$。

**11. 绕盘阿特伍德机**

背景：圆盘质量 $M$、半径 $R$，两侧悬挂质量 $m_1$ 与 $m_2$，且 $m_2>m_1$。绳不打滑时满足 $a=R\alpha$，圆盘转动惯量为 $I=\frac{1}{2}MR^2$。

(a) **求：当圆盘质量 $M=0$ 时两侧张力 $T_1,T_2$**。解：圆盘无质量时绳张力处处相等，设加速度大小为 $a=\frac{m_2-m_1}{m_1+m_2}g$，则 $T_1-m_1g=m_1a$ 且 $m_2g-T_2=m_2a$，故 $T_1=T_2=\frac{2m_1m_2}{m_1+m_2}g$。

(b) **求：圆盘质量非零且绳不打滑时 $T_1,T_2$**。解：取 $m_2$ 向下、$m_1$ 向上为正，有 $T_1-m_1g=m_1a$，$m_2g-T_2=m_2a$，圆盘转动方程为 $(T_2-T_1)R=I\alpha=\frac{1}{2}MR^2\frac{a}{R}$。联立得 $a=\frac{(m_2-m_1)g}{m_1+m_2+\frac{1}{2}M}$，所以 $T_1=m_1g+m_1a=\frac{m_1(2m_2+\frac{1}{2}M)}{m_1+m_2+\frac{1}{2}M}g$，$T_2=m_2g-m_2a=\frac{m_2(2m_1+\frac{1}{2}M)}{m_1+m_2+\frac{1}{2}M}g$。

(c) **求：当 $m_2$ 下降高度 $h$ 时圆盘角速度**。解：由能量守恒，重力势能减少 $(m_2-m_1)gh$ 转化为两物块平动动能和圆盘转动动能，即 $(m_2-m_1)gh=\frac{1}{2}m_1v^2+\frac{1}{2}m_2v^2+\frac{1}{2}I\omega^2$，且 $v=R\omega$、$I=\frac{1}{2}MR^2$。整理得 $\omega=\frac{1}{R}\sqrt{\frac{2(m_2-m_1)gh}{m_1+m_2+\frac{1}{2}M}}$。

**12. 一般振动**

背景：一维振子质量为 $m$，位移为 $x$，振幅为 $A$，势能零点取 $U(0)=0$。

(a) **求：简谐振子 $F_x=-kx$ 的势能函数**。解：保守力满足 $F_x=-\frac{dU}{dx}$，所以 $\frac{dU}{dx}=kx$，积分并用 $U(0)=0$ 得 $U(x)=\frac{1}{2}kx^2$。

(b) **求：由能量守恒证明速度 $v_x$ 与 $x$ 的关系**。解：振幅处总能量为 $E=\frac{1}{2}kA^2$，任意位置满足 $\frac{1}{2}mv_x^2+\frac{1}{2}kx^2=\frac{1}{2}kA^2$，故 $v_x=\frac{dx}{dt}=\sqrt{\frac{k}{m}(A^2-x^2)}$。

(c) **求：分离变量并求简谐振子的周期 $T$**。解：由 $\frac{dx}{dt}=\sqrt{\frac{k}{m}}\sqrt{A^2-x^2}$ 得 $\frac{dx}{\sqrt{A^2-x^2}}=\sqrt{\frac{k}{m}}dt$。从 $x=0$ 到 $x=A$ 的时间为 $\frac{T}{4}$，令 $u=\frac{x}{A}$，有 $\int_0^1\frac{du}{\sqrt{1-u^2}}=\sqrt{\frac{k}{m}}\frac{T}{4}$。利用 $\int_0^1\frac{du}{\sqrt{1-u^2}}=\frac{\pi}{2}$，得 $T=2\pi\sqrt{\frac{m}{k}}$。

(d) **求：第二个振子 $F_x=-cx^3$ 的势能函数**。解：由 $F_x=-\frac{dU}{dx}$ 得 $\frac{dU}{dx}=cx^3$，积分并用 $U(0)=0$ 得 $U(x)=\frac{1}{4}cx^4$。

(e) **求：第二个振子的周期 $T_2$**。解：振幅处总能量为 $E=\frac{1}{4}cA^4$，任意位置满足 $\frac{1}{2}mv_x^2+\frac{1}{4}cx^4=\frac{1}{4}cA^4$，故 $v_x=\sqrt{\frac{c}{2m}(A^4-x^4)}$。四分之一周期满足 $\frac{T_2}{4}=\int_0^A\frac{dx}{\sqrt{\frac{c}{2m}(A^4-x^4)}}=\frac{1}{A}\sqrt{\frac{2m}{c}}\int_0^1\frac{du}{\sqrt{1-u^4}}$。利用 $\int_0^1\frac{du}{\sqrt{1-u^4}}=1.31$，得 $T_2=\frac{4(1.31)}{A}\sqrt{\frac{2m}{c}}$。

(f) **求：$T_2$ 是否依赖振幅 $A$，以及该振动是否为简谐振动**。解：由 $T_2=\frac{4(1.31)}{A}\sqrt{\frac{2m}{c}}$ 可知周期依赖振幅 $A$；该回复力不是位移的一次函数，因此不是简谐振动。以下整理基于用户上传的 PHY1001 2023-2024 Term 2 Final Examination 试卷。

**1. 斜面上无滑动滚动的均匀实心圆柱**

背景：圆柱质量 $M$，半径 $R$，斜面角 $\theta$，重力加速度 $g$，实心圆柱转动惯量 $I=\frac12MR^2$，从静止开始纯滚动下滑。

(a) **求：圆柱纯滚动时质心线加速度大小**。解：沿斜面方向有 $Mg\sin\theta-f=Ma$，绕质心有 $fR=I\alpha$，纯滚动条件为 $a=\alpha R$。代入 $I=\frac12MR^2$ 得 $a=\frac{g\sin\theta}{1+I/(MR^2)}=\frac{2}{3}g\sin\theta$。

(b) **求：所需最小静摩擦因数**。解：由 $fR=I(a/R)$ 得 $f=\frac12Ma=\frac13Mg\sin\theta$，法向力为 $N=Mg\cos\theta$，临界条件 $f=\mu_sN$，故 $\mu_{s,\min}=\frac{f}{N}=\frac13\tan\theta$。

**2. 初始自转后放到水平面上的实心圆柱**

背景：取向右为 $+x$，逆时针角速度为正。圆柱质量 $M$，半径 $R$，初始角速度大小 $\omega_0$ 且方向为顺时针，初始质心速度为 $0$，动摩擦因数为 $\mu_k$，转动惯量 $I=\frac12MR^2$。

(a) **求：圆柱将向左还是向右运动**。解：顺时针转动时接触点相对地面向左滑动，因此地面对圆柱的动摩擦力向右，圆柱质心向右运动。

(b) **求：圆柱刚接触地面时的线加速度大小和方向**。解：水平方向唯一外力为动摩擦力 $f_k=\mu_kMg$，故 $a=\frac{f_k}{M}=\mu_kg$，方向向右。

(c) **求：对应角加速度大小和方向**。解：摩擦力对质心的力矩大小为 $f_kR$，方向为逆时针，故 $\alpha=\frac{f_kR}{I}=\frac{2\mu_kg}{R}$，方向逆时针。

(d) **求：达到无滑动滚动所需时间**。解：设顺时针初始角速度为 $\omega(0)=-\omega_0$，则 $\omega(t)=-\omega_0+\frac{2\mu_kg}{R}t$，质心速度 $v(t)=\mu_kgt$。无滑动条件为 $\omega R+v=0$，代入得 $-\omega_0R+3\mu_kgt=0$，故 $t=\frac{\omega_0R}{3\mu_kg}$。

**3. 消防员在靠墙梯子上的静力平衡**

背景：梯长 $L$，质量 $m$，上端高度 $h$，下端到墙水平距离 $a=\sqrt{L^2-h^2}$。墙光滑，墙对梯子的法向力为 $N_w$；地面对梯子的摩擦力为 $f$，地面对梯子的法向力为 $N_f$。梯子质心距下端 $L/3$，消防员质量 $M$，其质心距下端 $L/2$。

(a) **求：墙对梯子的法向力大小和方向**。解：取梯子下端为转轴，墙的法向力力臂为 $h$，梯子重力水平力臂为 $a/3$，消防员重力水平力臂为 $a/2$，力矩平衡得 $N_wh=mg\frac{a}{3}+Mg\frac{a}{2}$，故 $N_w=\frac{ag}{h}\left(\frac{m}{3}+\frac{M}{2}\right)$，方向水平向右。

(b) **求：地面对梯子的摩擦力大小和方向**。解：水平方向平衡要求 $f=N_w$，故 $f=\frac{ag}{h}\left(\frac{m}{3}+\frac{M}{2}\right)$，方向水平向左。

(c) **求：地面对梯子的法向力大小和方向**。解：竖直方向只有地面法向力平衡梯子和消防员总重力，故 $N_f=(m+M)g$，方向竖直向上。

**4. 小块与可转动杆的完全非弹性碰撞**

背景：小块质量 $m$，从高度 $h$ 无摩擦下滑后粘在均匀杆末端；杆质量 $M$，长度 $\ell$，绕上端点 $O$ 转动，杆初始竖直，转动惯量 $I_{\text{rod}}=\frac13M\ell^2$，碰后系统转到角度 $\theta$ 后瞬时静止。

(a) **求：碰撞前小块速度**。解：小块下滑过程中机械能守恒，$mgh=\frac12mv^2$，故 $v=\sqrt{2gh}$。

(b) **求：碰撞后块-杆系统的角速度**。解：碰撞瞬间关于转轴 $O$ 的角动量守恒，碰前角动量为 $mv\ell$，碰后转动惯量为 $I=\frac13M\ell^2+m\ell^2$，故 $mv\ell=I\omega$，代入 $v=\sqrt{2gh}$ 得 $\omega=\frac{m\sqrt{2gh}}{(m+M/3)\ell}$。

(c) **求：$\cos\theta$ 的值**。解：碰后转动动能转化为重力势能，$\frac12I\omega^2=g\ell(1-\cos\theta)\left(m+\frac{M}{2}\right)$。代入 $I=(m+M/3)\ell^2$ 和上式 $\omega$，得 $\cos\theta=1-\frac{m^2h}{\ell(m+M/3)(m+M/2)}$。

**5. 岩石浸没在水中的浮力**

背景：岩石在空气中静止时绳张力为 $T_a$，完全浸没水中静止时绳张力为 $T_w$，水密度为 $\rho_w$，重力加速度为 $g$。

(a) **求：水对岩石的浮力大小和方向**。解：空气中 $T_a=mg$，水中 $T_w+F_B=mg$，故 $F_B=T_a-T_w$，方向竖直向上。

(b) **求：岩石对水的反作用力大小和方向**。解：由牛顿第三定律，岩石对水的作用力大小等于浮力，故 $F_{\text{rock on water}}=T_a-T_w$，方向竖直向下。

(c) **求：岩石体积**。解：完全浸没时 $F_B=\rho_wgV$，故 $V=\frac{T_a-T_w}{\rho_wg}$。

(d) **求：岩石密度**。解：岩石质量为 $m=\frac{T_a}{g}$，体积为 $V=\frac{T_a-T_w}{\rho_wg}$，故 $\rho_{\text{rock}}=\frac{m}{V}=\rho_w\frac{T_a}{T_a-T_w}$。

**6. 文丘里管与 U 形压强计**

背景：水平管中流体密度为 $\rho$，大截面面积 $A_1$、速度 $v_1$、压强 $p_1$，小截面面积 $A_2$、速度 $v_2$、压强 $p_2$。压强计高度差为 $h$。第三问中管内流体密度为 $\rho_1$，压强计液体密度为 $\rho_2$，且 $\rho_1<\rho_2$。

(a) **求：水平管的连续性方程**。解：稳定不可压缩流动满足体积流量守恒，故 $A_1v_1=A_2v_2$。

(b) **求：用伯努利方程证明 $v_1$ 的表达式**。解：水平管两处高度相同，伯努利方程给出 $p_1+\frac12\rho v_1^2=p_2+\frac12\rho v_2^2$，由连续性方程 $v_2=\frac{A_1}{A_2}v_1$，代入得 $p_1-p_2=\frac12\rho v_1^2\left[\left(\frac{A_1}{A_2}\right)^2-1\right]$，故 $v_1=\sqrt{\frac{2(p_1-p_2)}{\rho[(A_1/A_2)^2-1]}}$。

(c) **求：用 $\rho_1,\rho_2,A_1,A_2,h$ 表示 $v_1$**。解：U 形压强计给出压强差 $p_1-p_2=(\rho_2-\rho_1)gh$，将其代入上一问并令管内流体密度为 $\rho_1$，得 $v_1=\sqrt{\frac{2(\rho_2-\rho_1)gh}{\rho_1[(A_1/A_2)^2-1]}}$。

**7. 钢琴弦上的正弦行波**

背景：弦质量 $m$，长度 $\ell$，线密度 $\mu=\frac{m}{\ell}$，频率 $f$，波长 $\lambda$，振幅 $A$，波速 $v$，张力 $F_T$。

(a) **求：波数 $k$**。解：波数定义为 $k=\frac{2\pi}{\lambda}$。

(b) **求：角频率 $\omega$**。解：角频率与频率关系为 $\omega=2\pi f$。

(c) **求：周期 $T$**。解：周期为频率倒数，$T=\frac{1}{f}$。

(d) **求：波传播速度 $v$**。解：行波速度满足 $v=f\lambda$。

(e) **求：弦的张力 $F_T$**。解：弦波速度满足 $v=\sqrt{F_T/\mu}$，故 $F_T=\mu v^2=\frac{m}{\ell}(f\lambda)^2$。

(f) **求：产生一个周期波所需功 $W$**。解：平均功率为 $P_{\text{av}}=\frac12\sqrt{\mu F_T}\omega^2A^2$，一个周期内所做功为 $W=P_{\text{av}}T$。用 $T=\frac1f$、$\omega=2\pi f$ 得 $W=2\pi^2\sqrt{\mu F_T}A^2f$；若再用 $v=f\lambda$，则 $W=2\pi^2\mu\lambda A^2f^2$。

(g) **求：频率变为 $f'=2f$ 后一个周期所需功 $W'$**。解：若同一根弦张力不变，则 $\mu$ 与 $F_T$ 不变，故 $W\propto f$，因此 $W'=2W$。

**8. 两列相反传播波的驻波**

背景：两波为 $y_1=A\sin(kx-\omega t)$ 与 $y_2=A\sin(kx+\omega t)$，其中 $A$ 为单列波振幅，$k$ 为波数，$\omega$ 为角频率。

(a) **求：两列波的传播方向**。解：形如 $\sin(kx-\omega t)$ 的波向 $+x$ 方向传播，形如 $\sin(kx+\omega t)$ 的波向 $-x$ 方向传播，故 $y_1$ 向 $+x$ 方向传播，$y_2$ 向 $-x$ 方向传播。

(b) **求：叠加后的驻波函数**。解：由恒等式 $\sin A+\sin B=2\sin\frac{A+B}{2}\cos\frac{A-B}{2}$，得 $y=y_1+y_2=2A\sin(kx)\cos(\omega t)$。

(c) **求：驻波上任一点可能达到的最大位移 $y_{\max}$**。解：驻波振幅包络为 $2A|\sin(kx)|$，最大值出现在波腹处，故 $y_{\max}=2A$。

(d) **求：波腹位置**。解：波腹满足 $|\sin(kx)|=1$，即 $kx=\frac{(2n+1)\pi}{2}$，故 $x=\frac{(2n+1)\pi}{2k}$，其中 $n$ 为整数。

(e) **求：波节位置**。解：波节满足 $\sin(kx)=0$，即 $kx=n\pi$，故 $x=\frac{n\pi}{k}$，其中 $n$ 为整数。

(f) **求：驻波上质点的振动速度函数 $v_y$**。解：质点速度为 $v_y=\frac{\partial y}{\partial t}$，由 $y=2A\sin(kx)\cos(\omega t)$ 得 $v_y=-2A\omega\sin(kx)\sin(\omega t)$。

(g) **求：最大质点速度 $v_{y,\max}$**。解：速度幅值为 $2A\omega|\sin(kx)|$，最大值出现在 $|\sin(kx)|=1$，故 $v_{y,\max}=2A\omega$。

(h) **求：最大质点速度出现于波节还是波腹**。解：最大速度要求 $|\sin(kx)|=1$，这正是波腹条件，因此最大质点速度出现在波腹位置。

**9. 潜艇声呐的多普勒效应**

背景：声速为 $v$，声源速度为 $v_S$，探测器速度为 $v_D$，发射频率为 $f$。当探测器朝来波方向运动时分子取 $v+v_D$，当探测器远离来波时取 $v-v_D$；当声源朝探测器运动时分母取 $v-v_S$，当声源远离探测器时分母取 $v+v_S$。潜艇 A 在 B 左侧，C 在 B 右侧，A 与 C 均向左运动，B 静止。

(a) **求：B 探测到 A 的频率 $f_{AB}$**。解：A 发出的波向右传播到 B，而 A 向左运动，声源远离 B，B 静止，故 $f_{AB}=\frac{v}{v+v_A}f$。

(b) **求：C 探测到 B 的频率 $f_{BC}$**。解：B 发出的波向右传播到 C，C 向左运动迎向来波，声源 B 静止，故 $f_{BC}=\frac{v+v_C}{v}f$。

(c) **求：C 探测到 A 的频率 $f_{AC}$**。解：A 发出的波向右传播到 C，A 向左远离 C，C 向左迎向来波，故 $f_{AC}=\frac{v+v_C}{v+v_A}f$。若 $v_A=v_C$，则 $f_{AC}=f$。

(d) **求：A 探测到 B 的频率 $f_{BA}$**。解：B 发出的波向左传播到 A，A 向左与波同向运动并远离 B，因此探测器相对波速为 $v-v_A$，故 $f_{BA}=\frac{v-v_A}{v}f$。

(e) **求：A 加速后 B 探测 A 的频率 $f'\*{AB}$ 与 A 探测 B 的频率 $f'\*{BA}$**。解：令加速后 A 的速度为 $v'*A$。B 探测 A 时，声源 A 远离 B，故 $f'*{AB}=\frac{v}{v+v'*A}f$；A 探测 B 时，探测器 A 与向左传播的波同向运动并远离 B，故 $f'*{BA}=\frac{v-v'_A}{v}f$。

**10. 地球绕太阳的轨道角动量**

背景：太阳质量 $M_S$，地球质量 $M_E$，且 $M_S\gg M_E$。地球作半径 $R$ 的圆轨道，太阳在 $O$，点 $O'$ 位于 $O$ 正上方距离 $R$ 处。取图示瞬间地球在 $+y$ 轴上，速度指向 $-x$，轨道角速度为 $\Omega$。

(a) **求：地球绕太阳一周的周期 $T_0$**。解：万有引力提供向心力，$\frac{GM_SM_E}{R^2}=M_E\frac{v^2}{R}$，故 $v=\sqrt{\frac{GM_S}{R}}$，周期为 $T_0=\frac{2\pi R}{v}=2\pi\sqrt{\frac{R^3}{GM_S}}$。

(b) **求：以 $O$ 为参考点的地球轨道角动量 $\vec L_0$**。解：以 $O$ 为参考点时 $|\vec r|=R$ 且 $\vec r\perp\vec v$，故 $L_0=M_ERv=M_E\sqrt{GM_SR}$。图示瞬间 $\vec r=R\hat y$，$\vec v=-v\hat x$，所以 $\vec L_0=M_ERv,\hat z$，方向为 $+\hat z$。

(c) **求：以 $O'$ 为参考点的地球轨道角动量 $\vec L$**。解：图示瞬间相对 $O'$ 的位置矢量为 $\vec r'=R\hat y-R\hat z$，速度为 $\vec v=-v\hat x$，故 $\vec L=M_E\vec r'\times\vec v=M_ERv(\hat y+\hat z)$，大小为 $L=\sqrt2M_ERv=\sqrt2M_E\sqrt{GM_SR}$，方向沿 $\hat y+\hat z$。

(d) **求：以 $O'$ 为参考点时太阳引力对地球的力矩 $\vec\tau$**。解：太阳对地球的引力为 $\vec F=-\frac{GM_SM_E}{R^2}\hat y$，相对 $O'$ 的位置矢量为 $\vec r'=R\hat y-R\hat z$，故 $\vec\tau=\vec r'\times\vec F=-\frac{GM_SM_E}{R}\hat x$，大小为 $\tau=\frac{GM_SM_E}{R}$，方向为 $-\hat x$。

(e) **求：用 $\vec\tau=\frac{d\vec L}{dt}$ 解释角动量变化，并求该“旋转”的角频率 $\Omega$**。解：以 $O'$ 为参考点时，$\vec L$ 不是常矢量，其水平分量随地球绕太阳运动而转动；由圆轨道角速度关系 $\Omega=\frac{v}{R}$，得 $\Omega=\sqrt{\frac{GM_S}{R^3}}$，并且 $|\frac{d\vec L}{dt}|=M_ER^2\Omega^2=\frac{GM_SM_E}{R}$，与上一问力矩大小一致。

**11. 摆珠在摆线轨道上的振动**

背景：摆线轨道参数方程为 $x=R(\theta+\sin\theta)$，$y=R(1-\cos\theta)$，其中 $-\pi\le\theta\le\pi$，重力沿 $-y$ 方向，摆珠质量为 $m$，令 $\dot\theta=\frac{d\theta}{dt}$。

(a) **求：摆珠速度的 $x$ 与 $y$ 分量**。解：对参数方程求时间导数，得 $v_x=\frac{dx}{dt}=R(1+\cos\theta)\dot\theta$，$v_y=\frac{dy}{dt}=R\sin\theta,\dot\theta$。

(b) **求：摆珠沿轨道滑动的动能**。解：动能为 $K=\frac12m(v_x^2+v_y^2)$，代入上式并用 $(1+\cos\theta)^2+\sin^2\theta=2(1+\cos\theta)$，得 $K=mR^2(1+\cos\theta)\dot\theta^2$。

(c) **求：证明机械能 $E=mR^2\dot\theta^2(1+\cos\theta)+mgR(1-\cos\theta)$ 为常量**。解：轨道光滑，支持力始终不做功，只有重力做功，因此机械能守恒；由上一问 $K=mR^2(1+\cos\theta)\dot\theta^2$，重力势能取 $U=mgy=mgR(1-\cos\theta)$，故 $E=K+U=mR^2\dot\theta^2(1+\cos\theta)+mgR(1-\cos\theta)$ 为常量。

(d) **求：令 $u=\sin\frac{\theta}{2}$ 后重写能量表达式**。解：由 $1-\cos\theta=2u^2$、$1+\cos\theta=2\cos^2\frac{\theta}{2}$，且 $\dot u=\frac12\cos\frac{\theta}{2}\dot\theta$，可得 $\dot\theta=\frac{2\dot u}{\cos(\theta/2)}$。代入能量式得 $E=8mR^2\dot u^2+2mgRu^2$。

(e) **求：由 $E(u,\dot u)$ 推导运动方程**。解：因 $E$ 为常量，$\frac{dE}{dt}=0$，对 $E=8mR^2\dot u^2+2mgRu^2$ 求导得 $16mR^2\dot u\ddot u+4mgRu\dot u=0$，非静止情形约去公共因子后得 $\ddot u+\frac{g}{4R}u=0$。

(f) **求：摆珠关于 $x=0$ 的振动是否为简谐运动**。解：运动方程 $\ddot u+\frac{g}{4R}u=0$ 与简谐振动标准形式相同，因此是简谐运动。

(g) **求：摆珠在摆线轨道上振动的角频率 $\omega$**。解：由标准形式 $\ddot u+\omega^2u=0$，可得 $\omega^2=\frac{g}{4R}$，故 $\omega=\frac12\sqrt{\frac{g}{R}}$。

**12. 等质量双星系统的限制性三体问题**

背景：两颗等质量恒星各质量为 $M$，绕共同质心作半径 $R$ 的圆周运动，恒星位置可取为 $x=\pm R$。星舰质量 $m$ 可忽略，只需与双星保持相同角速度。设系统角速度为 $\Omega$。

(a) **求：双星系统角速度大小**。解：每颗恒星受到另一颗恒星的引力 $\frac{GM^2}{(2R)^2}$，该力提供半径 $R$ 的向心力 $MR\Omega^2$，故 $MR\Omega^2=\frac{GM^2}{4R^2}$，得到 $\Omega=\sqrt{\frac{GM}{4R^3}}$。

(b) **求：决定 $L_2$ 与 $L_3$ 位置的方程**。解：设星舰在 $x$ 轴上，令无量纲坐标 $\xi=\frac{x}{R}$，两颗恒星在 $\xi=\pm1$。共转圆周运动要求引力加速度等于向心加速度，因此满足 $\frac{\xi-1}{|\xi-1|^3}+\frac{\xi+1}{|\xi+1|^3}=\frac{\xi}{4}$。其中 $L_2$ 对应 $\xi>1$，$L_3$ 对应 $\xi<-1$，该方程即为所求位置方程。

(c) **求：$L_4$ 与 $L_5$ 的 $y$ 坐标**。解：令星舰在 $y$ 轴上，位置为 $(0,y)$，到两颗恒星距离均为 $s=\sqrt{R^2+y^2}$。两恒星引力的水平分量抵消，竖直分量合力大小为 $\frac{2GMm|y|}{s^3}$，向心力大小为 $m\Omega^2|y|$。对 $y\ne0$ 有 $\frac{2GM}{s^3}=\Omega^2=\frac{GM}{4R^3}$，故 $s=2R$，因此 $y=\pm\sqrt3R$，即 $L_4$ 在 $y=+\sqrt3R$，$L_5$ 在 $y=-\sqrt3R$。

(d) **求：两颗恒星质量变为 $M_1$ 与 $M_2$、距离仍为 $2R$ 时的角速度大小**。解：双体圆周运动角速度满足 $\Omega^2=\frac{G(M_1+M_2)}{d^3}$，其中星间距 $d=2R$，故 $\Omega=\sqrt{\frac{G(M_1+M_2)}{8R^3}}$。

(e) **求：质量不等时 $L_4$ 与 $L_5$ 的位置是否会相对等质量情形改变**。解：会改变，因此答案为 Yes。**1. 悬臂梁、绳与水平缆索的静力平衡**

背景：梁铰接于墙，末端水平距离为 $a$、竖直高度为 $b$，梁长为 $\sqrt{a^2+b^2}$。重物质量 $M$ 挂在梁端，均匀梁质量为 $m$，缆索水平，绳和缆索质量忽略。

(a) **求：画出梁所受力**。解：梁受四类力：末端缆索张力 $T_c$ 水平向左，末端重物通过绳对梁的拉力 $Mg$ 竖直向下，梁自身重力 $mg$ 作用于梁中点并竖直向下，铰链对梁的支持力分解为水平分量 $H_x$ 和竖直分量 $H_y$。

(b) **求：缆索张力 $T_c$ 的大小**。解：取铰链为转轴，静力平衡要求总力矩为零，缆索张力的力臂为 $b$，重物重力的力臂为 $a$，梁重力的力臂为 $a/2$，故 $T_cb=Mga+mg\frac{a}{2}$，得 $T_c=\frac{ag(M+m/2)}{b}$。

(c) **求：铰链对梁的合力大小**。解：水平方向平衡给出 $H_x=T_c=\frac{ag(M+m/2)}{b}$，竖直方向平衡给出 $H_y=(M+m)g$，所以铰链合力大小为 $H=\sqrt{H_x^2+H_y^2}=g\sqrt{\left[\frac{a(M+m/2)}{b}\right]^2+(M+m)^2}$。

(d) **求：该合力是否沿梁方向，并解释原因**。解：若合力沿梁方向，应满足 $\frac{H_y}{H_x}=\frac{b}{a}$；但实际 $\frac{H_y}{H_x}=\frac{b(M+m)}{a(M+m/2)}\ne\frac{b}{a}$，因此合力不沿梁方向。原因是缆索水平拉力和两个竖直重力共同决定铰链反力，其方向不必与梁共线。

**2. 圆柱体在一层与两层液体中的浮力平衡**

背景：圆柱密度为 $\rho$，截面积为 $s$，长度为 $l$。第一种液体密度为 $\rho_1$，且 $\rho<\rho_1$；第二种液体密度为 $\rho_2$，且 $\rho_2<\rho$。忽略空气浮力。

(a) **求：圆柱重力大小**。解：圆柱体积为 $sl$，质量为 $\rho sl$，所以重力大小为 $W=\rho slg$。

(b) **求：由平衡条件确定液体对圆柱的浮力大小与方向**。解：圆柱静止平衡，竖直方向合力为零，因此浮力大小等于重力，方向竖直向上，即 $F_B=\rho slg$，方向向上。

(c) **求：露出液面高度为 $h_1$ 时，按阿基米德原理写出浮力大小**。解：浸入第一种液体的长度为 $l-h_1$，排开液体体积为 $s(l-h_1)$，故浮力大小为 $F_B=\rho_1gs(l-h_1)$。

(d) **求：$h_1$ 关于其余参数的表达式**。解：由平衡 $\rho_1gs(l-h_1)=\rho slg$，消去 $sg$ 得 $\rho_1(l-h_1)=\rho l$，所以 $h_1=l\left(1-\frac{\rho}{\rho_1}\right)$。

(e) **求：加入第二种液体并完全浸没圆柱后，圆柱在第二种液体中的长度 $h_2$**。解：圆柱有长度 $h_2$ 位于第二种液体中，长度 $l-h_2$ 位于第一种液体中，总浮力为 $F_B=\rho_2gsh_2+\rho_1gs(l-h_2)$。平衡条件为 $\rho_2h_2+\rho_1(l-h_2)=\rho l$，解得 $h_2=\frac{(\rho_1-\rho)l}{\rho_1-\rho_2}$。当 $\rho_2=0$ 时，得 $h_2=l\left(1-\frac{\rho}{\rho_1}\right)$，与上一问一致。

**3. 弹簧耦合摆的小振动**

背景：摆球质量为 $m$，无质量细杆长为 $L$，两侧弹簧劲度系数均为 $k$。摆球在最低点时两弹簧均未伸长，令小角位移为 $\theta$。

(a) **求：小振动时摆球的运动方程**。解：摆球水平位移为 $x=L\sin\theta$，两弹簧合水平回复力为 $-2kx=-2kL\sin\theta$，其对悬点力矩为 $-2kL^2\sin\theta\cos\theta$；重力力矩为 $-mgL\sin\theta$。由转动方程得 $mL^2\ddot{\theta}=-mgL\sin\theta-2kL^2\sin\theta\cos\theta$。

(b) **求：证明该振动为简谐运动**。解：小角近似下 $\sin\theta\approx\theta$、$\cos\theta\approx1$，运动方程化为 $mL^2\ddot{\theta}=-(mgL+2kL^2)\theta$，即 $\ddot{\theta}+\left(\frac{g}{L}+\frac{2k}{m}\right)\theta=0$。该方程为标准简谐运动方程。

(c) **求：小振幅振动周期**。解：由 $\Omega^2=\frac{g}{L}+\frac{2k}{m}$，周期为 $T=\frac{2\pi}{\Omega}=\frac{2\pi}{\sqrt{g/L+2k/m}}$。

**4. 两物块与滑轮系统**

背景：悬挂物块质量为 $m_1$，桌面物块质量为 $m_2$，桌面无摩擦。滑轮半径为 $R$，若有质量则为薄圆盘，转动惯量 $I=\frac{1}{2}MR^2$。绳不伸长且不打滑。

(a) **求：滑轮无质量时两物块刚开始运动的加速度大小与方向**。解：无质量滑轮两侧张力相同。对悬挂物块有 $m_1g-T=m_1a$，对桌面物块有 $T=m_2a$，联立得 $a=\frac{m_1g}{m_1+m_2}$。方向为 $m_1$ 向下、$m_2$ 向滑轮方向运动。

(b) **求：滑轮无质量时绳中张力大小**。解：由 $T=m_2a$，代入上一问结果得 $T=\frac{m_1m_2g}{m_1+m_2}$。

(c) **求：滑轮有质量时两物块刚开始运动的加速度大小与方向**。解：设悬挂侧张力为 $T_1$，桌面侧张力为 $T_2$。方程为 $m_1g-T_1=m_1a$，$T_2=m_2a$，$(T_1-T_2)R=I\alpha$，且 $a=R\alpha$。代入 $I=\frac{1}{2}MR^2$，得 $T_1-T_2=\frac{1}{2}Ma$，所以 $a=\frac{m_1g}{m_1+m_2+M/2}$。方向仍为 $m_1$ 向下、$m_2$ 向滑轮方向运动。

(d) **求：滑轮有质量时两侧绳张力大小**。解：悬挂侧张力 $T_1=m_1g-m_1a=m_1g\frac{m_2+M/2}{m_1+m_2+M/2}$；桌面侧张力 $T_2=m_2a=\frac{m_1m_2g}{m_1+m_2+M/2}$。

(e) **求：悬挂物块刚到地面时，$m_1$、$m_2$ 和滑轮的动能**。解：设此时绳速为 $v$，由机械能守恒 $m_1gh=\frac{1}{2}m_1v^2+\frac{1}{2}m_2v^2+\frac{1}{2}I\frac{v^2}{R^2}$，得 $v^2=\frac{2m_1gh}{m_1+m_2+M/2}$。因此 $K_1=\frac{1}{2}m_1v^2=\frac{m_1^2gh}{m_1+m_2+M/2}$，$K_2=\frac{1}{2}m_2v^2=\frac{m_1m_2gh}{m_1+m_2+M/2}$，$K_M=\frac{1}{2}I\frac{v^2}{R^2}=\frac{(M/2)m_1gh}{m_1+m_2+M/2}$。

(f) **求：总动能并验证合理性**。解：总动能为 $K_{\rm tot}=K_1+K_2+K_M=m_1gh$，正好等于悬挂物块减少的重力势能，符合机械能守恒。

**5. 虹吸管中的伯努利方程**

背景：水库液面高度为 $h_1$，出口 $B$ 高度为 $h_2$，水平管段高度为 $h_3$。管内普通截面积为 $s_1$，扩张段截面积为 $s_2$。大气压为 $P_0$，水密度为 $\rho$，水库极大，液面速度近似为零。

(a) **求：水库液面外部点 $A$ 的压强 $P_A$**。解：点 $A$ 与大气相通，所以 $P_A=P_0$。

(b) **求：管口出口点 $B$ 的压强 $P_B$**。解：点 $B$ 也与大气相通，所以 $P_B=P_0$。

(c) **求：出口点 $B$ 的水速 $v_B$**。解：对 $A$ 与 $B$ 用伯努利方程，$P_0+\rho gh_1=P_0+\rho gh_2+\frac{1}{2}\rho v_B^2$，得 $v_B=\sqrt{2g(h_1-h_2)}$。

(d) **求：水库液面处管内点 $C$ 的水速 $v_C$**。解：点 $C$ 与出口 $B$ 位于同一截面积 $s_1$ 的连续管路中，稳恒不可压缩流满足连续性，因此 $v_C=v_B=\sqrt{2g(h_1-h_2)}$。

(e) **求：点 $C$ 的压强 $P_C$**。解：点 $A$ 与 $C$ 高度相同，且 $v_A\approx0$，由伯努利方程 $P_0=P_C+\frac{1}{2}\rho v_C^2$，得 $P_C=P_0-\frac{1}{2}\rho v_C^2=P_0-\rho g(h_1-h_2)$。

(f) **求：扩张段点 $D$ 的水速 $v_D$**。解：由连续性 $s_1v_B=s_2v_D$，得 $v_D=\frac{s_1}{s_2}v_B=\frac{s_1}{s_2}\sqrt{2g(h_1-h_2)}$。

(g) **求：扩张段点 $D$ 的压强 $P_D$**。解：对 $D$ 与 $B$ 用伯努利方程，$P_D+\rho gh_3+\frac{1}{2}\rho v_D^2=P_0+\rho gh_2+\frac{1}{2}\rho v_B^2$，所以 $P_D=P_0+\rho g(h_2-h_3)+\frac{1}{2}\rho(v_B^2-v_D^2)$。代入 $v_D=\frac{s_1}{s_2}v_B$ 与 $v_B^2=2g(h_1-h_2)$，得 $P_D=P_0+\rho g\left[h_1-h_3-(h_1-h_2)\frac{s_1^2}{s_2^2}\right]$。

**6. 实心圆柱沿斜面滚动与打滑**

背景：均匀实心圆柱质量为 $m$，半径为 $R$，转动惯量 $I=\frac{1}{2}mR^2$。斜面倾角为 $\theta$，静摩擦系数为 $\mu_s$，动摩擦系数为 $\mu_k$，圆柱从竖直高度 $h$ 处由静止释放。

(a) **求：当 $\theta<\theta_C$ 且无滑动滚动时，圆柱质心加速度**。解：沿斜面方向有 $mg\sin\theta-f=ma$，转动方程为 $fR=I\alpha$，无滑动条件为 $a=R\alpha$。代入 $I=\frac{1}{2}mR^2$ 得 $a=\frac{2}{3}g\sin\theta$，方向沿斜面向下。

(b) **求：$\tan\theta_C$**。解：无滑动所需静摩擦为 $f=\frac{1}{3}mg\sin\theta$，最大静摩擦为 $f_{s,\max}=\mu_smg\cos\theta$。临界时 $\frac{1}{3}mg\sin\theta_C=\mu_smg\cos\theta_C$，故 $\tan\theta_C=3\mu_s$。

(c) **求：当 $\theta>\theta_C$ 且圆柱滚动伴随打滑时的各量**。解：i. 摩擦为动摩擦，大小 $f_k=\mu_kmg\cos\theta$，方向沿斜面向上。ii. 质心加速度由 $mg\sin\theta-f_k=ma_{\rm cm}$ 得 $a_{\rm cm}=g(\sin\theta-\mu_k\cos\theta)$，角加速度大小由 $f_kR=I\alpha$ 得 $\alpha=\frac{2\mu_kg\cos\theta}{R}$。iii. 质心到达地面所走距离为斜面长度 $L_{\rm cm}=\frac{h}{\sin\theta}$。iv. 由 $L_{\rm cm}=\frac{1}{2}a_{\rm cm}t^2$ 与 $\Delta\theta=\frac{1}{2}\alpha t^2$，得 $\Delta\theta=\frac{\alpha L_{\rm cm}}{a_{\rm cm}}=\frac{2\mu_kh\cos\theta}{R\sin\theta(\sin\theta-\mu_k\cos\theta)}$。v. 一般 $L_{\rm cm}\ne R\Delta\theta$，因为发生相对滑动，无滑动约束 $a_{\rm cm}=R\alpha$ 不成立。

**7. 扭摆的简谐振动、阻尼与受迫振动**

背景：圆盘质量为 $M$，半径为 $R$，转动惯量 $I=\frac{1}{2}MR^2$。扭转常数为 $\kappa$，回复力矩为 $\tau=-\kappa\theta$，初始释放角为 $\theta_m$ 且初始角速度为零。

(a) **求：释放后圆盘是否做简谐运动**。解：是。由 $I\ddot{\theta}=-\kappa\theta$ 得 $\ddot{\theta}+\frac{\kappa}{I}\theta=0$，这是简谐运动方程。

(b) **求：振动角频率 $\Omega$**。解：由 $\Omega^2=\frac{\kappa}{I}$ 且 $I=\frac{1}{2}MR^2$，得 $\Omega=\sqrt{\frac{2\kappa}{MR^2}}$。

(c) **求：角位移 $\theta(t)$**。解：释放条件为 $\theta(0)=\theta_m$、$\omega(0)=0$，故 $\theta(t)=\theta_m\cos(\Omega t)$。

(d) **求：角速度 $\omega(t)$**。解：角速度为 $\omega(t)=\dot{\theta}(t)=-\Omega\theta_m\sin(\Omega t)$。

(e) **求：圆盘动能 $K(t)$**。解：转动动能为 $K(t)=\frac{1}{2}I\omega^2(t)=\frac{1}{2}\kappa\theta_m^2\sin^2(\Omega t)$。

(f) **求：振动总机械能**。解：总机械能等于最大弹性势能，即 $E=\frac{1}{2}\kappa\theta_m^2$。

(g) **求：有轻微阻尼力矩 $\tau_d=-b\omega$ 时的运动方程**。解：总力矩为 $-\kappa\theta-b\dot{\theta}$，故方程为 $I\ddot{\theta}+b\dot{\theta}+\kappa\theta=0$，即 $\frac{1}{2}MR^2\ddot{\theta}+b\dot{\theta}+\kappa\theta=0$。

(h) **求：无阻尼受迫振动时使振幅最大的驱动角频率**。解：无阻尼时共振发生在驱动角频率等于固有角频率处，因此 $\Omega_{\rm ex}=\Omega=\sqrt{\frac{2\kappa}{MR^2}}$。

**8. 开管与闭管中的驻波共振**

背景：声波速度为 $v_s$，管长为 $L$。开口端为空气位移波腹，闭口端为空气位移波节。

(a) **求：两端开口管的前三个谐波，并标出波节与波腹**。解：两端开口均为位移波腹。第一谐波为 $A-N-A$，即两端为波腹、中点为波节；第二谐波为 $A-N-A-N-A$，即 $x=0,L/2,L$ 为波腹，$x=L/4,3L/4$ 为波节；第三谐波为 $A-N-A-N-A-N-A$，即 $x=0,L/3,2L/3,L$ 为波腹，$x=L/6,L/2,5L/6$ 为波节。

(b) **求：两端开口管第 $N$ 次谐波的共振波长与频率**。解：两端开口管满足 $L=N\frac{\lambda_N}{2}$，其中 $N=1,2,3,\ldots$，所以 $\lambda_N=\frac{2L}{N}$，$f_N=\frac{v_s}{\lambda_N}=\frac{Nv_s}{2L}$。

(c) **求：一端封闭管的前三个谐波，并标出波节与波腹**。解：闭口端为位移波节，开口端为位移波腹。第一谐波为 $N-A$；第二个允许模态为 $N-A-N-A$；第三个允许模态为 $N-A-N-A-N-A$。对应地，管长分别含有 $1$、$3$、$5$ 个四分之一波长。

(d) **求：一端封闭管第 $N$ 次允许谐波的共振波长与频率**。解：一端封闭管满足 $L=(2N-1)\frac{\lambda_N}{4}$，其中 $N=1,2,3,\ldots$，所以 $\lambda_N=\frac{4L}{2N-1}$，$f_N=\frac{v_s}{\lambda_N}=\frac{(2N-1)v_s}{4L}$。

**9. 声速的牛顿理论与拉普拉斯理论**

背景：纵波声速为 $v=\sqrt{\frac{B}{\rho}}$，体积模量定义为 $B=-\frac{\Delta p}{\Delta V/V}$。理想气体满足 $pV=RT$，空气密度为 $\rho_{\rm air}$，压强为 $p_0$，绝热指数为 $\gamma$。

(a) **求：牛顿等温理论下的体积模量 $B$**。解：等温时 $pV=RT=\text{constant}$，微分得 $pdV+Vdp=0$，所以 $dp=-\frac{p}{V}dV$。由 $B=-\frac{dp}{dV/V}$ 得 $B=p$；在大气条件下 $B_N=p_0$。

(b) **求：拉普拉斯绝热理论下的体积模量 $B$**。解：绝热过程满足 $pV^\gamma=\text{constant}$，微分得 $V^\gamma dp+\gamma pV^{\gamma-1}dV=0$，即 $dp=-\gamma\frac{p}{V}dV$。因此 $B=-\frac{dp}{dV/V}=\gamma p$；在大气条件下 $B_L=\gamma p_0$。

(c) **求：牛顿理论与拉普拉斯理论给出的声速**。解：牛顿理论给出 $v_N=\sqrt{\frac{p_0}{\rho_{\rm air}}}$；拉普拉斯理论给出 $v_L=\sqrt{\frac{\gamma p_0}{\rho_{\rm air}}}$。

(d) **求：哪一个更接近实验测量，并给出物理解释**。解：拉普拉斯理论更接近实验。声波传播很快，气体压缩和稀疏过程中来不及与外界充分热交换，因此过程近似绝热而非等温，故应使用 $B=\gamma p$。

**10. 两相干点波源的水波干涉**

背景：两点源 $S_1$ 与 $S_2$ 发出同频同波长水波，源间距为 $d$，波长为 $\lambda$，任一点 $P$ 的路程差为 $\Delta L=|PS_1-PS_2|$。

(a) **求：两源同相时任一点 $P$ 的相长干涉条件**。解：同相源的相位差只来自路程差，相长干涉要求路程差为波长整数倍，因此 $\Delta L=n\lambda$，其中 $n=0,1,2,\ldots$。

(b) **求：两源反相时任一点 $P$ 的相长干涉条件**。解：两源初相差为 $\pi$，若传播引起的相位差再提供奇数个 $\pi$，总相位差为 $2\pi$ 的整数倍，因此相长条件为 $\Delta L=\left(n+\frac{1}{2}\right)\lambda$，其中 $n=0,1,2,\ldots$。

(c) **求：同相与反相时水面干涉图样是否相同**。解：不同。同相时 $\Delta L=n\lambda$ 为相长、$\Delta L=\left(n+\frac{1}{2}\right)\lambda$ 为相消；反相时两者互换，因此节点线和波腹线位置互换。

(d) **求：同相且远场时第 $n$ 条节点线满足的角度关系**。解：远场近似下路程差为 $\Delta L=d\sin\theta_n$。同相源的节点线为相消干涉，满足 $\Delta L=\left(n-\frac{1}{2}\right)\lambda$，其中 $n=1,2,3,\ldots$，故 $\sin\theta_n=\left(n-\frac{1}{2}\right)\frac{\lambda}{d}$。

(e) **求：同相且 $d=3\lambda$ 时上半平面的节点线条数**。解：节点线存在要求 $\sin\theta_n\le1$，即 $\left(n-\frac{1}{2}\right)\frac{\lambda}{d}\le1$。当 $d=3\lambda$ 时，$n-\frac{1}{2}\le3$，所以 $n=1,2,3$。每个 $n$ 在上半平面左右各一条节点线，故共有 $6$ 条。

(f) **求：没有节点线时 $d$ 与 $\lambda$ 的关系**。解：最小相消路程差为 $\frac{\lambda}{2}$，而最大可能路程差不超过 $d$。若 $d<\frac{\lambda}{2}$，则无法满足相消条件，因此没有节点线。

**11. 圆轨道、径向坠落与开普勒第三定律**

背景：中心天体质量为 $M$，且 $M\gg m_1,m_2$。物体 $m_1$ 绕 $M$ 做半径 $r_0$ 的圆周运动；物体 $m_2$ 从距中心 $2r_0$ 处由静止释放并径向下落。

(a) **求：圆轨道角速度 $\omega$ 的大小**。解：万有引力提供向心力，$\frac{GMm_1}{r_0^2}=m_1r_0\omega^2$，得 $\omega=\sqrt{\frac{GM}{r_0^3}}$。

(b) **求：$m_1$ 从 $a$ 到 $b$ 经过半圆的时间 $t_{ab}$**。解：半圆所需时间为周期的一半，故 $t_{ab}=\frac{\pi}{\omega}=\pi\sqrt{\frac{r_0^3}{GM}}$。

(c) **求：$m_2$ 在距中心 $r$ 处的速度 $v$**。解：机械能守恒给出 $\frac{1}{2}v^2-\frac{GM}{r}=-\frac{GM}{2r_0}$，所以 $v=\sqrt{2GM\left(\frac{1}{r}-\frac{1}{2r_0}\right)}$。

(d) **求：证明 $t_{co}=\sqrt{\frac{4r_0^3}{GM}}\int_0^1\sqrt{\frac{u}{1-u}}du$，其中 $u=\frac{r}{2r_0}$**。解：径向下落时间为 $t_{co}=\int_0^{2r_0}\frac{dr}{v}$。令 $u=\frac{r}{2r_0}$，则 $dr=2r_0du$，且 $v=\sqrt{\frac{GM}{r_0}\frac{1-u}{u}}$。代入得 $t_{co}=\sqrt{\frac{4r_0^3}{GM}}\int_0^1\sqrt{\frac{u}{1-u}}du$。

(e) **求：用 $u=\sin^2\theta$ 计算 $t_{co}$**。解：令 $u=\sin^2\theta$，则 $du=2\sin\theta\cos\theta d\theta$，$\sqrt{\frac{u}{1-u}}=\tan\theta$，积分化为 $\int_0^1\sqrt{\frac{u}{1-u}}du=\int_0^{\pi/2}2\sin^2\theta d\theta=\frac{\pi}{2}$，因此 $t_{co}=\pi\sqrt{\frac{r_0^3}{GM}}$。

(f) **求：解释为何 (b) 与 (e) 结果相同**。解：径向下落可看成偏心率 $e=1$ 的退化椭圆轨道，从远日点到近日点经历半个周期；该退化椭圆半长轴为 $r_0$，与半径 $r_0$ 的圆轨道半长轴相同。由开普勒第三定律，周期只由半长轴决定，因此两者半周期相同。

**12. 拉普拉斯-龙格-楞次矢量与水星近日点进动**

背景：行星质量为 $m$，太阳质量为 $M$，轨道半长轴为 $a$，偏心率为 $e$。LRL 矢量定义为 $\vec A=\vec v\times\vec L-GMm\hat r$。图中近日点在 $-\hat x$ 方向，行星逆时针运动。

(a) **求：水星角动量 $\vec L=\vec r\times\vec p$ 的方向**。解：逆时针轨道中，$\vec r\times\vec p$ 指向纸面外，即 $\vec L$ 沿 $+\hat k$ 方向。

(b) **求：证明引力沿 $\vec r$ 方向时 $\vec L$ 守恒**。解：角动量变化率为 $\frac{d\vec L}{dt}=\vec\tau=\vec r\times\vec F$。万有引力方向沿 $\vec r$ 或 $-\vec r$，故 $\vec r\times\vec F=0$，所以 $\frac{d\vec L}{dt}=0$，角动量守恒。

(c) **求：用近日点或远日点计算 LRL 矢量 $\vec A$**。解：在近日点 $P_1$，$\hat r=-\hat x$，$r_p=a(1-e)$，速度大小 $v_p=\sqrt{\frac{GM}{a}\frac{1+e}{1-e}}$，方向沿 $-\hat y$，角动量大小为 $L=mr_pv_p$。于是 $\vec v\times\vec L=-v_pL\hat x=-GMm(1+e)\hat x$，且 $-GMm\hat r=+GMm\hat x$，所以 $\vec A=-GMme\hat x$，方向沿 $-\hat x$。

(d) **求：广义相对论修正力下 $\frac{d\vec A}{dt}=D\frac{GML^2\omega}{mc^2r^2}\hat\theta$ 中的 $D$**。解：修正力为 $\vec F_{\rm GR}=-\frac{GMm}{r^2}\left(1+\frac{3L^2}{m^2c^2r^2}\right)\hat r$，牛顿部分对 $\frac{d\vec A}{dt}$ 的贡献相互抵消，只保留修正项。代入 $\vec L=mr^2\omega\hat k$ 后得 $\frac{d\vec A}{dt}=3\frac{GML^2\omega}{mc^2r^2}\hat\theta$，故 $D=3$。

(e) **求：将 $\frac{d\vec A}{dt}$ 投影到 $x,y$ 轴并对一周期积分，求 $\delta A_x$ 与 $\delta A_y$**。解：有 $\frac{d\vec A}{dt}=3\frac{GML^2\omega}{mc^2r^2}\hat\theta$，且 $\hat\theta=-\sin\theta\hat x+\cos\theta\hat y$，用 $d\theta=\omega dt$ 得 $\delta A_x=\frac{3GML^2}{mc^2}\int_0^{2\pi}\frac{-\sin\theta}{r^2}d\theta$，$\delta A_y=\frac{3GML^2}{mc^2}\int_0^{2\pi}\frac{\cos\theta}{r^2}d\theta$。由 $r(\theta)=\frac{a(1-e^2)}{1-e\cos\theta}$ 可得 $\delta A_x=0$，并用题给积分结果得 $\delta A_y=-\frac{6\pi GML^2e}{mc^2a^2(1-e^2)^2}$。再用 $L^2=GMm^2a(1-e^2)$，得 $\delta A_y=-\frac{6\pi (GM)^2me}{c^2a(1-e^2)}$。

(f) **求：证明每圈近日点进动角 $\delta\phi=\frac{6\pi GM}{c^2a(1-e^2)}$**。解：初始 $\vec A=-GMme\hat x$，其大小为 $A=GMme$。一圈后 $\delta A_x=0$，小角度转动满足 $\delta\phi=\frac{|\delta A_y|}{A}$，代入上一问结果得 $\delta\phi=\frac{6\pi GM}{c^2a(1-e^2)}$。
