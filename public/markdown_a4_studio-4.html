**2. 均匀实心球的转动惯量**

背景：均匀实心球质量 $M$，半径 $R$，密度 $\rho$，转轴过球心。

(a) **求：均匀实心球关于过球心轴的转动惯量**。解：把球分成厚度为 $dx$ 的薄圆盘，圆盘半径 $r=\sqrt{R^2-x^2}$，质量 $dm=\rho\pi r^2dx$，薄盘转动惯量为 $dI=\frac{1}{2}dm,r^2$。因此 $I=\frac{1}{2}\int_{-R}^{R}\rho\pi(R^2-x^2)^2dx=\frac{8}{15}\pi\rho R^5$。又 $M=\int_{-R}^{R}\rho\pi(R^2-x^2)dx=\frac{4}{3}\pi\rho R^3$，所以 $I=\frac{2}{5}MR^2$。

**3. 地球自转与公转动能**

背景：地球绕南北极轴的转动惯量为 $I=0.3308MR^2$，自转周期为 $T_{\rm rot}$，绕太阳公转可近似看作质点运动，轨道半径为 $R_{\rm orb}$，公转周期为 $T_{\rm orb}$。

(a) **求：地球自转动能**。解：角速度为 $\omega_{\rm rot}=\frac{2\pi}{T_{\rm rot}}$，转动动能为 $K_1=\frac{1}{2}I\omega_{\rm rot}^2=\frac{1}{2}(0.3308MR^2)\left(\frac{2\pi}{T_{\rm rot}}\right)^2$

(b) **求：地球绕太阳公转的动能**。解：把地球视为质量为 $M$ 的质点，公转速率为 $v=\frac{2\pi R_{\rm orb}}{T_{\rm orb}}$，故 $K_2=\frac{1}{2}Mv^2=\frac{1}{2}M\left(\frac{2\pi R_{\rm orb}}{T_{\rm orb}}\right)^2$

(c) **求：由地球转动惯量判断质量分布特征**。解：均匀实心球有 $I=0.400MR^2$，而地球为 $I=0.3308MR^2$，系数更小，说明更多质量集中在靠近地心的位置。

**4. 分层地球模型的质量与转动惯量**

背景：地球分为五层球壳：内核、外核、下地幔、上地幔、外壳与海洋；每层密度近似常数。均匀球关于直径的转动惯量为 $I=\frac{2}{5}MR^2=\frac{8\pi}{15}\rho R^5$。

(a) **求：内半径 $R_1$、外半径 $R_2$、密度 $\rho$ 的均匀球壳关于直径的转动惯量**。解：用外半径 $R_2$ 的实心球减去内半径 $R_1$ 的实心球，得 $I_{\rm shell}=\frac{8\pi}{15}\rho R_2^5-\frac{8\pi}{15}\rho R_1^5=\rho\frac{8\pi}{15}(R_2^5-R_1^5)$。

(b) **求：用分层密度数据计算地球质量**。解：每层球壳质量为 $M_i=\frac{4\pi}{3}\rho_i(R_{i,2}^3-R_{i,1}^3)$，所以总质量为 $M=\sum_i\frac{4\pi}{3}\rho_i(R_{i,2}^3-R_{i,1}^3)$。把五层半径与密度代入该符号求和式，文件给出的结果为 $M=5.97\times10^{24},\mathrm{kg}$。

(c) **求：用分层密度数据计算地球转动惯量，并写成 $MR^2$ 的倍数**。解：每层球壳转动惯量为 $I_i=\frac{8\pi}{15}\rho_i(R_{i,2}^5-R_{i,1}^5)$，所以总转动惯量为 $I=\sum_i\frac{8\pi}{15}\rho_i(R_{i,2}^5-R_{i,1}^5)$。代入五层数据后，文件给出 $I=8.12\times10^{37},\mathrm{kg,m^2}$；用 $M=5.97\times10^{24},\mathrm{kg}$ 与 $R=6370,\mathrm{km}$，得 $I=0.335MR^2$。

**5. 力对原点的力矩**

背景：力为 $\vec F=(-5.00,\mathrm{N})\hat i+(4.00,\mathrm{N})\hat j$，作用点位置矢量为 $\vec r=(-0.450,\mathrm{m})\hat i+(0.150,\mathrm{m})\hat j$。

(a) **求：画出 $\vec r$、$\vec F$ 与原点的位置关系**。解：$\vec r$ 指向第二象限附近的作用点，$\vec F$ 从该点指向左上方，即 $x$ 分量为负、$y$ 分量为正；原点位于坐标轴交点处。

(b) **求：用右手定则判断力矩方向**。解：力矩方向由 $\vec\tau=\vec r\times\vec F$ 给出，右手从 $\vec r$ 转向 $\vec F$ 时拇指指向纸内，因此力矩沿 $-z$ 方向。

(c) **求：计算关于原点的矢量力矩，并验证方向**。解：$\vec\tau=\vec r\times\vec F=[(-0.450)(4.00)-(0.150)(-5.00)]\hat k,\mathrm{N,m}=(-1.05,\mathrm{N,m})\hat k$，结果为负 $\hat k$ 方向，与第 b 问的 $-z$ 方向一致。

**6. 绕线圆柱与下落物块**

背景：轻质不可伸长绳绕在质量 $M$、半径 $R$ 的实心圆柱上，圆柱绕固定水平轴无摩擦转动，绳端系质量 $m$ 的物块，物块从距地面高度 $h$ 处由静止释放，绳不打滑。

(a) **求：物块下落加速度与绳张力**。解：取物块向下为正，对物块有 $mg-T=ma_y$；对圆柱有 $\tau=TR=I\alpha=\frac{1}{2}MR^2\alpha$；绳不打滑给出 $a_y=\alpha R$。联立得 $a_y=\frac{g}{1+M/(2m)}$，再由 $T=mg-ma_y$ 得 $T=\frac{mg}{1+2m/M}$。

(b) **求：用能量法求物块落下高度 $h$ 后的速度，并检验加速度**。解：绳不打滑且不损失机械能，故 $mgh=\frac{1}{2}mv^2+\frac{1}{2}I\omega^2$，其中 $I=\frac{1}{2}MR^2$，且 $v=R\omega$。因此 $v=\sqrt{\frac{2gh}{1+I/(mR^2)}}=\sqrt{\frac{2gh}{1+M/(2m)}}$，并有 $\omega=\frac{v}{R}$；由 $a_y=\frac{v^2}{2h}$ 得 $a_y=\frac{g}{1+M/(2m)}$，与动力学结果一致。

**6补充. 三个力对轴的合力矩**

背景：图中三力 $F_1,F_2,F_3$ 作用于刚体，取逆时针为正方向，关于图示轴计算力矩。

(a) **求：各力矩与合力矩方向**。解：用 $\vec\tau=\vec r\times\vec F$ 或 $\tau=rF\sin\phi$。由图中力臂可得 $\tau_1=-F_1r_1/\sqrt{2}$，$\tau_2=+F_2r_2/\sqrt{2}$，$\tau_3=+F_3r_3$；文件代入图中数据得到 $\tau_1=-1.62,\mathrm{N,m}$，$\tau_2=+2.34,\mathrm{N,m}$，$\tau_3=+1.78,\mathrm{N,m}$。因此 $\tau=\tau_1+\tau_2+\tau_3=2.50,\mathrm{N,m}$，合力矩为正，趋向产生逆时针转动，矢量方向指向纸外。

**7. 瞬时转轴**

背景：刚体平面运动中，瞬时转轴是该瞬间速度为零的点；薄轮在水平面上运动，质心速度为 $v_{\rm cm}$，角速度为 $\omega$，薄轮关于质心的转动惯量为 $I_{\rm cm}=MR^2$。

(a) **求：把无滑动滚动看作质心平动加绕质心转动时的动能**。解：无滑动时 $v_{\rm cm}=\omega R$，总动能为 $K=\frac{1}{2}Mv_{\rm cm}^2+\frac{1}{2}I_{\rm cm}\omega^2=\frac{1}{2}M\omega^2R^2+\frac{1}{2}MR^2\omega^2=MR^2\omega^2$。

(b) **求：把无滑动滚动看作绕接地点瞬时转轴纯转动时的动能**。解：接地点为瞬时静止点，关于该点的转动惯量由平行轴定理得 $I=I_{\rm cm}+MR^2=2MR^2$，所以 $K=\frac{1}{2}I\omega^2=MR^2\omega^2$，与第 a 问一致。

(c) **求：若令 $\omega=2v_{\rm cm}/R$ 且轮子打滑，瞬时转轴位置与动能**。解：瞬时转轴在过质心且垂直于 $v_{\rm cm}$ 的直线上，由速度合成关系可知它位于地面上方 $R/2$ 处。用质心法，$K=\frac{1}{2}Mv_{\rm cm}^2+\frac{1}{2}MR^2\omega^2=\frac{5}{2}Mv_{\rm cm}^2$；又因 $\omega=2v_{\rm cm}/R$，可写为 $K=\frac{5}{8}MR^2\omega^2$。用瞬时转轴法，$I=I_{\rm cm}+M(R/2)^2=\frac{5}{4}MR^2$，故 $K=\frac{1}{2}I\omega^2=\frac{5}{8}MR^2\omega^2=\frac{5}{2}Mv_{\rm cm}^2$。

(d) **求：用平行轴定理说明两种动能算法总是一致**。解：若瞬时转轴到质心距离为 $d$，则 $I=I_{\rm cm}+Md^2$；质心绕瞬时转轴运动给出 $v_{\rm cm}=\omega d$。因此 $K=\frac{1}{2}I\omega^2=\frac{1}{2}I_{\rm cm}\omega^2+\frac{1}{2}Md^2\omega^2=\frac{1}{2}I_{\rm cm}\omega^2+\frac{1}{2}Mv_{\rm cm}^2$，与质心平动加绕质心转动的表达式一致。

**8. 三个悠悠球的转动方向**

背景：三个相同悠悠球在水平面上由静止开始，绳子按图示方向受拉，静摩擦足够大，使悠悠球无滑动滚动。

(a) **求：分别画自由体图，并判断三个悠悠球的转动方向**。解：每个悠悠球受重力 $Mg$、支持力 $N$、静摩擦力 $f$ 与绳张力 $F$。取接地点为瞬时转轴，重力、支持力与摩擦力对该点力矩为零，只有绳张力 $F$ 对该点产生力矩；图中三种拉法下，$F$ 关于接地点的力矩均为顺时针方向，因此三个悠悠球都从静止开始顺时针转动。

(b) **求：用质心轴观点解释摩擦力的作用**。解：以质心为转轴时分析更复杂：第一种情形下 $F$ 与 $f$ 方向相反，摩擦力力矩较大并使悠悠球顺时针转动；第二种情形下 $F$ 与 $f$ 的力矩均为顺时针；第三种情形下摩擦力推动悠悠球向右，而 $F$ 的力矩大于摩擦力力矩，合力矩仍为顺时针。因此三者结论仍是顺时针转动。

**9. 悠悠球摩擦为零的位置与摩擦方向**

背景：悠悠球近似为质量 $M$ 的圆盘，半径 $R$，绳以力 $F$ 向右拉，绳的作用线距中心的垂直距离为 $d$，且 $0\le d\le R$；静摩擦足够大使其无滑动滚动，圆盘关于质心的转动惯量为 $I_{\rm cm}=\frac{1}{2}MR^2$。

(a) **求：在 $0\le d\le R$ 中，使摩擦力为零的 $d$**。解：令摩擦力为零，则平动方程为 $F=Ma$，转动方程可写为 $Fd=I_{\rm cm}\alpha$，无滑动条件为 $a=\alpha R$。联立得 $d=\frac{I_{\rm cm}}{MR}=\frac{R}{2}$。

(b) **求：在 $0\le d\le R$ 中摩擦力方向**。解：先假设摩擦力 $f$ 向左，则平动方程为 $F-f=Ma$，转动方程为 $Fd+fR=I_{\rm cm}\alpha$，无滑动条件为 $a=\alpha R$。联立得 $f=\frac{F}{3R}(R-2d)$。当 $d<R/2$ 时，$f>0$，假设成立，摩擦力向左；当 $d=R/2$ 时，$f=0$；当 $d>R/2$ 时，$f<0$，说明实际摩擦力向右。
**1. 细杆的角加速度**

背景：长为 $\ell$、质量为 $M$ 的均匀细杆在无摩擦水平面上绕一端的竖直轴转动，另一端受大小为 $F$ 的力，力始终垂直于杆和转轴。

(a) **求：细杆角加速度的大小**。解：绕端点转动时力矩为 $\tau=F\ell$，均匀细杆绕端点的转动惯量为 $I=\frac{1}{3}M\ell^2$。由转动形式牛顿第二定律 $\tau=I\alpha$，得 $\alpha=\frac{\tau}{I}=\frac{F\ell}{\frac{1}{3}M\ell^2}=\frac{3F}{M\ell}$。

**2. 中子星的自转角速度**

背景：恒星坍缩前后都看作均匀实心刚性球，初半径为 $R_i$，末半径为 $R_f$，初角速度为 $\omega_i$，坍缩过程中角动量近似守恒。

(a) **求：坍缩后中子星的角速度**。解：均匀实心球转动惯量为 $I=\frac{2}{5}MR^2$，角动量守恒给出 $I_i\omega_i=I_f\omega_f$，所以 $\frac{2}{5}MR_i^2\omega_i=\frac{2}{5}MR_f^2\omega_f$，得 $\omega_f=\omega_i\left(\frac{R_i}{R_f}\right)^2$。若初始周期为 $T_i$，则 $\omega_i=\frac{2\pi}{T_i}$，因此 $\omega_f=\frac{2\pi}{T_i}\left(\frac{R_i}{R_f}\right)^2$。角速度大幅增大，因为半径显著减小而角动量近似保持不变。

**3. 小球沿斜面向上滚动**

背景：均匀实心球半径为 $R$、质量为 $m$，在倾角为 $\beta$ 的斜面上无滑动向上滚动，转动惯量为 $I=\frac{2}{5}mR^2$。

(a) **求：小球受力图，并说明摩擦力为何沿斜面向上**。解：小球受重力 $mg$、支持力 $n$ 和静摩擦力 $f_s$。重力沿斜面向下分量为 $mg\sin\beta$，垂直斜面分量为 $mg\cos\beta$。小球向上滚动时，平动速度和角速度都要减小，且保持无滑动条件 $v=\omega R$。绕质心看，重力和支持力对质心无力矩，唯一改变角速度的力矩来自摩擦力。要使角速度减小并维持 $v=\omega R$，摩擦力必须沿斜面向上。

(b) **求：小球质心加速度的大小**。解：取沿斜面向下为正，则平动方程为 $ma_{cm}=mg\sin\beta-f_s$，转动方程为 $I\alpha=f_sR$，即 $\frac{2}{5}mR^2\alpha=f_sR$。无滑动条件给出 $a_{cm}=R\alpha$。联立得 $f_s=\frac{2}{5}ma_{cm}$，代回平动方程得 $ma_{cm}=mg\sin\beta-\frac{2}{5}ma_{cm}$，因此 $a_{cm}=\frac{5}{7}g\sin\beta$，方向沿斜面向下，表示上滚时减速。

(c) **求：防止打滑所需的最小静摩擦因数**。解：由上一问 $f_s=\frac{2}{5}ma_{cm}=\frac{2}{7}mg\sin\beta$。垂直斜面方向无加速度，故 $n=mg\cos\beta$。无滑动要求 $f_s\leq \mu_s n$，因此 $\mu_s\geq \frac{f_s}{n}=\frac{2}{7}\tan\beta$，最小值为 $\mu_s=\frac{2}{7}\tan\beta$。

**4. 滚动物体竞速**

背景：不同刚体从同一高度 $h$ 的斜面顶端由静止开始无滑动滚下，设其转动惯量为 $I=cMR^2$，其中 $c$ 由形状决定。

(a) **求：什么形状的物体最先到达斜面底端**。解：用机械能守恒，初态能量为 $Mgh$，末态为平动动能加转动动能，即 $Mgh=\frac{1}{2}Mv_{cm}^2+\frac{1}{2}I\omega^2$。无滑动条件为 $\omega=\frac{v_{cm}}{R}$，代入 $I=cMR^2$ 得 $Mgh=\frac{1}{2}Mv_{cm}^2+\frac{1}{2}cMR^2\frac{v_{cm}^2}{R^2}$，所以 $v_{cm}=\sqrt{\frac{2gh}{1+c}}$。因此 $c$ 越小，底端速度越大，越先到达；常见物体中均匀实心球 $c=\frac{2}{5}$ 小于实心圆柱 $c=\frac{1}{2}$，所以实心球最快。

**5. 溜溜球被水平拉动**

背景：溜溜球总质量为 $m$，外半径为 $R$，轴半径为 $b$，绕质心转动惯量近似为 $I_{cm}=\frac{1}{2}mR^2$。细线以水平力 $F$ 向右拉，溜溜球在桌面上无滑动滚动。

(a) **求：无滑动时溜溜球的加速度**。解：以接触点为瞬时转轴，则转动惯量为 $I=I_{cm}+mR^2=\frac{3}{2}mR^2$。取逆时针为正，拉力对瞬时轴的力矩为 $\tau=-F(R-b)$，所以 $\frac{3}{2}mR^2\alpha=-F(R-b)$。平动方程为 $F-f=ma$，无滑动条件为 $a+R\alpha=0$。联立可得 $a=\frac{2F}{3m}\left(1-\frac{b}{R}\right)$，摩擦力为 $f=\frac{2b+R}{3R}F$。当 $b<R$ 时，加速度向右。

(b) **求：给定静摩擦因数 $\mu_s$ 时，保持无滑动的最大拉力大小**。解：由上一问静摩擦力大小为 $f=\frac{2b+R}{3R}F$。无滑动要求 $f\leq \mu_s mg$，所以 $\frac{2b+R}{3R}F\leq \mu_s mg$，得 $F\leq \frac{3R}{2b+R}\mu_s mg$。因此最大拉力为 $F_{\max}=\frac{3R}{2b+R}\mu_s mg$。

**6. 初始只自转的小球在粗糙水平面上运动**

背景：均匀实心球质量为 $M$、半径为 $R$，转动惯量 $I_{cm}=\frac{2}{5}MR^2$。放到水平面前有顺时针角速度 $\omega_0$，质心初速度为 $0$，动摩擦因数为 $\mu_k$。

(a) **求：小球将向哪个方向运动**。解：初始顺时针转动时，球底部接触点相对地面向左滑动，因此动摩擦力反向，指向右。摩擦力是唯一水平外力，所以小球质心向右加速，最终向右运动。

(b) **求：小球经过多久开始无滑动滚动**。解：取逆时针为角速度正方向，则初始角速度为 $-\omega_0$。摩擦力大小为 $f=\mu_kMg$，平动方程给出 $a_{cm}=\mu_kg$。绕质心转动有 $fR=I_{cm}\alpha$，即 $\mu_kMgR=\frac{2}{5}MR^2\alpha$，得 $\alpha=\frac{5\mu_kg}{2R}$。因此 $v_{cm}=\mu_kgt$，$\omega=-\omega_0+\frac{5\mu_kg}{2R}t$。接触点速度为 $v_B=v_{cm}+\omega R=\mu_kgt-\omega_0R+\frac{5\mu_kg}{2}t$。开始无滑动时 $v_B=0$，所以 $t=\frac{2\omega_0R}{7\mu_kg}$。

(c) **求：此过程中损失的机械能**。解：在 $t=\frac{2\omega_0R}{7\mu_kg}$ 时，$v_f=\frac{2}{7}\omega_0R$，$\omega_f=-\frac{2}{7}\omega_0$。初始动能为 $K_0=\frac{1}{2}I_{cm}\omega_0^2=\frac{1}{5}MR^2\omega_0^2$，末动能为 $K_f=\frac{1}{2}Mv_f^2+\frac{1}{2}I_{cm}\omega_f^2=\frac{2}{35}MR^2\omega_0^2$。因此 $\Delta K=K_f-K_0=-\frac{1}{7}MR^2\omega_0^2$，负号表示能量因摩擦而损失。

**7. 瓢虫在转盘上向中心移动**

背景：质量为 $m$ 的瓢虫在质量为 $4m$、半径为 $R$ 的均匀圆盘边缘，圆盘可绕中心自由转动。初始瓢虫和圆盘共同以角速度 $\omega_0$ 转动，之后瓢虫走到距中心 $R/2$ 处。圆盘转动惯量为 $I=\frac{1}{2}(4m)R^2=2mR^2$。

(a) **求：瓢虫—圆盘系统新的角速度**。解：系统绕中心轴无外力矩，角动量守恒。初始角动量为 $L_i=mR^2\omega_0+2mR^2\omega_0=3mR^2\omega_0$。末态瓢虫距中心 $R/2$，角动量为 $L_f=m\left(\frac{R}{2}\right)^2\omega_f+2mR^2\omega_f=\left(\frac{1}{4}+2\right)mR^2\omega_f=\frac{9}{4}mR^2\omega_f$。令 $L_i=L_f$，得 $\omega_f=\frac{4}{3}\omega_0$。

(b) **求：末动能与初动能之比 $K_f/K_0$**。解：系统动能为 $K=\frac{1}{2}m(\omega r)^2+\frac{1}{2}I\omega^2$。也可利用 $K=\frac{1}{2}L\omega$，且角动量守恒，所以 $\frac{K_f}{K_0}=\frac{L_f\omega_f}{L_i\omega_0}=\frac{\omega_f}{\omega_0}=\frac{4}{3}$。因此末动能增为初动能的 $\frac{4}{3}$。

(c) **求：动能变化的原因**。解：瓢虫向中心走时，受到指向中心的向心作用力，位移也有向内分量，因此该力对瓢虫做正功；等价地，瓢虫通过与圆盘的相互作用对系统做功，使系统总动能增加。角动量守恒不要求机械能守恒，因为瓢虫自身消耗化学能并做功。

**8. 转动细杆与粒子碰撞**

背景：长为 $L$、质量为 $M$ 的均匀细杆绕中心竖直轴以角速度 $\omega$ 逆时针转动；质量为 $m=\frac{M}{3}$ 的粒子以速度 $v$ 垂直于杆运动，在距杆中心 $d$ 处撞上并粘住。

(a) **求：碰后杆和粒子静止时的 $d$**。解：以杆中心为转轴，碰撞过程中角动量守恒。若逆时针为正，则杆初角动量为 $\frac{1}{12}ML^2\omega$，粒子角动量为 $-mvd$。碰后静止要求总角动量为零，所以 $-mvd+\frac{1}{12}ML^2\omega=0$。解得 $d=\frac{ML^2\omega}{12mv}$。若代入题给关系 $m=\frac{M}{3}$，则 $d=\frac{L^2\omega}{4v}$。

(b) **求：若 $d$ 大于该值，碰后杆和粒子向哪个方向转动**。解：当 $d$ 增大时，粒子的负角动量项 $-mvd$ 的大小增大，使碰前总角动量变为负。碰撞中角动量守恒，所以碰后总角动量仍为负，即系统按顺时针方向转动。

**9. 台球物理**

背景：台球为均匀实心球，质量为 $m$、半径为 $R$，转动惯量为 $I_{cm}=\frac{2}{5}mR^2$。球初始静止，球杆给球一个短暂水平冲量 $J=F\Delta t$，击打点在球心上方高度 $h$ 处，击打过程摩擦可忽略。

(a) **求：使球击打后立即无滑动滚动的 $h$**。解：以质心为转轴，冲量角动量关系为 $-Jh=I_{cm}\omega=\frac{2}{5}mR^2\omega$，负号表示顺时针。线动量关系为 $J=mv_{cm}$。立即无滑动要求 $v_{cm}+\omega R=0$。由 $\omega=-\frac{5Jh}{2mR^2}$ 和 $v_{cm}=\frac{J}{m}$ 代入无滑动条件，得 $\frac{J}{m}-\frac{5Jh}{2mR}=0$，所以 $h=\frac{2}{5}R$。

(b) **求：若击打球心 $h=0$ 并使球初速为 $v_0$，最终无滑动滚动时质心速度**。解：击打球心时初始无角速度，故球先滑动。动摩擦力大小为 $f$，方向与运动相反。平动方程给出 $v_{cm}=v_0-\frac{f}{m}t$，转动方程为 $-fR=I_{cm}\alpha$，所以 $\omega=-\frac{5ft}{2mR}$。开始无滑动时 $v_{cm}+\omega R=0$，即 $v_0-\frac{f}{m}t-\frac{5f}{2m}t=0$，得 $t=\frac{2mv_0}{7f}$。此时 $v_{cm}=v_0-\frac{f}{m}\frac{2mv_0}{7f}=\frac{5}{7}v_0$。

**10. 陀螺进动**

背景：陀螺绕支点附近旋转，重力对支点产生力矩 $\vec{\tau}$，角动量为 $\vec{L}$，短时间内角动量变化为 $d\vec{L}=\vec{\tau}dt$。进动角速度满足 $\Omega=\frac{\tau}{I\omega}$。

(a) **求：画出俯视图中 $\vec{\omega}$、$\vec{L}$、$\vec{\tau}$、$d\vec{L}$ 和 $\vec{L}+d\vec{L}$，并判断进动方向**。解：对高速旋转的转子，$\vec{L}$ 与 $\vec{\omega}$ 同向，沿转轴方向。重力对支点的力矩 $\vec{\tau}=\vec{r}\times M\vec{g}$，其方向垂直于 $\vec{L}$，短时间内产生 $d\vec{L}=\vec{\tau}dt$。新的角动量为 $\vec{L}+d\vec{L}$，其方向相对原来的 $\vec{L}$ 偏向 $d\vec{L}$ 的方向，因此陀螺轴沿 $\vec{L}$ 转向 $\vec{L}+d\vec{L}$ 的方向进动。

(b) **求：若反转转子的自旋角速度 $\vec{\omega}$，重复判断进动方向**。解：反转自旋后，$\vec{L}$ 方向反向，而重力力矩 $\vec{\tau}$ 的方向不随自旋方向改变，因此 $d\vec{L}=\vec{\tau}dt$ 仍沿原力矩方向。新的角动量仍为 $\vec{L}+d\vec{L}$，但由于 $\vec{L}$ 已反向，陀螺轴的进动方向也与上一问相反。

(c) **求：若在远离支点的飞轮轴端轻轻加重，会发生什么**。解：加重会增大重力力矩 $\tau$，而进动角速度为 $\Omega=\frac{\tau}{I\omega}$。在 $I$ 和自旋角速度 $\omega$ 不变时，$\Omega$ 随 $\tau$ 线性增大，因此陀螺进动变快。**1. 非均匀杆的质心位置**

背景：杆长为 $L$，左绳与竖直方向夹角为 $\theta$，右绳与竖直方向夹角为 $\phi$，左、右绳张力分别为 $T_l,T_r$，杆质量为 $m$，质心距左端为 $x$。

(a) **求：杆的质心到左端的距离 $x$**。解：杆静止平衡，竖直方向有 $T_l\cos\theta+T_r\cos\phi-mg=0$，水平方向有 $-T_l\sin\theta+T_r\sin\phi=0$，以左端取力矩有 $-mgx+T_rL\cos\phi=0$。由水平平衡得 $T_l=\frac{T_r\sin\phi}{\sin\theta}$，代入竖直平衡并结合力矩方程，消去 $T_l,T_r$，得 $x=\frac{\sin\theta\cos\phi}{\sin(\theta+\phi)}L$，题给数据对应 $x=2.38,\mathrm{m}$。

**2. 轮子越过台阶**

背景：轮半径为 $r$，台阶高度为 $h$，轮质量为 $m$，水平力 $F$ 作用在轮轴处。临界越过台阶时，轮即将离开地面，以下方台阶角点为转轴。

(a) **求：使轮子刚好越过台阶所需的最小水平力 $F$**。解：临界时地面对轮的支持力为零，以台阶角点取力矩可消去接触力。重力力臂为 $\sqrt{r^2-(r-h)^2}=\sqrt{2rh-h^2}$，水平力力臂为 $r-h$，力矩平衡给出 $mg\sqrt{2rh-h^2}-F(r-h)=0$，因此 $F=\frac{\sqrt{2rh-h^2}}{r-h}mg$，题给数据对应 $F=7.34,\mathrm{N}$。

**3. 推倒柱子**

背景：柱重为 $W$，高度为 $h$，地面静摩擦系数为 $\mu_s$，绳与柱夹角为 $\theta$，水平力 $F$ 作用在柱中点，临界不滑动时摩擦力 $f=\mu_s n$。

(a) **求：柱子不发生滑动时水平力 $F$ 的最大值**。解：以绳连接柱子的上端为转轴，水平力力臂为 $h/2$，重力和支持力的水平力臂为 $h\tan\theta$，力矩平衡给出 $F\frac{h}{2}=(n-W)h\tan\theta$。再以上端为转轴可得地面摩擦力满足 $fh=F\frac{h}{2}$，即 $f=\frac{F}{2}$。临界时 $f=\mu_s n$，联立得 $F=2W\left(\frac{1}{\mu_s}-\frac{1}{\tan\theta}\right)^{-1}$，题给数据对应 $F=400,\mathrm{N}$。

**4. 斜面上由细线支撑的实心圆柱**

背景：圆柱质量为 $M$，斜面倾角为 $\theta$，细线沿斜面方向切向拉圆柱，张力为 $T$，静摩擦力为 $f$，圆柱半径为 $R$。

(a) **求：证明圆柱平衡必须有摩擦力**。解：若无摩擦力，以圆柱质心为转轴，重力和支持力均过质心，对质心无力矩，而细线张力 $T$ 作用在圆柱边缘并产生非零力矩 $TR$，圆柱无法满足转动平衡。因此接触面必须提供摩擦力，其力矩抵消张力力矩。

(b) **求：证明张力等于摩擦力，并求张力 $T$**。解：摩擦力方向沿斜面向上，使其对质心产生与张力相反的力矩。以质心取力矩，平衡条件为 $fR-TR=0$，故 $f=T$。沿斜面方向受力平衡为 $T+f-Mg\sin\theta=0$，代入 $f=T$ 得 $2T=Mg\sin\theta$，所以 $T=f=\frac{1}{2}Mg\sin\theta$。

**5. 登山绳的杨氏模量**

背景：绳长为 $l_0$，伸长量为 $\Delta l$，截面积为 $A=\pi(d/2)^2$，承受 climber 重力 $F=mg$。

(a) **求：尼龙绳的杨氏模量 $Y$**。解：杨氏模量定义为 $Y=\frac{F/A}{\Delta l/l_0}$。代入符号量 $F=mg$ 与 $A=\pi(d/2)^2$，得 $Y=\frac{mg,l_0}{\pi(d/2)^2\Delta l}$，题给数据对应 $Y=6.77\times10^8,\mathrm{Pa}$。

**6. 理想气体的体积模量**

背景：理想气体满足 $pV=nRT$，体积模量定义为 $B=-\frac{\Delta p}{\Delta V/V}=-V\frac{dp}{dV}$。

(a) **求：等温压缩时证明 $B=p$**。解：等温时 $T$ 为常数，故 $pV=nRT$ 的微分为 $d(pV)=Vdp+pdV=0$，因此 $\frac{dp}{dV}=-\frac{p}{V}$。代入体积模量定义得 $B=-V\frac{dp}{dV}=p$。

(b) **求：绝热压缩满足 $pV^\gamma=\mathrm{constant}$ 时证明 $B=\gamma p$**。解：由 $pV^\gamma=\mathrm{constant}$ 得 $d(pV^\gamma)=V^\gamma dp+\gamma pV^{\gamma-1}dV=0$，所以 $\frac{dp}{dV}=-\frac{\gamma p}{V}$。代入 $B=-V\frac{dp}{dV}$，得 $B=\gamma p$。

**7. 下坡徒步时膝软骨的剪切形变**

背景：最大冲击力为 $F$，软骨面积为 $A$，剪切模量为 $S$，冲击力与软骨法线方向夹角使平行软骨的剪切分量为 $F_\parallel=F\sin\theta$，剪切应变为 $\phi=x/h$。

(a) **求：膝软骨的形变角 $\phi$**。解：剪切应变等于剪切应力除以剪切模量，即 $\phi=\frac{x}{h}=\frac{F_\parallel/A}{S}$。若最大冲击力为体重的 $k$ 倍，则 $F=kmg$，所以 $\phi=\frac{kmg\sin\theta}{AS}$，题给数据对应 $\phi=0.15,\mathrm{rad}=8.6^\circ$。

**8. 三维引力**

背景：质量 $m_1$ 固定在原点，质量 $m_2$ 位于 $\vec r=x\hat{\mathbf i}+y\hat{\mathbf j}+z\hat{\mathbf k}$，$r=\sqrt{x^2+y^2+z^2}$，势能为 $U(r)=-\frac{Gm_1m_2}{r}$。

(a) **求：由 $\vec F=-\nabla U$ 推出引力的三个分量与矢量形式**。解：由 $\vec F=-\nabla U$，有 $F_x=-\frac{\partial U}{\partial x}$，$F_y=-\frac{\partial U}{\partial y}$，$F_z=-\frac{\partial U}{\partial z}$。因为 $\frac{\partial r}{\partial x}=\frac{x}{r}$、$\frac{\partial r}{\partial y}=\frac{y}{r}$、$\frac{\partial r}{\partial z}=\frac{z}{r}$，且 $U=-Gm_1m_2r^{-1}$，故 $F_x=-\frac{Gm_1m_2x}{r^3}$，$F_y=-\frac{Gm_1m_2y}{r^3}$，$F_z=-\frac{Gm_1m_2z}{r^3}$。合并为矢量式 $\vec F=-\frac{Gm_1m_2}{r^3}\vec r$。

**9. 逃逸速度**

背景：逃逸速度由总机械能刚好为零确定，即物体到达无穷远时动能为零、引力势能也趋于零。

(a) **求：从地球表面发射飞船的地球逃逸速度 $v_e$**。解：能量守恒的临界条件为 $\frac{1}{2}mv_e^2-\frac{GM_E m}{R_E}=0$，解得 $v_e=\sqrt{\frac{2GM_E}{R_E}}$。利用地表关系 $g=\frac{GM_E}{R_E^2}$，也可写为 $v_e=\sqrt{2gR_E}$，题给估计为 $v_e=1.1\times10^4,\mathrm{m/s}$。

(b) **求：从地球轨道附近逃离太阳系所需的逃逸速度 $v_s$**。解：相对太阳取势能，临界条件为 $\frac{1}{2}mv_s^2-\frac{GM_Sm}{R_S}=0$，其中 $M_S$ 为太阳质量，$R_S$ 为地球轨道半径。解得 $v_s=\sqrt{\frac{2GM_S}{R_S}}$，题给估计为 $v_s=4.2\times10^4,\mathrm{m/s}$。

**10. 从小行星表面跳起逃逸**

背景：人在地球上跳起高度约为 $h$，可认为肌肉提供能量约为 $mgh$。小行星近似为球体，半径为 $R$，密度与地球相同，地球半径为 $R_E$，地球质量为 $M_E$。

(a) **求：人能靠跳跃逃逸的小行星最大半径的数量级**。解：从小行星表面逃逸的临界条件为 $mgh-\frac{GMm}{R}\ge 0$，即 $gh\ge\frac{GM}{R}$。若小行星密度与地球相同，则 $\frac{M}{M_E}=\frac{R^3}{R_E^3}$，所以 $M=\frac{R^3}{R_E^3}M_E$。代入逃逸条件并用 $g=\frac{GM_E}{R_E^2}$，得 $gh\ge\frac{GM_E}{R_E^3}R^2=\frac{gR^2}{R_E}$，因此 $R\le\sqrt{hR_E}$。题给估计对应 $R$ 的数量级为 $1,\mathrm{km}$ 到 $10,\mathrm{km}$。**1. 近地重力势能与万有引力势能**

背景：地球质量为 $M_E$，半径为 $R_E$，物体质量为 $m$，距地心距离 $r=R_E+y$，且近地面满足 $y\ll R_E$。

(a) **求：如何协调 $U=mgy$ 与 $U=-\frac{GM_Em}{r}$ 两种重力势能表达式**。解：势能零点可任意选取。若取地表为零势能，则 $U(r)=-\frac{GM_Em}{r}+\frac{GM_Em}{R_E}$。令 $r=R_E+y$，并在 $y\ll R_E$ 时展开，得 $U=-\frac{GM_Em}{R_E+y}+\frac{GM_Em}{R_E}\approx -\frac{GM_Em}{R_E}\left(1-\frac{y}{R_E}\right)+\frac{GM_Em}{R_E}=\frac{GM_Em}{R_E^2}y$。又由地表重力加速度定义 $g=\frac{GM_E}{R_E^2}$，故 $U\approx mgy$。因此 $mgy$ 是在地表取零势能且近地面近似下的万有引力势能。

**2. 深圳与珠峰顶端体重差**

背景：地球半径为 $R_E$，珠峰高度为 $h$，物体质量为 $m$，地球质量为 $M_E$。

(a) **求：海平面附近与高度 $h$ 处体重的百分差**。解：海平面体重为 $F_1=\frac{GM_Em}{R_E^2}$，高度 $h$ 处体重为 $F_2=\frac{GM_Em}{(R_E+h)^2}$。百分差为 $\frac{F_1-F_2}{F_1}=1-\frac{R_E^2}{(R_E+h)^2}$。当 $h\ll R_E$ 时，$\frac{F_1-F_2}{F_1}\approx \frac{2h}{R_E}$。这说明近地面范围内重力变化很小，可近似视为常量。

**3. 神秘行星 Mongo**

背景：石块从地面以初速度 $v_0$ 竖直上抛，经过时间 $t$ 回到地面；Mongo 赤道周长为 $C$，半径为 $R_M=\frac{C}{2\pi}$；飞船在离地高度 $H$ 的圆轨道上运行，轨道半径为 $r=R_M+H$。

(a) **求：Mongo 的质量**。解：石块回到地面时速度为 $-v_0$，由 $v_y=v_0-g_Mt$ 得 $-v_0=v_0-g_Mt$，所以 $g_M=\frac{2v_0}{t}$。又 $g_M=\frac{GM_M}{R_M^2}$，因此 $M_M=\frac{g_MR_M^2}{G}=\frac{2v_0}{tG}\left(\frac{C}{2\pi}\right)^2$。

(b) **求：飞船完成一圈圆轨道所需时间**。解：圆轨道满足 $\frac{GM_Mm}{r^2}=\frac{mv^2}{r}$，故 $v=\sqrt{\frac{GM_M}{r}}$。周期为 $T=\frac{2\pi r}{v}=2\pi\sqrt{\frac{r^3}{GM_M}}$。代入 $r=R_M+H$ 与 $GM_M=g_MR_M^2$，得 $T=2\pi\sqrt{\frac{(R_M+H)^3}{g_MR_M^2}}=2\pi\sqrt{\frac{\left(\frac{C}{2\pi}+H\right)^3}{\left(\frac{2v_0}{t}\right)\left(\frac{C}{2\pi}\right)^2}}$。

**4. 等质量双星系统**

背景：两颗相同恒星质量均为 $M$，绕质心做半径为 $R$ 的圆周运动，两星间距为 $2R$。

(a) **求：一颗恒星对另一颗恒星的万有引力大小**。解：两星距离为 $2R$，故引力大小为 $F=\frac{GM^2}{(2R)^2}=\frac{GM^2}{4R^2}$，方向指向另一颗恒星。

(b) **求：每颗恒星的轨道速率与周期**。解：引力提供向心力，故 $\frac{GM^2}{4R^2}=\frac{Mv^2}{R}$，解得 $v=\sqrt{\frac{GM}{4R}}$。周期为 $T=\frac{2\pi R}{v}=4\pi R\sqrt{\frac{R}{GM}}$。

(c) **求：把两颗恒星分离到无穷远所需的最小能量**。解：初态总动能为 $K=2\cdot \frac12 Mv^2=Mv^2=\frac{GM^2}{4R}$，初态引力势能为 $U=-\frac{GM^2}{2R}$，所以初态总能量为 $E_i=K+U=-\frac{GM^2}{4R}$。无穷远处最小能量取 $E_f=0$，故外界至少需做功 $W=E_f-E_i=\frac{GM^2}{4R}$。

**5. 质子大小的微型黑洞**

背景：质子直径为 $d$，黑洞史瓦西半径为 $R_s$，光速为 $c$。

(a) **求：直径为质子尺度的微型黑洞质量**。解：史瓦西半径满足 $R_s=\frac{2GM}{c^2}$。若黑洞直径取为 $d$，则 $R_s=\frac d2$，所以 $M=\frac{R_sc^2}{2G}=\frac{dc^2}{4G}$。

**6. 开普勒第三定律的应用**

背景：两个质量为 $m_1,m_2$ 的物体相距 $R$ 并绕质心做圆周运动时，满足 $\omega^2R^3=G(m_1+m_2)$。

(a) **求：地球同步卫星的轨道半径**。解：同步卫星周期为地球自转周期 $T$，角频率 $\omega=\frac{2\pi}{T}$。忽略卫星质量，由 $\omega^2R^3=GM_E$ 得 $R=\left(\frac{GM_ET^2}{4\pi^2}\right)^{1/3}$。若用 $GM_E=gR_E^2$，则 $R=\left(\frac{gR_E^2T^2}{4\pi^2}\right)^{1/3}$。

(b) **求：S2 绕银河系中心天体运动时中心天体质量，并判断其性质**。解：设 S2 轨道半径为 $R$、周期为 $T$、中心天体质量为 $M$、S2 质量为 $m_{S2}$。由开普勒第三定律得 $M+m_{S2}=\frac{4\pi^2R^3}{GT^2}$，故 $M=\frac{4\pi^2R^3}{GT^2}-m_{S2}$。由于普通恒星质量远小于所得中心质量，通常可忽略 $m_{S2}$，于是 $M\approx \frac{4\pi^2R^3}{GT^2}$，该中心天体应为超大质量黑洞。

**7. 均匀细杆与小球的引力势能和引力**

背景：细杆长度为 $L$、质量为 $M$，小球质量为 $m$，小球位于细杆轴线上，距细杆一端距离为 $x$；势能零点取在无穷远。

(a) **求：杆-球系统的引力势能，并验证 $x\gg L$ 极限**。解：取细杆线密度 $\lambda=\frac ML$，距小球距离为 $x+\ell$ 的微元质量为 $dm=\lambda d\ell$。微元势能为 $dU=-\frac{Gm,dm}{x+\ell}$，积分得 $U=-Gm\int_0^L\frac{(M/L)d\ell}{x+\ell}=-\frac{GMm}{L}\ln\left(1+\frac{L}{x}\right)$。当 $x\gg L$ 时，$\ln\left(1+\frac{L}{x}\right)\approx \frac{L}{x}$，故 $U\approx -\frac{GMm}{x}$，等价于把细杆看作位于远处的点质量。

(b) **求：细杆对小球的引力大小和方向，并验证 $x\gg L$ 极限**。解：由 $F_x=-\frac{dU}{dx}$，得 $F_x=-\frac{GMm}{x^2+Lx}$。负号表示力指向细杆，即沿 $x$ 减小方向。若 $x\gg L$，则 $x^2+Lx\approx x^2$，所以 $F_x\approx -\frac{GMm}{x^2}$，与点质量近似一致。

**8. 三颗相同恒星组成等边三角形**

背景：三颗恒星质量均为 $M$，组成边长为 $L$ 的等边三角形，并绕三角形中心做共同圆周运动。

(a) **求：每颗恒星的速率**。解：每颗恒星受另外两颗恒星的引力，每个引力大小为 $\frac{GM^2}{L^2}$，合力指向三角形中心，大小为 $2\frac{GM^2}{L^2}\cos30^\circ=\frac{\sqrt3GM^2}{L^2}$。设轨道半径为 $R$，几何关系给出 $R=\frac{L}{\sqrt3}$。由向心力方程 $\frac{\sqrt3GM^2}{L^2}=\frac{Mv^2}{R}$，得 $v=\sqrt{\frac{GM}{L}}$。

**9. 地球到火星的霍曼转移轨道**

背景：地球和火星绕太阳做圆轨道，半径分别为 $R_E$ 与 $R_M$；转移轨道近日点在地球轨道、远日点在火星轨道，半长轴为 $a=\frac{R_E+R_M}{2}$。地球公转周期为 $T_E$，火星公转周期为 $T_M$。

(a) **求：从地球到火星所需飞行时间**。解：由开普勒第三定律 $\frac{T^2}{a^3}=\frac{T_E^2}{R_E^3}$，转移椭圆完整周期为 $T=\left(\frac{a}{R_E}\right)^{3/2}T_E=\left(\frac{R_E+R_M}{2R_E}\right)^{3/2}T_E$。飞船只走半个椭圆，因此飞行时间为 $t_{\rm fly}=\frac{T}{2}=\frac12\left(\frac{R_E+R_M}{2R_E}\right)^{3/2}T_E$。

(b) **求：发射时太阳-火星线与太阳-地球线之间的夹角 $\alpha$**。解：飞船飞行时间为 $t_{\rm fly}=\frac{T}{2}$，火星在这段时间内转过角度 $\pi-\alpha$，故 $\frac{T}{2}=\frac{\pi-\alpha}{\omega_M}$。又 $\omega_M=\frac{2\pi}{T_M}$，且 $T_M=\left(\frac{R_M}{R_E}\right)^{3/2}T_E$。因此 $\pi-\alpha=\omega_M\frac{T}{2}=\pi\frac{T}{T_M}$，所以 $\alpha=\pi-\pi\frac{T}{T_M}$，其中 $T=\left(\frac{R_E+R_M}{2R_E}\right)^{3/2}T_E$。

**10. 彗星椭圆轨道近日点与远日点速度**

背景：太阳质量为 $m_S$，彗星质量为 $m$，椭圆轨道半长轴为 $a$，偏心率为 $e$；近日点距离 $r_p=(1-e)a$，远日点距离 $r_a=(1+e)a$。

(a) **求：彗星在近日点和远日点的速度表达式**。解：设近日点速度为 $v_p$，远日点速度为 $v_a$。机械能守恒给出 $\frac12mv_p^2-\frac{Gm_Sm}{r_p}=\frac12mv_a^2-\frac{Gm_Sm}{r_a}$，角动量守恒给出 $mv_pr_p=mv_ar_a$。结合 $r_p=(1-e)a$ 与 $r_a=(1+e)a$，解得 $v_p=\sqrt{\frac{Gm_S}{a}\frac{1+e}{1-e}}$，$v_a=\sqrt{\frac{Gm_S}{a}\frac{1-e}{1+e}}$。

**11. 地球轨道角动量**

背景：太阳质量为 $M_S$，地球质量为 $M_E$，且 $M_S\gg M_E$；地球绕太阳做半径为 $R$ 的圆周运动。点 $O$ 为太阳位置，点 $O'$ 位于 $O$ 正上方距离 $R$ 处。

(a) **求：地球绕太阳一周的周期 $T_0$**。解：由万有引力提供向心力，$\frac{GM_SM_E}{R^2}=M_E\omega^2R$，所以 $\omega=\sqrt{\frac{GM_S}{R^3}}$。周期为 $T_0=\frac{2\pi}{\omega}=2\pi\sqrt{\frac{R^3}{GM_S}}$。

(b) **求：以 $O$ 为参考点时地球的轨道角动量 $\vec L_0$**。解：圆轨道中 $v=R\omega=\sqrt{\frac{GM_S}{R}}$，故角动量大小为 $L_0=M_E Rv=M_E\sqrt{GM_SR}$，方向沿 $z$ 方向，即 $\vec L_0=M_E\sqrt{GM_SR},\hat z$。

(c) **求：以 $O'$ 为参考点时地球的轨道角动量 $\vec L$**。解：相对 $O'$ 的位置矢量可看作由水平径向分量和竖直分量组成，计算 $\vec L=M_E\vec r,'\times \vec v$ 可得其大小为 $L=M_E\sqrt{2GM_SR}$。其方向同时含有水平径向分量与 $z$ 分量，二者大小相等，因此方向为高出 $x-y$ 平面 $\pi/4$。

(d) **求：太阳引力关于参考点 $O'$ 的力矩 $\vec\tau=\vec r,'\times \vec F$**。解：太阳对地球的引力大小为 $F=\frac{GM_SM_E}{R^2}$，方向沿径向指向太阳。由于 $O'$ 相对 $O$ 有竖直偏移，关于 $O'$ 的力臂产生非零力矩，大小为 $\tau=RF=\frac{GM_SM_E}{R}$，方向沿地球速度 $\vec v$ 的方向。

(e) **求：用 $\vec\tau=\frac{d\vec L}{dt}$ 解释 $\vec L$ 的变化，并求该“转动”的角频率 $\Omega$**。解：以 $O'$ 为参考点时，$\vec L$ 不守恒；其 $z$ 分量守恒，而水平径向分量随地球运动转动。设水平径向角动量分量为 $L_{\rm rad}$，则 $\tau\Delta t=\Delta L=L_{\rm rad}\Delta\theta=L_{\rm rad}\Omega\Delta t$。由几何关系可知该转动与地球公转同步，因此 $\Omega=\omega=\sqrt{\frac{GM_S}{R^3}}$。**1. Laplace-Runge-Lenz 向量与水星近日点进动**

背景：太阳质量为 $M$，水星质量为 $m$，轨道半长轴为 $a$，偏心率为 $e$，轨道在 $xy$ 平面内逆时针运动。LRL 向量定义为 $\vec A=\vec v\times\vec L-GMm\hat r$，牛顿轨道中守恒；相对论修正力为 $\vec F_{\rm GR}=-\frac{GMm}{r^2}\left(1+\frac{3L^2}{m^2c^2r^2}\right)\hat r$。

(a) **求：水星角动量 $\vec L=\vec r\times\vec p$ 的方向**。解：轨道在 $xy$ 平面内逆时针运动，由右手定则，$\vec L$ 指向 $+\hat z$，即垂直纸面向外，因此 $\vec L=L\hat z$。

(b) **求：LRL 向量 $\vec A$，并验证其沿 $-\hat x$ 方向**。解：因 $\vec A$ 守恒，可在近日点 $P_1$ 计算，此时 $\hat r=-\hat x$，$\vec v=v_p\hat y$，$r_p=a(1-e)$，$v_p=\sqrt{\frac{GM}{a}\frac{1+e}{1-e}}$，角动量大小为 $L=mr_pv_p=m\sqrt{GMa(1-e^2)}$。于是 $\vec v\times\vec L=-GMm(1+e)\hat x$，代入 $\vec A=\vec v\times\vec L-GMm\hat r$ 得 $\vec A=-GMm(1+e)\hat x+GMm\hat x=-GMme\hat x$，故 $\vec A$ 沿 $-\hat x$ 方向。

(c) **求：相对论修正力下 $\frac{d\vec A}{dt}$**。解：仍为中心力，所以 $\frac{d\vec L}{dt}=0$。由 $\frac{d\vec A}{dt}=\frac{d\vec v}{dt}\times\vec L-GMm\frac{d\hat r}{dt}$，且 $\frac{d\vec v}{dt}=\frac{\vec F_{\rm GR}}{m}$，$\frac{d\hat r}{dt}=\dot\theta\hat\theta$，$\vec L=mr^2\dot\theta\hat z$，牛顿项与 $-GMm\dot\theta\hat\theta$ 抵消，只剩修正项，得 $\frac{d\vec A}{dt}=\frac{3GML^2\dot\theta}{mc^2r^2}\hat\theta$。

(d) **求：一周内 $\delta A_x$ 与 $\delta A_y$**。解：由 $\hat\theta=-\sin\theta\hat x+\cos\theta\hat y$，有 $\frac{dA_x}{dt}=-\frac{3GML^2\dot\theta}{mc^2r^2}\sin\theta$，$\frac{dA_y}{dt}=\frac{3GML^2\dot\theta}{mc^2r^2}\cos\theta$。用 $d\theta=\dot\theta dt$ 与近似牛顿轨道 $r(\theta)=\frac{a(1-e^2)}{1-e\cos\theta}$，得 $\delta A_x=-\frac{3GML^2}{mc^2}\int_0^{2\pi}\frac{\sin\theta}{r^2}d\theta=0$，$\delta A_y=\frac{3GML^2}{mc^2}\int_0^{2\pi}\frac{\cos\theta}{r^2}d\theta=-\frac{6\pi eGML^2}{mc^2a^2(1-e^2)^2}$。

(e) **求：每圈近日点进动角 $\delta\phi$**。解：因 $|\vec A|=GMme$，且 $\vec A$ 原本沿 $-\hat x$，小转角近似为 $\delta\phi=\frac{|\delta A_y|}{|\vec A|}$。代入 $L^2=m^2GMa(1-e^2)$，得 $\delta\phi=\frac{6\pi GM}{c^2a(1-e^2)}$。

(f) **求：水星近日点进动的角秒每世纪结果**。解：每圈进动为 $\delta\phi=\frac{6\pi GM}{c^2a(1-e^2)}$，换算为角秒每世纪时乘以 $206265$ 和每世纪轨道圈数 $\frac{100}{T_m}$，即 $\delta\phi_{\rm century}=\frac{6\pi GM}{c^2a(1-e^2)}\cdot206265\cdot\frac{100}{T_m}$，代入题给参数得到约 $43\ {\rm arcsec/century}$。

**2. 水坝水平管塞受力与出水体积**

背景：水深为 $D$，管口在水面下深度为 $d$，管半径为 $r$，水密度为 $\rho$，管口面积为 $A=\pi r^2$。

(a) **求：塞子与管壁间摩擦力大小**。解：塞子静止时摩擦力平衡水的表压作用力，深度 $d$ 处表压为 $\Delta p=\rho gd$，故 $f=\Delta pA=\rho gd\pi r^2$，代入题给参数得 $f=74\ {\rm N}$。

(b) **求：拔去塞子后 $t$ 时间内流出的水体积**。解：由托里拆利定理，出水速度为 $v=\sqrt{2gd}$，体积流率为 $Q=Av$，故 $V=Avt=\pi r^2\sqrt{2gd},t$，代入题给参数得 $V=1.5\times10^2\ {\rm m^3}$。

**3. 水坝所受水平压力、力矩与等效力臂**

背景：水深为 $D$，坝宽为 $W$，取深度坐标 $y$ 自水面向下，表压为 $p=\rho gy$，面积元为 $dA=Wdy$。

(a) **求：水对坝的净水平力**。解：面积元受力为 $dF=pdA=\rho gyWdy$，积分得 $F=\int_0^D\rho gyWdy=\frac12\rho gWD^2$，代入题给参数得 $F=1.10\times10^9\ {\rm N}$。

(b) **求：该合力对过 $O$ 且平行坝宽的水平轴的力矩**。解：深度 $y$ 处力臂为 $D-y$，故 $d\tau=dF(D-y)=\rho gyW(D-y)dy$，积分得 $\tau=\int_0^D\rho gyW(D-y)dy=\frac16\rho gWD^3$，代入题给参数得 $\tau=1.10\times10^{10}\ {\rm N\cdot m}$。

(c) **求：等效力臂 $r_{\rm eff}=\tau/F$**。解：由 $r_{\rm eff}=\frac{\tau}{F}=\frac{\frac16\rho gWD^3}{\frac12\rho gWD^2}$，得 $r_{\rm eff}=\frac{D}{3}$，代入题给参数得 $r_{\rm eff}=10\ {\rm m}$。

**4. 喷泉流体流速**

背景：体积流率为 $Q$，出水孔直径为 $D$，面积为 $A=\frac{\pi D^2}{4}$，满足连续性方程 $Q=Av$。

(a) **求：孔径为 $D$ 时的出水速度**。解：由 $Q=Av$ 得 $v_1=\frac{Q}{A}=\frac{4Q}{\pi D^2}$，代入题给参数得 $v_1=472\ {\rm m/s}$。

(b) **求：孔径变为三倍时的出水速度**。解：孔径变为 $3D$ 时面积变为 $9A$，体积流率不变，所以 $v_2=\frac{Q}{9A}=\frac{v_1}{9}$，代入题给参数得 $v_2=52.4\ {\rm m/s}$。

**5. 水平管收缩段中的流量、速度与压强**

背景：右端细管直径为 $d_1$，出水速度为 $v_1$，左端粗管直径为 $d_2$，速度为 $v_2$，两截面同高，出口压强为大气压 $p_0$。

(a) **求：时间 $t$ 内流入大气的水体积**。解：出口面积为 $A_1=\frac{\pi d_1^2}{4}$，体积流率为 $Q=A_1v_1$，故 $V=Qt=\frac{\pi d_1^2}{4}v_1t$，代入题给参数得 $V=19.5\ {\rm m^3}$。

(b) **求：左端粗管中的速度 $v_2$**。解：由连续性方程 $A_1v_1=A_2v_2$，得 $v_2=v_1\frac{A_1}{A_2}=v_1\left(\frac{d_1}{d_2}\right)^2$，代入题给参数得 $v_2=8.28\ {\rm m/s}$。

(c) **求：左端粗管中的表压**。解：两端同高，伯努利方程为 $p_0+\frac12\rho v_1^2=p_2+\frac12\rho v_2^2$，故左端绝对压强为 $p_2=p_0+\frac12\rho(v_1^2-v_2^2)$，表压为 $p_2-p_0=\frac12\rho(v_1^2-v_2^2)$，代入题给参数得 $p_2-p_0=2.30\times10^5\ {\rm Pa}$。

**6. 皮托管测飞机空速**

背景：孔 $A$ 处空气停滞，速度 $v_A=0$；孔 $B$ 处空气速度为飞机相对空气速度 $v$。U 形管液体密度为 $\rho$，空气密度为 $\rho_{\rm air}$，液面高度差为 $h$。

(a) **求：用伯努利方程证明空速公式**。解：在 $A$、$B$ 两处应用伯努利方程，因 $A$ 处停滞，得 $p_A=p_B+\frac12\rho_{\rm air}v^2$。U 形管液面差给出压强差 $p_A-p_B=\rho gh$，联立得 $\rho gh=\frac12\rho_{\rm air}v^2$，所以 $v=\sqrt{\frac{2\rho gh}{\rho_{\rm air}}}$。

(b) **求：给定液面差时飞机相对空气的速度**。解：直接由 $v=\sqrt{\frac{2\rho gh}{\rho_{\rm air}}}$ 计算，代入题给参数得 $v=55.5\ {\rm m/s}$。

**7. 文丘里流量计**

背景：宽管截面积为 $A_1$，速度为 $v_1$，窄管喉部截面积为 $A_2$，速度为 $v_2$，两竖直管液面高度差为 $h$，两测点等高，流体不可压、稳恒且内摩擦可忽略。

(a) **求：用 $A_1$、$A_2$、$h$ 表示宽管处流速 $v_1$**。解：两点等高，伯努利方程为 $p_1+\frac12\rho v_1^2=p_2+\frac12\rho v_2^2$。连续性方程给出 $A_1v_1=A_2v_2$，即 $v_2=\frac{A_1}{A_2}v_1$。代入伯努利方程得 $p_1-p_2=\frac12\rho v_1^2\left[\left(\frac{A_1}{A_2}\right)^2-1\right]$。竖直管中液体静止，压强差为 $p_1-p_2=\rho gh$，故 $v_1=\sqrt{\frac{2gh}{(A_1/A_2)^2-1}}$。

**8. 大水桶底部小孔排水**

背景：水桶截面积为 $A_1$，底部小孔面积为 $A_2$，且 $A_2\ll A_1$；水面高度为 $h$，初始高度为 $H$，桶口与出口均通大气。

(a) **求：水面高度为 $h$ 时出水速度近似为 $\sqrt{2gh}$**。解：在自由液面与底部小孔之间用伯努利方程，因两处压强均为大气压，且 $A_2\ll A_1$ 使自由液面速度近似为零，有 $p_0+\rho gh=p_0+\frac12\rho v^2$，故 $v=\sqrt{2gh}$。

(b) **求：水面高度变化率 $\frac{dh}{dt}$**。解：短时间 $dt$ 内流出体积为 $A_2vdt$，水桶内体积减少为 $-A_1dh$，由体积守恒得 $A_2vdt=-A_1dh$，所以 $\frac{dh}{dt}=-\frac{A_2}{A_1}v=-\frac{A_2}{A_1}\sqrt{2gh}$。

(c) **求：初始条件 $h=H$ 于 $t=0$ 时的 $h(t)$**。解：分离变量得 $\frac{dh}{\sqrt h}=-\frac{A_2}{A_1}\sqrt{2g},dt$，积分后 $2\sqrt h=-\frac{A_2}{A_1}\sqrt{2g},t+C$。由 $h(0)=H$ 得 $C=2\sqrt H$，故 $\sqrt h=\sqrt H-\frac{A_2}{A_1}\sqrt{\frac g2},t$，因此 $h(t)=\left(\sqrt H-\frac{A_2}{A_1}\sqrt{\frac g2},t\right)^2$。

(d) **求：排空水桶所需总时间**。解：排空时 $h=0$，由上一问得 $0=\sqrt H-\frac{A_2}{A_1}\sqrt{\frac g2},t$，所以 $t=\frac{A_1}{A_2}\sqrt{\frac{2H}{g}}$，代入题给参数得 $t=6.39\times10^3\ {\rm s}$。

**9. 简谐振动的两种表示**

背景：位移写作 $x(t)=A_0\cos(\omega t+\delta)$，也可写作 $x(t)=A_s\sin\omega t+A_c\cos\omega t$。

(a) **求：证明 $A_0\cos(\omega t+\delta)$ 可写成 $A_s\sin\omega t+A_c\cos\omega t$，并求 $A_s$ 与 $A_c$**。解：用三角恒等式展开，$x(t)=A_0\cos(\omega t+\delta)=A_0\cos\omega t\cos\delta-A_0\sin\omega t\sin\delta$。与 $x(t)=A_s\sin\omega t+A_c\cos\omega t$ 比较系数，得 $A_s=-A_0\sin\delta$，$A_c=A_0\cos\delta$。

(b) **求：将 $A_c$ 与 $A_s$ 同初始位置和初始速度联系起来**。解：令 $t=0$，有 $x(0)=A_0\cos\delta$，而 $v(t)=\frac{dx}{dt}=-A_0\omega\sin(\omega t+\delta)$，故 $v(0)=-A_0\omega\sin\delta$。因此 $A_c=x(0)$，$A_s=\frac{v(0)}{\omega}$，于是 $x(t)=x(0)\cos\omega t+\frac{v(0)}{\omega}\sin\omega t$。**1. 双弹簧并联振子**

背景：质量为 $m$ 的物块在光滑水平面上，与左右两弹簧相连。单独左弹簧振动频率为 $f_1$，单独右弹簧振动频率为 $f_2$。

(a) **求：两弹簧同时连接时的振动频率**。解：设两弹簧劲度系数为 $k_1,k_2$，位移为 $x$ 时回复力为 $F=-(k_1+k_2)x$，故运动方程为 $m\frac{d^2x}{dt^2}=-(k_1+k_2)x$，角频率满足 $\omega^2=\frac{k_1+k_2}{m}$。单独两弹簧时 $f_1=\frac{1}{2\pi}\sqrt{\frac{k_1}{m}}$，$f_2=\frac{1}{2\pi}\sqrt{\frac{k_2}{m}}$，因此两弹簧同时作用时 $f=\frac{1}{2\pi}\sqrt{\frac{k_1+k_2}{m}}=\sqrt{f_1^2+f_2^2}$。

**2. 两相同弹簧串联振子**

背景：质量为 $m$ 的物块与两个相同弹簧串联连接，每个弹簧劲度系数为 $k$，水平面光滑。

(a) **求：系统振动频率**。解：串联弹簧受力大小相同，总伸长为 $\Delta x$，两相同弹簧各伸长 $\Delta x/2$，故 $F=k\frac{\Delta x}{2}$，等效劲度系数为 $k_{\mathrm{eff}}=\frac{F}{\Delta x}=\frac{k}{2}$。物块满足简谐运动，频率为 $f=\frac{1}{2\pi}\sqrt{\frac{k_{\mathrm{eff}}}{m}}=\frac{1}{2\pi}\sqrt{\frac{k}{2m}}$。

**3. 弹簧耦合单摆**

背景：摆长为 $L$，摆球质量为 $M$，摆球还连接劲度系数为 $k$ 的水平弹簧；当摆球位于最低点时弹簧无形变。考虑小振幅振动。

(a) **求：小振幅振动周期**。解：摆角为 $\theta$ 时，切向重力分量为 $-Mg\sin\theta$，弹簧伸长近似为 $L\theta$，其切向回复力近似为 $-kL\theta$。由切向牛顿第二定律得 $ML\frac{d^2\theta}{dt^2}=-Mg\sin\theta-kL\theta\cos\theta$。小角近似下 $\sin\theta\approx\theta$，$\cos\theta\approx1$，所以 $\frac{d^2\theta}{dt^2}=-\left(\frac{g}{L}+\frac{k}{M}\right)\theta$，角频率为 $\omega=\sqrt{\frac{g}{L}+\frac{k}{M}}$，周期为 $T=\frac{2\pi}{\sqrt{\frac{g}{L}+\frac{k}{M}}}$。

**4. 圆盘—细杆复合摆**

背景：均匀圆盘质量为 $M$、半径为 $r$，均匀细杆质量为 $m$、长度为 $L$，细杆一端为转轴，另一端连接圆盘，圆盘中心距转轴为 $L+r$。系统作小角振动。

(a) **求：绕转轴的转动惯量**。解：圆盘绕自身中心的转动惯量为 $\frac{1}{2}Mr^2$，其中心距转轴为 $L+r$，由平行轴定理得圆盘对转轴的转动惯量为 $\frac{1}{2}Mr^2+M(L+r)^2$。细杆绕端点的转动惯量为 $\frac{1}{3}mL^2$，故总转动惯量为 $I=\frac{1}{2}Mr^2+M(L+r)^2+\frac{1}{3}mL^2$。

(b) **求：转轴到系统质心的距离**。解：取转轴为原点，圆盘质心位置为 $L+r$，细杆质心位置为 $\frac{L}{2}$，系统质心到转轴距离为 $d=\frac{M(L+r)+m\frac{L}{2}}{M+m}$。

(c) **求：小振动周期**。解：复合摆小振动周期为 $T=2\pi\sqrt{\frac{I}{(M+m)gd}}$，其中 $I=\frac{1}{2}Mr^2+M(L+r)^2+\frac{1}{3}mL^2$，$d=\frac{M(L+r)+m\frac{L}{2}}{M+m}$。

**5. 方形细杆复合摆**

背景：四根相同均匀细杆组成边长为 $L$ 的正方形，总质量为 $M$，系统悬挂在一个上角处，绕该角小角摆动。

(a) **求：摆动角频率与频率**。解：系统作为复合摆，角频率满足 $\omega=\sqrt{\frac{Mgd}{I}}$。正方形质心在几何中心，距悬点为 $d=L\cos45^\circ=\frac{L}{\sqrt{2}}$。每根杆质量为 $M/4$，先求绕正方形中心且垂直于平面的转动惯量；每根杆对其自身中心为 $\frac{1}{12}\frac{M}{4}L^2$，其中心距正方形中心为 $\frac{L}{2}$，故四根杆总和为 $I_{\mathrm{cm}}=\frac{M}{3}L^2$。再对整个物体用平行轴定理，得 $I=I_{\mathrm{cm}}+Md^2=\frac{M}{3}L^2+\frac{M}{2}L^2=\frac{5}{6}ML^2$。因此 $\omega=\sqrt{\frac{Mg(L/\sqrt{2})}{(5/6)ML^2}}=\sqrt{\frac{6g}{5\sqrt{2}L}}$，频率为 $f=\frac{\omega}{2\pi}=\frac{1}{2\pi}\sqrt{\frac{6g}{5\sqrt{2}L}}$。

**6. 扭摆中的薄圆盘**

背景：薄圆盘质量为 $m$，半径为 $R$，固定在细长纤维中心，扭转释放后作角简谐运动，周期为 $T$。纤维扭转常量为 $\kappa$。

(a) **求：纤维扭转常量 $\kappa$**。解：薄圆盘绕中心轴转动惯量为 $I=\frac{1}{2}mR^2$。扭摆周期满足 $T=2\pi\sqrt{\frac{I}{\kappa}}$，故 $\kappa=\frac{4\pi^2I}{T^2}=\frac{2\pi^2mR^2}{T^2}$。

**7. 大振幅单摆**

背景：摆长为 $L$，重力加速度为 $g$，角振幅为 $\phi_0$。大振幅时周期为 $T=2\pi\sqrt{\frac{L}{g}}\left[1+\frac{1}{4}\sin^2\frac{\phi_0}{2}+\frac{1}{4}\left(\frac{3}{4}\right)^2\sin^4\frac{\phi_0}{2}+\cdots\right]$，小振幅周期为 $T_0=2\pi\sqrt{\frac{L}{g}}$。

(a) **求：当 $\phi_0=\frac{\pi}{4}$ 时，周期相对 $T_0$ 的增大量约为多少**。解：相对增量为 $\frac{T-T_0}{T_0}\approx\frac{1}{4}\sin^2\frac{\phi_0}{2}+\frac{1}{4}\left(\frac{3}{4}\right)^2\sin^4\frac{\phi_0}{2}$。令 $\phi_0=\frac{\pi}{4}$，保留前两项可得该比例约为 $4%$，说明中等振幅下级数前几项已能给出较好近似。

**8. 约化质量**

背景：两物块质量为 $m_1,m_2$，分别连接在同一弹簧两端，弹簧劲度系数为 $k$，外力为零。定义相对位移 $x=x_1-x_2$。

(a) **求：证明系统相对振动角频率为 $\omega=\sqrt{\frac{k}{\mu}}$，其中 $\mu=\frac{m_1m_2}{m_1+m_2}$**。解：对两物块分别用牛顿第二定律，得 $m_1\frac{d^2x_1}{dt^2}=-k(x_1-x_2)$，$m_2\frac{d^2x_2}{dt^2}=-k(x_2-x_1)$。两式相加说明质心无加速度；将两式分别除以质量后相减，得 $\frac{d^2}{dt^2}(x_1-x_2)=-k\left(\frac{1}{m_1}+\frac{1}{m_2}\right)(x_1-x_2)$。令 $x=x_1-x_2$，并定义 $\mu=\frac{m_1m_2}{m_1+m_2}$，则 $\mu\frac{d^2x}{dt^2}=-kx$，所以相对运动为简谐运动，角频率为 $\omega=\sqrt{\frac{k}{\mu}}$。

(b) **求：由分子振动频率 $f$ 求 HCl 分子的等效弹簧劲度系数**。解：由 $f=\frac{\omega}{2\pi}$ 得 $\omega=2\pi f$。氢原子和氯原子的约化质量为 $\mu=\frac{m_{\mathrm H}m_{\mathrm{Cl}}}{m_{\mathrm H}+m_{\mathrm{Cl}}}$，由上一问 $k=\mu\omega^2$，故等效劲度系数为 $k=\frac{m_{\mathrm H}m_{\mathrm{Cl}}}{m_{\mathrm H}+m_{\mathrm{Cl}}}(2\pi f)^2$。

**9. 阻尼振动**

背景：阻尼振子的运动方程为 $m\frac{d^2x}{dt^2}=-b\frac{dx}{dt}-kx$。考虑欠阻尼情形。

(a) **求：证明解可写为 $x=Ae^{-\frac{b}{2m}t}\cos(\omega t+\delta)$，并求 $\omega$**。解：设 $x=Ae^{-\frac{b}{2m}t}\cos(\omega t+\delta)$，则速度与加速度代回方程后，$\sin(\omega t+\delta)$ 项自动相消；比较 $\cos(\omega t+\delta)$ 项，得到 $m\left[\left(\frac{b}{2m}\right)^2-\omega^2\right]=\frac{b^2}{2m}-k$，整理得 $\omega^2=\frac{k}{m}-\frac{b^2}{4m^2}$，因此 $\omega=\sqrt{\frac{k}{m}-\frac{b^2}{4m^2}}$。指数因子 $e^{-\frac{b}{2m}t}$ 表示振幅随时间衰减。

**10. 受迫阻尼振动与共振**

背景：受迫阻尼振子的运动方程为 $m\frac{d^2x}{dt^2}=-b\frac{dx}{dt}-kx+F_d\cos(\omega_dt)$，自然角频率定义为 $\omega_0=\sqrt{\frac{k}{m}}$。

(a) **求：证明通解由暂态解和稳态解组成，并求稳态振幅与相位**。解：线性方程的解可写成齐次方程通解与非齐次方程特解之和，即 $x(t)=x_{\mathrm{transient}}+x_{\mathrm{steady}}$。齐次部分为阻尼振动，$x_{\mathrm{transient}}=A_0e^{-\frac{b}{2m}t}\cos(\omega t+\delta)$，其随时间衰减。设稳态特解为 $x_{\mathrm{steady}}=A_d\cos(\omega_dt-\delta_d)$，代入方程，使用 $F_d\cos(\omega_dt)=F_d\cos\delta_d\cos(\omega_dt-\delta_d)-F_d\sin\delta_d\sin(\omega_dt-\delta_d)$，比较 $\cos(\omega_dt-\delta_d)$ 与 $\sin(\omega_dt-\delta_d)$ 系数，得 $F_d\cos\delta_d=A_d(k-m\omega_d^2)$，$F_d\sin\delta_d=bA_d\omega_d$。两式相除得 $\tan\delta_d=\frac{b\omega_d}{k-m\omega_d^2}=\frac{b\omega_d}{m(\omega_0^2-\omega_d^2)}$；两式平方相加得 $A_d=\frac{F_d}{\sqrt{m^2(\omega_0^2-\omega_d^2)^2+b^2\omega_d^2}}$。因此 $x(t)=A_0e^{-\frac{b}{2m}t}\cos(\omega t+\delta)+A_d\cos(\omega_dt-\delta_d)$，当暂态项衰减后系统主要表现为稳态受迫振动；共振在驱动角频率接近系统自然角频率时出现。

**11. 不同势阱中的振动**

背景：一维保守力满足 $F_x=-\frac{dU}{dx}$，并取 $U(0)=0$。振幅为 $A$。

(a) **求：简谐振子 $F_x=-kx$ 的势能函数**。解：势能由 $U(x)=-\int_0^xF_x,dx$ 得到，因此 $U(x)=-\int_0^x(-kx),dx=\frac{1}{2}kx^2$。

(b) **求：用能量守恒证明速度 $v_x$ 与位置 $x$ 的关系**。解：振幅处速度为零，总能量为 $E=\frac{1}{2}kA^2$。任意位置处 $\frac{1}{2}kA^2=\frac{1}{2}mv_x^2+\frac{1}{2}kx^2$，故 $v_x=\frac{dx}{dt}=\sqrt{\frac{k}{m}(A^2-x^2)}$。

(c) **求：分离变量并求简谐振子的周期 $T$**。解：由 $v_x=\frac{dx}{dt}=\sqrt{\frac{k}{m}(A^2-x^2)}$ 得 $\int_0^A\frac{dx}{\sqrt{A^2-x^2}}=\int_0^{T/4}\sqrt{\frac{k}{m}},dt$。令 $u=x/A$，左边为 $\int_0^1\frac{du}{\sqrt{1-u^2}}=\frac{\pi}{2}$，所以 $\frac{\pi}{2}=\sqrt{\frac{k}{m}}\frac{T}{4}$，得到 $T=2\pi\sqrt{\frac{m}{k}}$。

(d) **求：若 $F_x=-cx^3$，势能函数是什么**。解：同理由 $U(x)=-\int_0^xF_x,dx$ 得 $U(x)=-\int_0^x(-cx^3),dx=\frac{1}{4}cx^4$。

(e) **求：势能 $U(x)=\frac{1}{4}cx^4$ 对应振子的周期 $T_2$**。解：能量守恒为 $\frac{1}{4}cA^4=\frac{1}{2}mv_x^2+\frac{1}{4}cx^4$，故 $v_x=\frac{dx}{dt}=\sqrt{\frac{c}{2m}(A^4-x^4)}$。四分之一周期满足 $\frac{T_2}{4}=\int_0^A\frac{dx}{\sqrt{\frac{c}{2m}(A^4-x^4)}}=\sqrt{\frac{2m}{c}}\int_0^A\frac{dx}{\sqrt{A^4-x^4}}$。令 $u=x/A$，则 $\int_0^A\frac{dx}{\sqrt{A^4-x^4}}=\frac{1}{A}\int_0^1\frac{du}{\sqrt{1-u^4}}$，利用 $\int_0^1\frac{du}{\sqrt{1-u^4}}\approx1.31$，得 $T_2=\frac{4}{A}\sqrt{\frac{2m}{c}}\int_0^1\frac{du}{\sqrt{1-u^4}}\approx\frac{7.41}{A}\sqrt{\frac{m}{c}}$。

(f) **求：$T_2$ 是否依赖振幅 $A$，以及该振动是否为简谐运动**。解：由 $T_2\approx\frac{7.41}{A}\sqrt{\frac{m}{c}}$ 可见周期依赖振幅 $A$；由于回复力不是与位移成正比的 $-kx$ 形式，该振动不是简谐运动。**1. 简谐波函数**

背景：波函数为 $y(x,t)=(1.00\text{ mm})\sin(62.8\text{ m}^{-1}x+314\text{ s}^{-1}t)$，与标准形式 $y=A\sin(kx-\omega t)$ 比较判断传播方向。

(a) **求：波的传播方向与波速**。解：相位为 $kx+\omega t$，等相位条件给出 $x=-(\omega/k)t+\text{常数}$，故波沿 $-x$ 方向传播；波速大小为 $v=\omega/k=314/62.8=5.00\text{ m/s}$。

(b) **求：波长、频率和周期**。解：由 $k=2\pi/\lambda$、$\omega=2\pi f$、$T=1/f$，得 $\lambda=2\pi/k=0.100\text{ m}$，$f=\omega/(2\pi)=50.0\text{ Hz}$，$T=2\pi/\omega=0.0200\text{ s}$。

(c) **求：弦上任一点的最大横向速度**。解：横向速度为 $v_y=\partial y/\partial t=A\omega\cos(kx+\omega t)$，故最大值为 $v_{y,\max}=A\omega=0.314\text{ m/s}$。

**2. 波函数与波动方程**

背景：一维波动方程为 $\frac{\partial^2 y}{\partial t^2}=v^2\frac{\partial^2 y}{\partial x^2}$，若二阶时间导数与二阶空间导数满足比例关系且 $v=\omega/k$，则满足波动方程。

(a) **求：$y(x,t)=A\cos(kx+\omega t)$ 是否满足波动方程**。解：有 $\frac{\partial^2 y}{\partial t^2}=-A\omega^2\cos(kx+\omega t)$，$\frac{\partial^2 y}{\partial x^2}=-Ak^2\cos(kx+\omega t)$，当 $v=\omega/k$ 时满足 $\frac{\partial^2 y}{\partial t^2}=v^2\frac{\partial^2 y}{\partial x^2}$，所以满足波动方程。

(b) **求：$y(x,t)=A\sin(kx-\omega t)$ 是否满足波动方程**。解：有 $\frac{\partial^2 y}{\partial t^2}=-A\omega^2\sin(kx-\omega t)$，$\frac{\partial^2 y}{\partial x^2}=-Ak^2\sin(kx-\omega t)$，当 $v=\omega/k$ 时满足波动方程。

(c) **求：$y(x,t)=A[\cos(kx)+\cos(\omega t)]$ 是否满足波动方程**。解：有 $\frac{\partial^2 y}{\partial t^2}=-A\omega^2\cos(\omega t)$，$\frac{\partial^2 y}{\partial x^2}=-Ak^2\cos(kx)$，两者依赖的变量不同，不能由常数 $v^2$ 相互对应，因此不满足波动方程。

(d) **求：第 (b) 问波中位于 $x$ 处质点的横向速度和横向加速度**。解：对 $t$ 求导得 $v_y=\frac{\partial y}{\partial t}=-\omega A\cos(kx-\omega t)$，再求一次导得 $a_y=\frac{\partial^2 y}{\partial t^2}=-\omega^2 A\sin(kx-\omega t)$。

**3. 同向波的叠加**

背景：两列波为 $y_1=(4.00\text{ mm})\sin(2\pi x-650\pi t)$ 与 $y_2=(6.20\text{ mm})\sin(2\pi x-650\pi t+0.60\pi)$，可用相量叠加。

(a) **求：合成波的振幅和相对于波 1 的相位角**。解：令波 1 相位为零，则合成相量分量为 $Y_x=4.00+6.20\cos(0.60\pi)$，$Y_y=6.20\sin(0.60\pi)$，故振幅 $A=\sqrt{Y_x^2+Y_y^2}=6.25\text{ mm}$，相位角 $\phi=\tan^{-1}(Y_y/Y_x)=1.23\text{ rad}$。

(b) **求：若再加入振幅 $5.00\text{ mm}$ 的第三列同向波，为使新合成振幅最大，其相位角应为多少**。解：要使合成振幅最大，第三列波的相量应与前两列波的合成相量同向，因此其相位角应为 $\phi=1.23\text{ rad}$。

**4. 传播速度与质点速度**

背景：波函数为 $y(x,t)=A\cos(kx-\omega t)$，其中 $k=2\pi/\lambda$，$v=\omega/k$。

(a) **求：证明 $y(x,t)=A\cos(kx-\omega t)$ 可写为 $y(x,t)=A\cos[\frac{2\pi}{\lambda}(x-vt)]$**。解：由 $k=2\pi/\lambda$ 且 $\omega=kv$，有 $kx-\omega t=k(x-vt)=\frac{2\pi}{\lambda}(x-vt)$，因此 $y(x,t)=A\cos[\frac{2\pi}{\lambda}(x-vt)]$。

(b) **求：弦上质点的横向速度 $v_y$**。解：对 $t$ 求偏导，得 $v_y=\frac{\partial y}{\partial t}=\frac{2\pi A}{\lambda}v\sin[\frac{2\pi}{\lambda}(x-vt)]$。

(c) **求：弦上质点最大速度，以及它何时等于传播速度 $v$**。解：由第 b 问可知最大横向速度为 $v_{y,\max}=\frac{2\pi A}{\lambda}v$，若 $v_{y,\max}=v$，则 $\frac{2\pi A}{\lambda}=1$，即 $A=\lambda/(2\pi)$。

**5. 三段不同线密度弦的传播时间**

背景：三段弦各长 $L$，线密度分别为 $\mu_1$、$\mu_2=4\mu_1$、$\mu_3=\mu_1/4$，张力均为 $F$，波速为 $v=\sqrt{F/\mu}$。

(a) **求：横波通过总长 $3L$ 的时间**。解：每段传播时间为 $t_i=L/v_i=L\sqrt{\mu_i/F}$，因此 $t_{\text{total}}=L\sqrt{\mu_1/F}+L\sqrt{4\mu_1/F}+L\sqrt{(\mu_1/4)/F}=\frac{7}{2}L\sqrt{\mu_1/F}$。

(b) **求：该时间是否依赖三段弦的连接顺序**。解：不依赖。总时间是三段各自传播时间之和，而每段波速只由该段的 $F$ 与 $\mu$ 决定，与排列顺序无关。

**6. 钢琴弦中波的平均功率**

背景：弦质量 $m$、长度 $l$、张力 $F$，线密度 $\mu=m/l$，频率 $f$，角频率 $\omega=2\pi f$，振幅 $A$，平均功率为 $P_{\text{av}}=\frac{1}{2}\sqrt{\mu F}\omega^2A^2$。

(a) **求：波携带的平均功率**。解：由 $\mu=m/l$ 与 $\omega=2\pi f$，平均功率为 $P_{\text{av}}=\frac{1}{2}\sqrt{\mu F}\omega^2A^2$，代入题给量可得 $P_{\text{av}}=0.22\text{ W}$。

(b) **求：若振幅减半，平均功率如何变化**。解：因为 $P_{\text{av}}\propto A^2$，振幅减半时功率变为原来的 $1/4$，故 $P_{\text{av}}=0.056\text{ W}$。

**7. 弦上的驻波共振**

背景：弦长 $L$ 固定，驱动频率 $f$ 固定，张力 $F_T$ 由悬挂重物决定，波速 $v=\sqrt{F_T/\mu}$，两端近似为节点。

(a) **求：解释为什么只有某些离散张力能产生驻波**。解：驻波要求弦长满足 $L=n\lambda_n/2$，即 $\lambda_n=2L/n$；频率 $f$ 固定时 $v_n=f\lambda_n$ 只能取离散值，而 $F_{Tn}=\mu v_n^2$，所以只有离散张力能产生驻波。

(b) **求：若要产生多一个波腹，应增大还是减小张力**。解：多一个波腹表示模数 $n$ 增大，故 $\lambda_n=2L/n$ 减小；由于 $v_n=f\lambda_n$，波速减小；又 $F_T=\mu v^2$，所以张力应减小。

(c) **求：证明第 $n$ 个驻波模的张力为 $F_{Tn}=4L^2f^2\mu/n^2$，并说明其与 $n^2$ 的关系**。解：由 $\lambda_n=2L/n$ 和 $v_n=f\lambda_n$，得 $F_{Tn}=\mu v_n^2=\mu f^2(2L/n)^2=4L^2f^2\mu/n^2$，因此 $F_{Tn}\propto 1/n^2$。

(d) **求：当 $L=1.00\text{ m}$、$f=80.0\text{ Hz}$、$\mu=0.750\text{ g/m}$ 时，前三个模所需张力**。解：先有 $4L^2f^2\mu=19.2\text{ N}$，故 $F_{T1}=19.2\text{ N}$，$F_{T2}=19.2/2^2=4.80\text{ N}$，$F_{T3}=19.2/3^2=2.13\text{ N}$。

**8. 振幅衰减波的功率**

背景：实弦上线密度为 $\mu$，振幅随位置衰减，$y=A(x)\sin(kx-\omega t)$，其中 $A(x)=A_0e^{-bx}$，且 $x>0$。

(a) **求：波传输功率随 $x$ 的函数**。解：瞬时功率可写为 $P(x,t)=-F_T\frac{\partial y}{\partial x}\frac{\partial y}{\partial t}$；对时间平均后交叉项平均为零，且 $\langle\cos^2(kx-\omega t)\rangle=1/2$，所以 $\bar P=\frac{1}{2}\mu v\omega^2A^2(x)$；代入 $A(x)=A_0e^{-bx}$，得 $\bar P(x)=\frac{1}{2}\mu v\omega^2A_0^2e^{-2bx}$。

**9. 驻波分解**

背景：弦的振动为 $y_s=(0.80\text{ cm})\sin[(\pi/3\text{ cm}^{-1})x]\cos[(40\pi\text{ s}^{-1})t]$，这是两列等振幅、反向传播波的叠加。

(a) **求：组成该驻波的两列行波的振幅**。解：驻波形式为 $y_s=2A\sin(kx)\cos(\omega t)$，题中最大系数为 $0.80\text{ cm}$，故 $2A=0.80\text{ cm}$，所以每列行波振幅为 $A=0.40\text{ cm}$。

(b) **求：这两列行波的波速**。解：由 $\omega=40\pi\text{ rad/s}$，$k=\pi/3\text{ cm}^{-1}$，得 $v=\omega/k=120\text{ cm/s}=1.2\text{ m/s}$。

(c) **求：相邻节点之间的距离**。解：相邻节点距离为半波长 $d=\lambda/2=\pi/k$，代入 $k=\pi/3\text{ cm}^{-1}$ 得 $d=3.0\text{ cm}$。

(d) **求：$x=2.1\text{ cm}$、$t=0.50\text{ s}$ 时弦上质点的横向速度**。解：横向速度为 $v_y=\frac{\partial y_s}{\partial t}=-(0.80\text{ cm})\omega\sin(kx)\sin(\omega t)$；当 $t=0.50\text{ s}$ 时 $\sin(\omega t)=\sin(20\pi)=0$，故 $v_y=0$。

**10. 任意形状的波**

背景：考虑任意函数形式的波 $y(x,t)=f(x-vt)$，令 $u=x-vt$。

(a) **求：解释为什么 $y(x,t)=f(x-vt)$ 以速度 $v$ 沿 $+x$ 方向传播**。解：波形上同一位置满足 $u=x-vt=\text{常数}$，因此 $x=vt+\text{常数}$，随时间沿 $+x$ 方向移动，速度为 $v$。

(b) **求：证明 $y(x,t)=f(x-vt)$ 对任意函数 $f$ 都满足波动方程**。解：令 $u=x-vt$，由链式法则有 $\frac{\partial y}{\partial x}=\frac{df}{du}$，$\frac{\partial^2 y}{\partial x^2}=\frac{d^2f}{du^2}$，且 $\frac{\partial y}{\partial t}=-v\frac{df}{du}$，$\frac{\partial^2 y}{\partial t^2}=v^2\frac{d^2f}{du^2}$，故 $\frac{\partial^2 y}{\partial t^2}=v^2\frac{\partial^2 y}{\partial x^2}$，满足波动方程。

(c) **求：波脉冲 $y(x,t)=De^{-(Bx-Ct)^2}$ 的速度**。解：将指数写成 $Bx-Ct=B(x-\frac{C}{B}t)$，故该波为 $f(x-vt)$ 的形式，速度为 $v=C/B$，并沿 $+x$ 方向传播。
**1. 声波速度**

背景：液体中纵波速度满足 $v=f\lambda=\sqrt{B/\rho}$，金属棒中纵波速度满足 $v=\Delta L/\Delta t=\sqrt{Y/\rho}$。

(a) **求：密度为 $\rho$ 的液体中，已知频率 $f$ 和波长 $\lambda$ 时的体积模量 $B$**。解：由 $v=f\lambda$ 与 $v=\sqrt{B/\rho}$ 得 $B=\rho v^2=\rho(f\lambda)^2$。代入题中符号对应条件 $\rho=1300,\mathrm{kg/m^3}$，$f=400,\mathrm{Hz}$，$\lambda=8.00,\mathrm{m}$，结果为 $B=1.33\times10^{10},\mathrm{Pa}$。

(b) **求：长度为 $\Delta L$、密度为 $\rho$ 的金属棒中，纵波传播时间为 $\Delta t$ 时的杨氏模量 $Y$**。解：波速为 $v=\Delta L/\Delta t$，又 $v=\sqrt{Y/\rho}$，故 $Y=\rho v^2=\rho(\Delta L/\Delta t)^2$。代入题中条件 $\Delta L=1.50,\mathrm{m}$，$\rho=6400,\mathrm{kg/m^3}$，$\Delta t=3.90\times10^{-4},\mathrm{s}$，结果为 $Y=9.47\times10^{10},\mathrm{Pa}$。

**2. 驻声波与简正模式**

背景：开口端是位移波腹、压强波节；闭口端是位移波节、压强波腹。位移波节到相邻位移波节的距离为 $\lambda/2$，位移波节到相邻位移波腹的距离为 $\lambda/4$。管长记为 $L=1.20,\mathrm{m}$。

(a) **求：两端开管中，基频和前两个泛音的位移波节与压强波节位置**。解：两端开管两端均为位移波腹，因此第 $n$ 次谐波满足 $\lambda_n=2L/n$。位移波节为相邻位移波腹之间的中点。基频 $n=1$ 时位移波节在 $x=L/2=0.60,\mathrm{m}$，压强波节在 $x=0,L$，即 $0,1.20,\mathrm{m}$；第一泛音 $n=2$ 时位移波节在 $x=L/4,3L/4$，即 $0.30,0.90,\mathrm{m}$，压强波节在 $x=0,L/2,L$，即 $0,0.60,1.20,\mathrm{m}$；第二泛音 $n=3$ 时位移波节在 $x=L/6,L/2,5L/6$，即 $0.20,0.60,1.00,\mathrm{m}$，压强波节在 $x=0,L/3,2L/3,L$，即 $0,0.40,0.80,1.20,\mathrm{m}$。

(b) **求：左端闭、右端开的管中，基频和前两个泛音的位移波节与压强波节位置**。解：闭端为位移波节，开端为位移波腹，只允许奇数次四分之一波长模式，满足 $L=(2k-1)\lambda/4$。基频时只有闭端位移波节，位移波节在 $x=0$，压强波节在开端 $x=1.20,\mathrm{m}$；第一泛音对应 $3\lambda/4=L$，位移波节在 $x=0,2L/3$，即 $0,0.80,\mathrm{m}$，压强波节在 $x=L/3,L$，即 $0.40,1.20,\mathrm{m}$；第二泛音对应 $5\lambda/4=L$，位移波节在 $x=0,2L/5,4L/5$，即 $0,0.48,0.96,\mathrm{m}$，压强波节在 $x=L/5,3L/5,L$，即 $0.24,0.72,1.20,\mathrm{m}$。

(c) **求：两端闭管的允许波长和频率，并求高为 $L$ 的淋浴间基频和前两个泛音频率是否可闻**。解：两端闭管两端均为位移波节，允许模式满足 $L=n\lambda_n/2$，所以 $\lambda_n=2L/n$，频率为 $f_n=v/\lambda_n=nv/(2L)$，其中 $n=1,2,3,\cdots$。令淋浴间高度 $L=2.50,\mathrm{m}$，声速 $v=344,\mathrm{m/s}$，得 $f_1=v/(2L)=68.8,\mathrm{Hz}$，$f_2=2f_1=138,\mathrm{Hz}$，$f_3=3f_1=206,\mathrm{Hz}$。这些频率均在约 $20,\mathrm{Hz}$ 到 $2.0\times10^4,\mathrm{Hz}$ 的可闻范围内。

**3. 两个同相扬声器的干涉**

背景：两扬声器同相，扬声器 $B$ 在 $A$ 右侧 $2.00,\mathrm{m}$，点 $Q$ 在 $B$ 右侧 $1.00,\mathrm{m}$。到 $Q$ 的路程差为 $\Delta r=3.00,\mathrm{m}-1.00,\mathrm{m}=2.00,\mathrm{m}$，声速取 $v=344,\mathrm{m/s}$。

(a) **求：点 $Q$ 发生相长干涉的最低频率**。解：同相声源相长干涉条件为 $\Delta r=n\lambda$，其中 $n=1,2,3,\cdots$。最低频率对应最大波长，即 $n=1$，所以 $\lambda=\Delta r=2.00,\mathrm{m}$，$f=v/\lambda=v/\Delta r=172,\mathrm{Hz}$。

(b) **求：点 $Q$ 发生相消干涉的最低频率**。解：同相声源相消干涉条件为 $\Delta r=(n/2)\lambda$，其中 $n=1,3,5,\cdots$。最低频率对应 $n=1$，所以 $\lambda=2\Delta r=4.00,\mathrm{m}$，$f=v/\lambda=86,\mathrm{Hz}$。

**4. 很弱声波的强度、声强级与位移振幅**

背景：声压振幅为 $p_m$，空气体积模量为 $B$，声速为 $v$，频率为 $f$，参考声强为 $I_0=1.0\times10^{-12},\mathrm{W/m^2}$。声压振幅与位移振幅满足 $p_m=BkA_m=B(2\pi f/v)A_m$。

(a) **求：声波强度 $I$**。解：声波平均强度可写为 $I=\frac{vp_m^2}{2B}$。代入题中条件 $p_m=6.0\times10^{-5},\mathrm{Pa}$，$v=344,\mathrm{m/s}$，$B=1.42\times10^5,\mathrm{Pa}$，得 $I=4.4\times10^{-12},\mathrm{W/m^2}$。

(b) **求：声强级 $\beta$**。解：声强级定义为 $\beta=(10,\mathrm{dB})\log_{10}(I/I_0)$。由 $I/I_0=4.4$，得 $\beta=(10,\mathrm{dB})\log_{10}4.4=6.4,\mathrm{dB}$。

(c) **求：位移振幅 $A_m$**。解：由 $p_m=B(2\pi f/v)A_m$ 得 $A_m=vp_m/(2\pi fB)$。代入题中条件，得 $A_m=5.8\times10^{-11},\mathrm{m}$。

**5. 警车声源的波长**

背景：声源静止时无多普勒效应，波长满足 $\lambda=v/f_s$；声源以速度 $v_s$ 运动时，前方波长缩短为 $\lambda_{\rm front}=(v-v_s)/f_s$，后方波长增大为 $\lambda_{\rm behind}=(v+v_s)/f_s$。

(a) **求：警笛静止时声波波长**。解：由 $\lambda=v/f_s$ 得 $\lambda=340/300,\mathrm{m}=1.13,\mathrm{m}$。

(b) **求：警笛以速度 $v_s$ 运动时，前方和后方波长**。解：前方波峰间距减小，$\lambda_{\rm front}=(v-v_s)/f_s$；后方波峰间距增大，$\lambda_{\rm behind}=(v+v_s)/f_s$。代入 $v=340,\mathrm{m/s}$、$v_s=30,\mathrm{m/s}$、$f_s=300,\mathrm{Hz}$，得 $\lambda_{\rm front}=1.03,\mathrm{m}$，$\lambda_{\rm behind}=1.23,\mathrm{m}$。

**6. Dune 星球大气中的声速**

背景：观察者静止，声源向观察者运动。取从观察者指向声源为正方向，则 $v_L=0$，声源速度 $v_s=-25.0,\mathrm{m/s}$，多普勒公式为 $f_L=\frac{v+v_L}{v+v_s}f_s$。

(a) **求：Arrakis 大气中的声速 $v$**。解：由 $f_L=\frac{v}{v+v_s}f_s$ 得 $f_L(v+v_s)=vf_s$，整理得 $v=\frac{v_s f_L}{f_s-f_L}$。代入 $f_s=1200,\mathrm{Hz}$、$f_L=1240,\mathrm{Hz}$、$v_s=-25.0,\mathrm{m/s}$，得 $v=780,\mathrm{m/s}$。

**7. 运动声源与运动听者**

背景：多普勒频移公式为 $f_L=\frac{v+v_L}{v+v_s}f_s$，正方向取从听者指向声源。题中声源频率 $f_s=1.00,\mathrm{kHz}$，速度大小为声速的一半。

(a) **求：声源以 $v/2$ 向静止听者运动时听到的频率**。解：听者静止，$v_L=0$；声源向听者运动，所以 $v_s=-v/2$。由 $f_L=\frac{v}{v-v/2}f_s=2f_s$，得 $f_L=2000,\mathrm{Hz}$。

(b) **求：声源静止、听者以 $v/2$ 向声源运动时听到的频率，并解释与 (a) 的差别**。解：声源静止，$v_s=0$；听者向声源运动，所以 $v_L=+v/2$。由 $f_L=\frac{v+v/2}{v}f_s=\frac{3}{2}f_s$，得 $f_L=1500,\mathrm{Hz}$。该结果小于 (a)，因为多普勒效应由声源和听者相对空气的速度决定，而不只由两者彼此的相对速度决定；运动声源会改变空气中的波长，运动听者主要改变单位时间接收的波峰数。

**8. 两列火车汽笛与拍频**

背景：两汽笛频率均为 $f_s=392,\mathrm{Hz}$，空气静止，声速取 $v=344,\mathrm{m/s}$。听者在两车之间向右运动，速度 $v_L=15.0,\mathrm{m/s}$；$A$ 静止，$B$ 向右运动，速度 $v_B=35.0,\mathrm{m/s}$。仍取从听者指向声源为正方向并用 $f_L=\frac{v+v_L}{v+v_s}f_s$。

(a) **求：听者听到来自静止汽笛 $A$ 的频率**。解：对声源 $A$，听者远离 $A$，故 $v_L=-15.0,\mathrm{m/s}$，且 $v_s=0$。因此 $f_A=\frac{v-15.0}{v}f_s$，结果为 $f_A=375,\mathrm{Hz}$。

(b) **求：听者听到来自运动汽笛 $B$ 的频率**。解：对声源 $B$，听者朝向 $B$，故 $v_L=+15.0,\mathrm{m/s}$；$B$ 向右远离听者，按所取正方向有 $v_s=+35.0,\mathrm{m/s}$。因此 $f_B=\frac{v+15.0}{v+35.0}f_s$，结果为 $f_B=371,\mathrm{Hz}$。

(c) **求：听者探测到的拍频**。解：拍频等于两接收频率差的绝对值，故 $f_{\rm beat}=|f_A-f_B|=4,\mathrm{Hz}$。

**9. 两艘潜艇的声呐多普勒效应**

背景：法国潜艇速度为 $v_F$，美国潜艇速度为 $v_{US}$，两者相向运动；声呐在水中速度为 $v$，发射频率为 $f_1$。题中 $v_F=48.00,\mathrm{km/h}$，$v_{US}=72.00,\mathrm{km/h}$，$v=5470,\mathrm{km/h}$，$f_1=1.560\times10^3,\mathrm{Hz}$。

(a) **求：美国潜艇探测到的声呐频率**。解：美国潜艇作为运动听者向声源运动，法国潜艇作为运动声源也向听者运动，因此接收频率为 $f'*1=f_1\frac{v+v*{US}}{v-v_F}$。代入题中符号条件，得 $f'_1=1.595\times10^3,\mathrm{Hz}$。

(b) **求：美国潜艇反射后，法国潜艇探测到的回波频率**。解：反射可看作美国潜艇以频率 $f'*1$ 作为运动声源再向法国潜艇发声。若法国潜艇静止，反射波频率因美国潜艇运动为 $f_r=f'\*1\frac{v+v\*{US}}{v-v*{US}}$；法国潜艇又向回波运动，接收频率再乘以 $\frac{v+v_F}{v-v_F}$。合并得 $f'*r=f_1\frac{(v+v_F)(v+v*{US})}{(v-v_F)(v-v_{US})}$，结果为 $f'_r=1.630\times10^3,\mathrm{Hz}$。
`;

function makeDraggable() {
  let movedByPointer = false;

  function bindHandle(handle, options = {}) {
    let startX = 0;
    let startY = 0;
    let originX = 0;
    let originY = 0;
    let dragging = false;
    let moved = false;

    handle.addEventListener('pointerdown', event => {
      if (options.ignoreButtons && event.target.closest('button')) {
        return;
      }

      dragging = true;
      moved = false;
      movedByPointer = false;
      startX = event.clientX;
      startY = event.clientY;

      const rect = toolbar.getBoundingClientRect();
      originX = rect.left;
      originY = rect.top;

      handle.setPointerCapture(event.pointerId);
    });

    handle.addEventListener('pointermove', event => {
      if (!dragging) {
        return;
      }

      const deltaX = event.clientX - startX;
      const deltaY = event.clientY - startY;
      moved = moved || Math.hypot(deltaX, deltaY) > 4;
      movedByPointer = movedByPointer || moved;

      const rect = toolbar.getBoundingClientRect();
      const viewport = window.visualViewport;
      const viewportWidth = viewport?.width || window.innerWidth;
      const viewportHeight = viewport?.height || window.innerHeight;
      const margin = 8;
      const maxX = Math.max(margin, viewportWidth - rect.width - margin);
      const maxY = Math.max(margin, viewportHeight - rect.height - margin);
      const nextX = Math.min(Math.max(margin, originX + deltaX), maxX);
      const nextY = Math.min(Math.max(margin, originY + deltaY), maxY);

      toolbar.style.left = `${nextX}px`;
      toolbar.style.top = `${nextY}px`;
    });

    handle.addEventListener('pointerup', event => {
      dragging = false;
      handle.releasePointerCapture(event.pointerId);

      if (options.onClick && !moved) {
        options.onClick();
      }
    });

    handle.addEventListener('pointercancel', () => {
      dragging = false;
    });
  }

  bindHandle(toolbarHandle, { ignoreButtons: true });
  bindHandle(expandButton, {
    onClick: () => setToolbarCollapsed(false)
  });

  expandButton.addEventListener('click', event => {
    if (movedByPointer) {
      event.preventDefault();
      event.stopPropagation();
      movedByPointer = false;
      return;
    }

    setToolbarCollapsed(false);
  });
}
