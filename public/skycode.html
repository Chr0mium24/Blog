<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky</title>
    <style>
        :root {
            --primary-color: #00a8ff;
            --decrypt-color: #9c88ff;
            --copy-color: #4cd137;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            color: #2f3640;
            margin-bottom: 1.5rem;
            font-size: 24px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            box-sizing: border-box;
            resize: vertical;
            font-size: 14px;
            margin-bottom: 1rem;
            font-family: monospace;
        }
        textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 1rem;
        }
        button {
            padding: 12px 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: transform 0.1s, opacity 0.2s;
            font-size: 14px;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-encrypt { background-color: var(--primary-color); }
        .btn-decrypt { background-color: var(--decrypt-color); }
        .btn-copy { background-color: var(--copy-color); }
        
        button:hover { opacity: 0.9; }

        .legend {
            font-size: 12px;
            color: #7f8c8d;
            background: #f1f2f6;
            padding: 10px;
            border-radius: 6px;
        }
        .legend code { color: #e84118; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Sky</h1>
    
    <textarea id="input" placeholder="输入普通文本或 Sky 密文..."></textarea>
    
    <div class="buttons">
        <button class="btn-encrypt" onclick="encrypt()">加密</button>
        <button class="btn-decrypt" onclick="decrypt()">解密</button>
        <button class="btn-copy" onclick="copyResult()">复制结果</button>
    </div>
    
    <textarea id="output" placeholder="结果显示区域..." readonly></textarea>
    
    <div class="legend">
        <strong>原理：</strong> 8 种 <code>Sky</code> 组合映射 3-bit 二进制
    </div>
</div>

<script>
    // 8种排列组合 (2^3=8)
    const skyMap = ["sky", "skY", "sKy", "sKY", "Sky", "SkY", "SKy", "SKY"];

    /**
     * 加密：文本 -> Sky串 (无空格)
     */
    function encrypt() {
        const text = document.getElementById('input').value;
        if (!text) return;

        const encoder = new TextEncoder();
        const bytes = encoder.encode(text);

        let binary = "";
        for (let b of bytes) {
            binary += b.toString(2).padStart(8, '0');
        }

        let result = "";
        for (let i = 0; i < binary.length; i += 3) {
            let chunk = binary.substring(i, i + 3);
            if (chunk.length < 3) {
                chunk = chunk.padEnd(3, '0');
            }
            const index = parseInt(chunk, 2);
            result += skyMap[index];
        }

        document.getElementById('output').value = result;
    }

    /**
     * 解密：Sky串 -> 文本
     */
    function decrypt() {
        const rawSky = document.getElementById('input').value.trim();
        if (!rawSky) return;

        // 去掉可能误入的空格和换行
        const skyText = rawSky.replace(/\s+/g, '');
        
        let binary = "";
        // 因为每个组合固定3个字母，按3位步长切割
        for (let i = 0; i < skyText.length; i += 3) {
            const word = skyText.substring(i, i + 3);
            const index = skyMap.indexOf(word);
            if (index !== -1) {
                binary += index.toString(2).padStart(3, '0');
            }
        }

        const bytes = [];
        for (let i = 0; i < binary.length; i += 8) {
            // 只有凑够8位才转换，防止末尾填充干扰
            if (i + 8 <= binary.length) {
                const byte = parseInt(binary.substring(i, i + 8), 2);
                bytes.push(byte);
            }
        }

        try {
            const decoder = new TextDecoder();
            const result = decoder.decode(new Uint8Array(bytes));
            document.getElementById('output').value = result;
        } catch (e) {
            document.getElementById('output').value = "解密失败：密文格式有误。";
        }
    }

    /**
     * 复制功能
     */
    function copyResult() {
        const output = document.getElementById('output');
        if (!output.value) return;

        navigator.clipboard.writeText(output.value).then(() => {
            const copyBtn = document.querySelector('.btn-copy');
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "已复制！";
            copyBtn.style.backgroundColor = "#2ecc71";
            
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.style.backgroundColor = "";
            }, 1500);
        }).catch(err => {
            alert('复制失败，请手动选择复制');
        });
    }
</script>

</body>
</html>
