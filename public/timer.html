<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>现代倒计时</title>
    <style>
      :root {
        --bg-color: #0f172a;
        --text-color: #f8fafc;
        --accent-color: #38bdf8;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        background-image: radial-gradient(
          circle at 50% 50%,
          #1e293b 0%,
          #0f172a 100%
        );
      }

      /* 主显示区 */
      .main-display {
        text-align: center;
        z-index: 10;
      }

      #display-title {
        font-size: 9rem;
        font-weight: 300;
        margin-bottom: 1rem;
        letter-spacing: 2px;
        color: #cbd5e1;
      }

      #timer {
        font-size: 11rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        letter-spacing: 4px;
      }

      .labels {
        display: flex;
        justify-content: center;
        gap: 2rem;
        margin-top: -1rem;
        font-size: 1.2rem;
        color: #64748b;
      }

      .labels span {
        width: 6rem;
        text-align: center;
      }

      /* 控制按钮 */
      .controls {
        position: absolute;
        bottom: 2rem;
        right: 2rem;
        display: flex;
        gap: 1rem;
        z-index: 20;
      }

      button {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: var(--text-color);
        padding: 0.75rem 1.25rem;
        border-radius: 8px;
        cursor: pointer;
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
        font-size: 1rem;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--accent-color);
        transform: translateY(-2px);
      }

      /* 设置面板 (毛玻璃效果) */
      #settings-modal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.95);
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        padding: 2.5rem;
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        display: none;
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 30;
        width: 90%;
        max-width: 400px;
      }

      #settings-modal.active {
        display: block;
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
        color: #94a3b8;
      }

      input {
        width: 100%;
        padding: 0.75rem;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        color: var(--text-color);
        font-size: 1rem;
        outline: none;
      }

      input:focus {
        border-color: var(--accent-color);
      }

      /* Webkit specific for date picker */
      ::-webkit-calendar-picker-indicator {
        filter: invert(1);
        cursor: pointer;
      }

      .modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 1rem;
        margin-top: 2rem;
      }

      .primary-btn {
        background: var(--accent-color);
        color: #0f172a;
        font-weight: 600;
        border: none;
      }

      .primary-btn:hover {
        background: #0ea5e9;
      }
    </style>
  </head>
  <body>
    <div class="main-display">
      <h1 id="display-title">准备开始</h1>
      <div id="timer">00:00:00</div>
    </div>

    <div class="controls">
      <button id="btn-settings">⚙️ 设置</button>
      <button id="btn-fullscreen">⛶ 全屏</button>
    </div>

    <div id="settings-modal">
      <h2 style="margin-bottom: 1.5rem">倒计时设置</h2>
      <div class="form-group">
        <label for="input-title">显示标题</label>
        <input
          type="text"
          id="input-title"
          placeholder="例如：距离下班还有"
          value="倒计时"
        />
      </div>
      <div class="form-group">
        <label for="input-time">目标时间 (精确到秒)</label>
        <input type="datetime-local" id="input-time" step="1" />
      </div>
      <div class="modal-buttons">
        <button id="btn-cancel">取消</button>
        <button id="btn-save" class="primary-btn">保存并开始</button>
      </div>
    </div>

    <script>
      // DOM 元素
      const timerDisplay = document.getElementById("timer");
      const titleDisplay = document.getElementById("display-title");
      const settingsModal = document.getElementById("settings-modal");
      const btnSettings = document.getElementById("btn-settings");
      const btnFullscreen = document.getElementById("btn-fullscreen");
      const btnCancel = document.getElementById("btn-cancel");
      const btnSave = document.getElementById("btn-save");
      const inputTitle = document.getElementById("input-title");
      const inputTime = document.getElementById("input-time");

      // 状态变量
      let targetDate = new Date();
      targetDate.setHours(targetDate.getHours() + 1); // 默认倒计时1小时
      let countdownInterval;

      // 初始化默认时间到输入框
      const formatLocalTime = (date) => {
        const tzOffset = date.getTimezoneOffset() * 60000;
        const localISOTime = new Date(date - tzOffset)
          .toISOString()
          .slice(0, 19);
        return localISOTime;
      };
      inputTime.value = formatLocalTime(targetDate);

      // 格式化补零
      const pad = (num) => num.toString().padStart(2, "0");

      // 更新倒计时逻辑
      function updateTimer() {
        const now = new Date().getTime();
        const distance = targetDate.getTime() - now;

        if (distance <= 0) {
          clearInterval(countdownInterval);
          timerDisplay.innerHTML = "00:00:00";
          titleDisplay.innerHTML = "时间到！";
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
          (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        timerDisplay.innerHTML = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
      }

      // 启动/重启定时器
      function updateTimer() {
        const now = new Date().getTime();
        const distance = targetDate.getTime() - now;

        if (distance <= 0) {
          clearInterval(countdownInterval);
          timerDisplay.innerHTML = "00:00:00";
          titleDisplay.innerHTML = "时间到！";
          return;
        }

        // 核心修改：直接计算总小时数，不再对 24 小时取模
        const hours = Math.floor(distance / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // 即使 hours 超过两位数（如 125），padStart(2, '0') 依然会正常显示 "125"
        timerDisplay.innerHTML = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
      }
      // 事件监听：设置面板
      btnSettings.addEventListener("click", () => {
        settingsModal.classList.add("active");
      });

      btnCancel.addEventListener("click", () => {
        settingsModal.classList.remove("active");
      });

      btnSave.addEventListener("click", () => {
        const newTitle = inputTitle.value.trim();
        const newTime = inputTime.value;

        if (newTitle) titleDisplay.innerHTML = newTitle;
        if (newTime) {
          targetDate = new Date(newTime);
          startTimer();
        }
        settingsModal.classList.remove("active");
      });

      // 事件监听：全屏切换
      btnFullscreen.addEventListener("click", () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch((err) => {
            console.log(`全屏请求失败: ${err.message}`);
          });
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          }
        }
      });

      // 监听全屏状态改变以更新按钮文字
      document.addEventListener("fullscreenchange", () => {
        if (document.fullscreenElement) {
          btnFullscreen.innerHTML = "⛶ 退出全屏";
        } else {
          btnFullscreen.innerHTML = "⛶ 全屏";
        }
      });

      // 初始化启动
      startTimer();
    </script>
  </body>
</html>
