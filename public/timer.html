<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>极简倒计时</title>
    <style>
      body {
        background-color: white;
        color: black;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      /* 标题输入框：无边框设计 */
      #title {
        font-size: 8rem;
        border: none;
        text-align: center;
        margin-bottom: 20px;
        outline: none;
        width: 80%;
      }

      /* 倒计时数字：等宽字体防止跳动 */
      #timer {
        font-size: 11rem;
        font-weight: bold;
        font-variant-numeric: tabular-nums;
        cursor: pointer;
      }

      /* 时间选择器：隐藏但在点击数字时触发 */
      #datetime-picker {
        margin-top: 20px;
        border: 1px solid black;
        padding: 5px;
        font-size: 1rem;
      }

      .config-area {
        position: fixed;
        bottom: 20px;
        opacity: 0.3;
        transition: opacity 0.3s;
      }

      .config-area:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <input
      type="text"
      id="title"
      placeholder="输入倒计时标题..."
      spellcheck="false"
    />

    <div id="timer">00:00:00</div>

    <div class="config-area">
      <input type="datetime-local" id="datetime-picker" />
    </div>

    <script>
      const titleInput = document.getElementById("title");
      const timePicker = document.getElementById("datetime-picker");
      const timerDisplay = document.getElementById("timer");

      // --- 初始化数据 ---
      function init() {
        const savedTitle =
          localStorage.getItem("countdown_title") || "距离目标还有";
        const savedTarget = localStorage.getItem("countdown_target");

        titleInput.value = savedTitle;
        if (savedTarget) {
          timePicker.value = savedTarget;
        } else {
          // 默认设置为明天的这个时候
          const tomorrow = new Date();
          tomorrow.setDate(tomorrow.getDate() + 1);
          timePicker.value = tomorrow.toISOString().slice(0, 16);
        }

        startInterval();
      }

      // --- 逻辑核心：计算并显示时间 ---
      function updateDisplay() {
        const targetDate = new Date(timePicker.value).getTime();
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (isNaN(distance) || distance < 0) {
          timerDisplay.innerText = "00:00:00";
          return;
        }

        // 计算总小时数 (不模 24)
        const hours = Math.floor(distance / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // 补零函数
        const pad = (num) => String(num).padStart(2, "0");

        timerDisplay.innerText = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
      }

      // --- 事件监听与持久化 ---
      titleInput.addEventListener("input", (e) => {
        localStorage.setItem("countdown_title", e.target.value);
      });

      timePicker.addEventListener("change", (e) => {
        localStorage.setItem("countdown_target", e.target.value);
      });

      function startInterval() {
        setInterval(updateDisplay, 1000);
        updateDisplay();
      }

      /**
       * 针对您的硬编码需求，此处预留 Gemini-Flash 接口调用逻辑
       * 当需要自动生成复杂的提示词或UI修饰时，可调用此函数
       */
      async function fetchGeminiEnhancement(context) {
        // 这里将由你配置的后端或集成环境调用 gemini-flash-latest
        console.log("Calling gemini-flash-latest for prompt generation...");
        // TODO: 调用代码实现
      }

      init();
    </script>
  </body>
</html>
