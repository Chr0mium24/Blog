<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 超清切分与空白切除工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --primary-color: #2b579a;
            --bg-color: #f0f2f5;
            --panel-bg: #ffffff;
            --border-color: #d9d9d9;
            --line-color: #ff3b30;
            --zone-color: rgba(251, 191, 36, 0.35);
            --zone-border: #d97706;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 顶部工具栏 */
        .toolbar {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            z-index: 10;
            flex-shrink: 0;
        }

        .logo { font-size: 16px; font-weight: bold; color: var(--primary-color); margin-right: 12px; }
        
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: 1px solid transparent;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn:hover { background-color: #1e3d6b; }
        .btn:disabled { background-color: #bfbfbf; cursor: not-allowed; }
        
        .btn-secondary { background-color: #f5f5f5; color: #434343; border: 1px solid var(--border-color); }
        .btn-secondary:hover { background-color: #e8e8e8; }
        
        /* 模式激活动态样式 */
        .btn.active {
            background-color: #e6f7ff !important;
            color: #1890ff !important;
            border-color: #91d5ff !important;
            font-weight: bold;
        }

        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-input-wrapper input[type=file] {
            position: absolute; left: 0; top: 0; opacity: 0; font-size: 100px; cursor: pointer;
        }

        .status-text { font-size: 13px; color: #666; margin-left: auto; }

        /* 主体 */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        .workspace {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }
        .workspace.mode-line { cursor: crosshair; }
        .workspace.mode-zone { cursor: row-resize; }

        .document-wrapper {
            position: relative; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            background: white; user-select: none; -webkit-user-select: none;
        }

        .page-container { position: relative; border-bottom: 2px dashed #e8e8e8; background: white; }
        .page-container:last-child { border-bottom: none; }
        canvas { display: block; width: 100%; height: auto; }

        /* 虚线预览线 */
        .cut-line-preview {
            position: absolute; left: 0; width: 100%; height: 2px;
            border-top: 2px dashed var(--line-color); opacity: 0.6; pointer-events: none; z-index: 99; display: none;
        }

        /* 拖拽出的临时区域预览 */
        .zone-preview {
            position: absolute; left: 0; width: 100%; background: var(--zone-color);
            border-top: 1px dashed var(--zone-border); border-bottom: 1px dashed var(--zone-border);
            pointer-events: none; z-index: 99; display: none;
        }

        /* 实体切分线 */
        .cut-line {
            position: absolute; left: 0; width: 100%; height: 6px;
            background-color: var(--line-color); cursor: ns-resize; z-index: 100; transform: translateY(-3px);
        }
        .cut-line-label {
            position: absolute; right: 8px; top: -20px; background: var(--line-color);
            color: white; font-size: 11px; padding: 1px 5px; border-radius: 3px; pointer-events: none;
        }
        .cut-line-delete {
            position: absolute; left: 8px; top: -20px; background: #333;
            color: white; font-size: 11px; padding: 1px 5px; border-radius: 3px; cursor: pointer; z-index: 101;
        }

        /* 淡黄色空白切除区 */
        .cut-zone {
            position: absolute; left: 0; width: 100%; background-color: var(--zone-color);
            border-top: 2px solid var(--zone-border); border-bottom: 2px solid var(--zone-border); z-index: 90;
        }
        .zone-control {
            position: absolute; right: 8px; top: 6px; display: flex; gap: 6px; z-index: 92;
        }
        .zone-label { background: var(--zone-border); color: white; font-size: 11px; padding: 2px 6px; border-radius: 3px; pointer-events: none;}
        .zone-delete { background: #333; color: white; font-size: 11px; padding: 2px 6px; border-radius: 3px; cursor: pointer; }
        
        /* 区域上下边缘拉伸手柄 */
        .zone-handle { position: absolute; left: 0; width: 100%; height: 6px; cursor: ns-resize; z-index: 91; }
        .zone-handle-top { top: -3px; }
        .zone-handle-bottom { bottom: -3px; }

        /* 侧边栏 */
        .sidebar {
            width: 300px; background-color: var(--panel-bg); border-left: 1px solid var(--border-color);
            padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
        }
        .sidebar h3 { font-size: 14px; color: #111; }
        .card { background-color: #fafafa; border: 1px solid #f0f0f0; border-radius: 6px; padding: 12px; font-size: 13px; line-height: 1.6; color: #555; }
        .card ol { padding-left: 16px; }
        .card li { margin-bottom: 6px; }

        /* 遮罩加载 */
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9);
            display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; font-size: 15px;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #bfbfbf; }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 8px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="logo">PDF 高清切分器</div>
        
        <div class="file-input-wrapper">
            <button class="btn">📂 上传 PDF</button>
            <input type="file" id="pdf-file" accept="application/pdf">
        </div>

        <button id="btn-mode-line" class="btn btn-secondary" disabled>✂️ 点击放切分线</button>
        <button id="btn-mode-zone" class="btn btn-secondary" disabled>🟨 拖拽画空白区</button>
        <button id="btn-clear" class="btn btn-secondary btn-danger" style="display:none;">清空全部</button>
        
        <button id="export-btn" class="btn" style="background-color: #52c41a;" disabled>⚡ 导出高清切片</button>
        
        <span id="status" class="status-text">请先上传 PDF 文档</span>
    </div>

    <div class="main-container">
        <div class="workspace" id="workspace">
            <div class="empty-state" id="empty-state">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                <p>暂无文档，请在上方上传 PDF</p>
            </div>
            <div class="document-wrapper" id="document-wrapper" style="display: none;">
                <div class="cut-line-preview" id="cut-line-preview"></div>
                <div class="zone-preview" id="zone-preview"></div>
                </div>
        </div>

        <div class="sidebar">
            <div>
                <h3>💡 操作说明</h3>
                <div class="card">
                    <ol>
                        <li><b>点击放切分线</b>：开启后，鼠标在文档上移到任意位置<b>单击</b>即可放线。</li>
                        <li><b>拖拽画空白区</b>：开启后，鼠标在文档上<b>按住不放并垂直向下拖动</b>，即可拉出一个淡黄色区域。</li>
                        <li><b>切除原理</b>：导出的图片会被切分线隔开。如果两线之间包含淡黄色区域，<b>该空白区域对应的画面会在导出时被剪掉，上下内容完美接紧</b>。</li>
                        <li>红线和黄色区域的边缘均支持随时鼠标拖拽微调。</li>
                    </ol>
                </div>
            </div>
            <div>
                <h3>📊 实时统计</h3>
                <div class="card">
                    总页数: <span id="info-pages">-</span> 页<br>
                    切分线条数: <span id="info-lines">0</span> 条<br>
                    空白切除区: <span id="info-zones">0</span> 个<br>
                    预计生成图片: <span id="info-images">0</span> 张
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">正在处理中...</div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        let currentMode = 'none'; // 'none', 'line', 'zone'
        
        // 关键物理/渲染参数
        const VIEW_WIDTH = 800; // 网页上显示的统一宽度 (px)
        const RENDER_SCALE = 3.0; // 核心升级：导出时原生的 Canvas 放大3倍，保证极度清晰！

        const workspace = document.getElementById('workspace');
        const docWrapper = document.getElementById('document-wrapper');
        const previewLine = document.getElementById('cut-line-preview');
        const previewZone = document.getElementById('zone-preview');
        const emptyState = document.getElementById('empty-state');
        
        const btnModeLine = document.getElementById('btn-mode-line');
        const btnModeZone = document.getElementById('btn-mode-zone');
        const btnClear = document.getElementById('btn-clear');
        const exportBtn = document.getElementById('export-btn');
        const statusText = document.getElementById('status');
        
        let pageHeightsArr = []; // 记录每一页在网页显示中的累加高度，用于定位
        let pageCanvases = [];   // 存放渲染好的全高清 Canvas 引用
        
        let linesArr = []; // 存储切分线绝对高度 Y (px)
        let zonesArr = []; // 存储空白切除区对象 { id, top, bottom }
        
        let lineIdCounter = 0;
        let zoneIdCounter = 0;

        // 1. PDF 载入与高清渲染
        document.getElementById('pdf-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file || file.type !== 'application/pdf') return;

            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-text').textContent = '正在执行超高清级全页面渲染，请稍候...';
            
            const fileReader = new FileReader();
            fileReader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.getDocument(typedarray).promise.then(async function(pdf) {
                    pdfDoc = pdf;
                    await renderAllPages();
                }).catch(err => {
                    alert('PDF 加载失败: ' + err.message);
                    document.getElementById('loading-overlay').style.display = 'none';
                });
            };
            fileReader.readAsArrayBuffer(file);
        });

        async function renderAllPages() {
            // 清理旧 DOM
            docWrapper.querySelectorAll('.page-container, .cut-line, .cut-zone').forEach(el => el.remove());
            pageHeightsArr = [];
            pageCanvases = [];
            linesArr = [];
            zonesArr = [];
            switchMode('none');

            const numPages = pdfDoc.numPages;
            document.getElementById('info-pages').textContent = numPages;

            let currentTotalHeight = 0;

            for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                
                // 核心改动：渲染成极大分辨率
                const viewport = page.getViewport({ scale: RENDER_SCALE });

                const pageContainer = document.createElement('div');
                pageContainer.className = 'page-container';
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                // 网页显示比例：通过 CSS 进行物理缩放，保证顺畅预览
                const displayHeight = (viewport.height / viewport.width) * VIEW_WIDTH;
                pageContainer.style.width = VIEW_WIDTH + 'px';
                pageContainer.style.height = displayHeight + 'px';

                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                
                pageContainer.appendChild(canvas);
                docWrapper.appendChild(pageContainer);
                
                pageCanvases.push(canvas);
                pageHeightsArr.push({
                    start: currentTotalHeight,
                    end: currentTotalHeight + displayHeight,
                    realHeight: viewport.height,
                    realWidth: viewport.width,
                    scaleRatio: viewport.height / displayHeight // 网页坐标转高清Canvas像素坐标系数
                });

                currentTotalHeight += displayHeight;
            }

            emptyState.style.display = 'none';
            docWrapper.style.display = 'block';
            
            btnModeLine.disabled = false;
            btnModeZone.disabled = false;
            exportBtn.disabled = false;
            statusText.textContent = '文档加载完毕，请选择上方工具进行标注。';
            document.getElementById('loading-overlay').style.display = 'none';
            updateStats();
        }

        // 2. 工具栏模式切换
        btnModeLine.addEventListener('click', () => switchMode(currentMode === 'line' ? 'none' : 'line'));
        btnModeZone.addEventListener('click', () => switchMode(currentMode === 'zone' ? 'none' : 'zone'));
        
        function switchMode(mode) {
            currentMode = mode;
            btnModeLine.classList.remove('active');
            btnModeZone.classList.remove('active');
            workspace.classList.remove('mode-line', 'mode-zone');
            previewLine.style.display = 'none';
            previewZone.style.display = 'none';

            if (mode === 'line') {
                btnModeLine.classList.add('active');
                workspace.classList.add('mode-line');
                statusText.textContent = '模式：点击放切分线';
            } else if (mode === 'zone') {
                btnModeZone.classList.add('active');
                workspace.classList.add('mode-zone');
                statusText.textContent = '模式：在文档上按住鼠标不放垂直拖拽，画出淡黄色空白区';
            } else {
                statusText.textContent = '模式：浏览微调';
            }
        }

        // 3. 鼠标交互事件流（放线、画矩形区域）
        let isDrawingZone = false;
        let zoneStartInWrapperY = 0;

        docWrapper.addEventListener('mousemove', (e) => {
            const rect = docWrapper.getBoundingClientRect();
            const relativeY = e.clientY - rect.top;
            if (relativeY < 0 || relativeY > docWrapper.offsetHeight) return;

            if (currentMode === 'line') {
                previewLine.style.display = 'block';
                previewLine.style.top = relativeY + 'px';
            } else if (currentMode === 'zone' && isDrawingZone) {
                // 正在拖拽画矩形
                const currentY = relativeY;
                const top = Math.min(zoneStartInWrapperY, currentY);
                const height = Math.abs(zoneStartInWrapperY - currentY);
                previewZone.style.display = 'block';
                previewZone.style.top = top + 'px';
                previewZone.style.height = height + 'px';
            }
        });

        docWrapper.addEventListener('mouseleave', () => {
            previewLine.style.display = 'none';
            if (!isDrawingZone) previewZone.style.display = 'none';
        });

        docWrapper.addEventListener('mousedown', (e) => {
            if (currentMode !== 'zone') return;
            const rect = docWrapper.getBoundingClientRect();
            zoneStartInWrapperY = e.clientY - rect.top;
            isDrawingZone = true;
            previewZone.style.top = zoneStartInWrapperY + 'px';
            previewZone.style.height = '0px';
            previewZone.style.display = 'block';
        });

        window.addEventListener('mouseup', (e) => {
            if (currentMode === 'line') {
                const rect = docWrapper.getBoundingClientRect();
                const clickY = e.clientY - rect.top;
                if (clickY >= 0 && clickY <= docWrapper.offsetHeight && e.target.closest('#document-wrapper') && !e.target.classList.contains('cut-line-delete')) {
                    createLine(clickY);
                }
            } else if (currentMode === 'zone' && isDrawingZone) {
                isDrawingZone = false;
                previewZone.style.display = 'none';
                
                const rect = docWrapper.getBoundingClientRect();
                const endY = Math.max(0, Math.min(docWrapper.offsetHeight, e.clientY - rect.top));
                const top = Math.min(zoneStartInWrapperY, endY);
                const bottom = Math.max(zoneStartInWrapperY, endY);

                if (bottom - top > 5) { // 至少拉出5个像素才算数
                    createZone(top, bottom);
                }
            }
        });

        // 4. 创建及管理切分线
        function createLine(y) {
            lineIdCounter++;
            const lineEl = document.createElement('div');
            lineEl.className = 'cut-line';
            lineEl.id = 'line-' + lineIdCounter;
            lineEl.style.top = y + 'px';

            const label = document.createElement('span');
            label.className = 'cut-line-label';
            lineEl.appendChild(label);

            const del = document.createElement('span');
            del.className = 'cut-line-delete';
            del.textContent = '删除';
            del.onclick = (e) => { e.stopPropagation(); lineEl.remove(); updateStats(); };
            lineEl.appendChild(del);

            // 线段微调拖拽
            lineEl.addEventListener('mousedown', (e) => {
                e.stopPropagation(); e.preventDefault();
                const startY = e.clientY;
                const startTop = parseInt(lineEl.style.top);
                function drag(me) {
                    let nextY = startTop + (me.clientY - startY);
                    nextY = Math.max(0, Math.min(docWrapper.offsetHeight, nextY));
                    lineEl.style.top = nextY + 'px';
                    updateStats();
                }
                function stop() { window.removeEventListener('mousemove', drag); window.removeEventListener('mouseup', stop); }
                window.addEventListener('mousemove', drag);
                window.addEventListener('mouseup', stop);
            });

            docWrapper.appendChild(lineEl);
            updateStats();
        }

        // 5. 创建及管理淡黄色空白切除区
        function createZone(top, bottom) {
            zoneIdCounter++;
            const zoneEl = document.createElement('div');
            zoneEl.className = 'cut-zone';
            zoneEl.id = 'zone-' + zoneIdCounter;
            zoneEl.style.top = top + 'px';
            zoneEl.style.height = (bottom - top) + 'px';

            const container = document.createElement('div');
            container.className = 'zone-control';
            
            const label = document.createElement('span');
            label.className = 'zone-label';
            label.textContent = '空白切除区';
            
            const del = document.createElement('span');
            del.className = 'zone-delete';
            del.textContent = '删除';
            del.onclick = (e) => { e.stopPropagation(); zoneEl.remove(); updateStats(); };
            
            container.appendChild(label);
            container.appendChild(del);
            zoneEl.appendChild(container);

            // 上边缘拉伸调节
            const handleTop = document.createElement('div');
            handleTop.className = 'zone-handle zone-handle-top';
            handleTop.addEventListener('mousedown', (e) => {
                e.stopPropagation(); e.preventDefault();
                const startY = e.clientY;
                const sTop = parseInt(zoneEl.style.top);
                const sHeight = parseInt(zoneEl.style.height);
                function drag(me) {
                    let delta = me.clientY - startY;
                    let nTop = sTop + delta;
                    let nHeight = sHeight - delta;
                    if(nHeight > 5 && nTop >= 0) {
                        zoneEl.style.top = nTop + 'px';
                        zoneEl.style.height = nHeight + 'px';
                        updateStats();
                    }
                }
                function stop() { window.removeEventListener('mousemove', drag); window.removeEventListener('mouseup', stop); }
                window.addEventListener('mousemove', drag);
                window.addEventListener('mouseup', stop);
            });

            // 下边缘拉伸调节
            const handleBottom = document.createElement('div');
            handleBottom.className = 'zone-handle zone-handle-bottom';
            handleBottom.addEventListener('mousedown', (e) => {
                e.stopPropagation(); e.preventDefault();
                const startY = e.clientY;
                const sHeight = parseInt(zoneEl.style.height);
                function drag(me) {
                    let delta = me.clientY - startY;
                    let nHeight = sHeight + delta;
                    if(nHeight > 5 && (parseInt(zoneEl.style.top) + nHeight <= docWrapper.offsetHeight)) {
                        zoneEl.style.height = nHeight + 'px';
                        updateStats();
                    }
                }
                function stop() { window.removeEventListener('mousemove', drag); window.removeEventListener('mouseup', stop); }
                window.addEventListener('mousemove', drag);
                window.addEventListener('mouseup', stop);
            });

            zoneEl.appendChild(handleTop);
            zoneEl.appendChild(handleBottom);
            docWrapper.appendChild(zoneEl);
            updateStats();
        }

        // 6. 自动排序与同步统计
        function updateStats() {
            // 获取并排好序的切分线
            const lineEls = docWrapper.querySelectorAll('.cut-line');
            linesArr = [];
            lineEls.forEach(el => linesArr.push(parseFloat(el.style.top)));
            linesArr.sort((a,b) => a - b);
            
            lineEls.forEach(el => {
                const top = parseFloat(el.style.top);
                const idx = linesArr.indexOf(top);
                el.querySelector('.cut-line-label').textContent = `第 ${idx+1} 条切分线`;
            });

            // 获取空白区
            const zoneEls = docWrapper.querySelectorAll('.cut-zone');
            zonesArr = [];
            zoneEls.forEach(el => {
                const t = parseFloat(el.style.top);
                const h = parseFloat(el.style.height);
                zonesArr.push({ top: t, bottom: t + h });
            });

            const lineCount = linesArr.length;
            document.getElementById('info-lines').textContent = lineCount;
            document.getElementById('info-zones').textContent = zonesArr.length;
            document.getElementById('info-images').textContent = pdfDoc ? (lineCount + 1) : 0;
            btnClear.style.display = (lineCount > 0 || zonesArr.length > 0) ? 'inline-block' : 'none';
        }

        btnClear.addEventListener('click', () => {
            docWrapper.querySelectorAll('.cut-line, .cut-zone').forEach(el => el.remove());
            updateStats();
        });

        // 7. 核心超清纯像素切割导出算法（抛弃 html2canvas）
        exportBtn.addEventListener('click', async () => {
            if (!pdfDoc) return;
            switchMode('none');

            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-text').textContent = '正在进行底层像素流超清渲染和切除，请稍候...';

            try {
                // 总边界定义
                const totalDisplayHeight = docWrapper.offsetHeight;
                const boundaryLines = [0, ...linesArr, totalDisplayHeight];

                // 核心映射方法：输入网页级 Y 坐标，找到对应的原始高清 Canvas 及像素偏移 Y
                function mapToRealPixel(displayY) {
                    if (displayY <= 0) return { pageIdx: 0, pixelY: 0 };
                    if (displayY >= totalDisplayHeight) {
                        const lastIdx = pageHeightsArr.length - 1;
                        return { pageIdx: lastIdx, pixelY: pageHeightsArr[lastIdx].realHeight };
                    }
                    for (let i = 0; i < pageHeightsArr.length; i++) {
                        const box = pageHeightsArr[i];
                        if (displayY >= box.start && displayY <= box.end) {
                            return {
                                pageIdx: i,
                                pixelY: (displayY - box.start) * box.scaleRatio
                            };
                        }
                    }
                    return { pageIdx: 0, pixelY: 0 };
                }

                // 依次处理每一张切片图
                for (let i = 0; i < boundaryLines.length - 1; i++) {
                    const chunkStart = boundaryLines[i];
                    const chunkEnd = boundaryLines[i+1];

                    if (chunkEnd - chunkStart <= 2) continue; 

                    // 在当前块中，找出所有落在此块内部的“空白切除区”
                    let localZones = zonesArr.map(z => ({
                        top: Math.max(chunkStart, z.top),
                        bottom: Math.min(chunkEnd, z.bottom)
                    })).filter(z => z.bottom > z.top); // 筛选出真正和当前切片相交的空白区

                    // 将空白区融合同步排序
                    localZones.sort((a,b) => a.top - b.top);

                    // 核心：构建出“需要真正保留渲染的纵向视口段落”
                    let activeSegments = [];
                    let currentY = chunkStart;
                    
                    for (let zone of localZones) {
                        if (zone.top > currentY) {
                            activeSegments.push({ start: currentY, end: zone.top });
                        }
                        currentY = zone.bottom;
                    }
                    if (currentY < chunkEnd) {
                        activeSegments.push({ start: currentY, end: chunkEnd });
                    }

                    if (activeSegments.length === 0) continue; // 说明整张图全被空白切除了

                    // 计算该图片拼装后的总高清高宽
                    // 宽度取第一页的原始宽度
                    const realTargetWidth = pageHeightsArr[0].realWidth;
                    let totalRealHeight = 0;

                    let renderTasks = [];
                    for(let seg of activeSegments) {
                        // 计算这段保留内容在原画布上的像素高
                        let startInfo = mapToRealPixel(seg.start);
                        let endInfo = mapToRealPixel(seg.end);

                        // 跨页切片复杂处理流：分解为单页内任务
                        let tempY = seg.start;
                        while (tempY < seg.end) {
                            let currentInfo = mapToRealPixel(tempY);
                            let box = pageHeightsArr[currentInfo.pageIdx];
                            let nextStepDisplayY = Math.min(seg.end, box.end);
                            let nextStepInfo = mapToRealPixel(nextStepDisplayY);

                            let taskHeight = nextStepInfo.pixelY - currentInfo.pixelY;
                            if (taskHeight > 0) {
                                renderTasks.push({
                                    pageIdx: currentInfo.pageIdx,
                                    sourceY: currentInfo.pixelY,
                                    pixelHeight: taskHeight,
                                    targetTop: totalRealHeight
                                });
                                totalRealHeight += taskHeight;
                            }
                            tempY = nextStepDisplayY;
                        }
                    }

                    if (totalRealHeight <= 0) continue;

                    // 绘制超清画布
                    const outCanvas = document.createElement('canvas');
                    outCanvas.width = realTargetWidth;
                    outCanvas.height = totalRealHeight;
                    const outCtx = outCanvas.getContext('2d');
                    outCtx.fillStyle = "#FFFFFF";
                    outCtx.fillRect(0, 0, realTargetWidth, totalRealHeight);

                    // 将各个高清页面的像素数据精准缝合
                    for(let task of renderTasks) {
                        const srcCanvas = pageCanvases[task.pageIdx];
                        outCtx.drawImage(
                            srcCanvas,
                            0, task.sourceY, srcCanvas.width, task.pixelHeight, // 高清原产地
                            0, task.targetTop, realTargetWidth, task.pixelHeight  // 无缝组合装配地
                        );
                    }

                    // 输出绝对清脆、无降采样失真的超清 JPG
                    const imgData = outCanvas.toDataURL('image/jpeg', 0.95);
                    downloadBlob(imgData, `高清切片_${i+1}.jpg`);
                }

                statusText.textContent = `成功！所有切片已完成超高清无缝拼接导出。`;
            } catch (err) {
                console.error(err);
                alert('导出超清图片失败: ' + err.message);
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        });

        function downloadBlob(dataUrl, filename) {
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
